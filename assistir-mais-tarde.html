<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>PureFlix — Minha Lista & Calendário</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════════════════════
   VARIÁVEIS E RESET — Netflix Style
   ═══════════════════════════════════════════════════════ */
:root{
  --red:#e50914; --red2:#b20710;
  --bg:#0a0a0a; --bg2:#141414; --bg3:#1a1a1a; --bg4:#222;
  --white:#fff; --gray:#aaa; --light:#e5e5e5;
  --green:#46d369; --gold:#f5c518; --blue:#0071eb;
  --orange:#f39c12;
  --header-h:64px;
  --pill-h:48px;
  --bottom-h:60px;
  --card-w:180px; --card-h:270px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;overflow-x:hidden;min-height:100vh;}
::-webkit-scrollbar{height:4px;width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#333;border-radius:4px;}

/* ═══════════════════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════════════════ */
#header{
  position:fixed;top:0;left:0;right:0;
  height:var(--header-h);
  display:flex;align-items:center;
  padding:0 4%;
  z-index:900;
  background:linear-gradient(to bottom,rgba(10,10,10,.98),transparent);
  transition:background .3s, transform .3s ease-in-out;
}
#header.solid{background:rgba(14,14,14,.97);box-shadow:0 1px 0 rgba(255,255,255,.05);}
.logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px;font-weight:900;
  color:var(--red);letter-spacing:3px;
  cursor:pointer;margin-right:24px;
  text-decoration:none;
}
.nav{display:flex;gap:6px;align-items:center;}
.nav-btn{
  background:none;border:none;color:var(--gray);
  font-family:'Barlow',sans-serif;font-size:13px;
  padding:6px 12px;cursor:pointer;border-radius:4px;
  transition:all .2s;white-space:nowrap;
}
.nav-btn:hover,.nav-btn.active{color:var(--white);background:rgba(255,255,255,.08);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.header-right button{
  background:none;border:none;color:var(--gray);
  font-size:18px;cursor:pointer;padding:4px;
  transition:color .2s;
}
.header-right button:hover{color:#fff;}

/* ═══════════════════════════════════════════════════════
   PILLS DE FILTRO / ABAS — estilo Netflix
   ═══════════════════════════════════════════════════════ */
#pills-bar{
  position:fixed;
  top:var(--header-h);
  left:0;right:0;
  height:var(--pill-h);
  z-index:800;
  display:flex;
  gap:8px;
  padding:0 4%;
  align-items:center;
  overflow-x:auto;
  background:linear-gradient(to bottom,rgba(10,10,10,.95),rgba(10,10,10,.7));
  scrollbar-width:none;
  border-bottom:1px solid rgba(255,255,255,.05);
}
#pills-bar::-webkit-scrollbar{display:none;}
.pill{
  flex-shrink:0;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  color:#ccc;
  font-size:13px;font-weight:600;
  font-family:'Barlow',sans-serif;
  padding:7px 20px;
  border-radius:20px;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.pill:hover{background:rgba(255,255,255,.18);color:#fff;}
.pill.active{background:#fff;border-color:#fff;color:#000;font-weight:700;}

/* ═══════════════════════════════════════════════════════
   CORPO PRINCIPAL
   ═══════════════════════════════════════════════════════ */
#main{
  padding-top:calc(var(--header-h) + var(--pill-h) + 16px);
  padding-bottom:calc(var(--bottom-h) + 24px);
  min-height:100vh;
}

/* ═══════════════════════════════════════════════════════
   ESTADO DE LOADING / ERRO / VAZIO
   ═══════════════════════════════════════════════════════ */
.state-box{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:50vh;gap:16px;color:var(--gray);
}
.state-box i{font-size:56px;opacity:.25;}
.state-box p{font-size:15px;}

/* Skeleton */
.skel-group{padding:0 4%;margin-bottom:36px;}
.skel-title{width:160px;height:20px;background:#1e1e1e;border-radius:4px;margin-bottom:16px;animation:skel-pulse 1.4s infinite;}
.skel-row{display:flex;gap:10px;}
.skel-card{flex-shrink:0;width:var(--card-w);height:var(--card-h);background:#1e1e1e;border-radius:6px;animation:skel-pulse 1.4s infinite;}
@keyframes skel-pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

/* ═══════════════════════════════════════════════════════
   ═══════ PÁGINA: MINHA LISTA (Assistir Mais Tarde) ═══════
   ═══════════════════════════════════════════════════════ */

/* Hero da Minha Lista */
.list-hero{
  position:relative;
  height:45vh;min-height:280px;max-height:420px;
  display:flex;align-items:flex-end;
  padding:0 4% 40px;
  margin-bottom:8px;
  overflow:hidden;
}
.list-hero::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,10,.6) 50%,rgba(10,10,10,.3) 100%);
  z-index:1;
}
.list-hero-bg{
  position:absolute;inset:0;
  background:center/cover no-repeat;
  filter:blur(2px) brightness(.4);
}
.list-hero-content{position:relative;z-index:2;max-width:600px;}
.list-hero-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:42px;font-weight:900;
  letter-spacing:.5px;line-height:1;
  margin-bottom:10px;
}
.list-hero-sub{
  font-size:15px;color:var(--gray);line-height:1.5;
  max-width:480px;
}
.list-hero-count{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:14px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  padding:6px 16px;border-radius:20px;
  font-size:13px;font-weight:600;color:var(--light);
}

/* Grid de cards da Minha Lista */
.list-grid-wrap{padding:0 4%;}
.list-grid-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:700;
  letter-spacing:.5px;margin-bottom:18px;
  display:flex;align-items:center;gap:10px;
}
.list-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(var(--card-w), 1fr));
  gap:16px;
  padding-bottom:40px;
}

/* Card Netflix-style */
.nf-card{
  position:relative;
  background:var(--bg3);
  border-radius:6px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .25s, box-shadow .25s;
  aspect-ratio:2/3;
}
.nf-card:hover{transform:scale(1.05);z-index:10;box-shadow:0 14px 40px rgba(0,0,0,.7);}
.nf-card img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .3s;
}
.nf-card:hover img{transform:scale(1.08);}

/* Overlay no hover */
.nf-card-overlay{
  position:absolute;inset:0;
  background:linear-gradient(transparent 35%,rgba(0,0,0,.95) 85%);
  opacity:0;
  transition:opacity .25s;
  display:flex;flex-direction:column;
  justify-content:flex-end;
  padding:12px;
}
.nf-card:hover .nf-card-overlay{opacity:1;}
.nf-card-title{
  font-size:13px;font-weight:700;
  line-height:1.3;margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}
.nf-card-meta{
  font-size:11px;color:var(--green);font-weight:600;
  margin-bottom:8px;
}
.nf-card-actions{
  display:flex;gap:8px;
}
.nf-card-btn{
  width:32px;height:32px;
  border-radius:50%;border:1px solid rgba(255,255,255,.4);
  background:rgba(0,0,0,.6);color:#fff;
  font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.nf-card-btn:hover{background:var(--red);border-color:var(--red);}
.nf-card-btn.remove:hover{background:#ff4444;border-color:#ff4444;}

/* Badge tipo */
.nf-badge{
  position:absolute;top:8px;left:8px;
  background:var(--red);color:#fff;
  font-size:9px;font-weight:800;
  padding:3px 8px;border-radius:3px;
  letter-spacing:.5px;text-transform:uppercase;
  z-index:2;
}

/* ═══════════════════════════════════════════════════════
   ═══════ PÁGINA: CALENDÁRIO ═══════
   ═══════════════════════════════════════════════════════ */

/* Banner de contagem regressiva */
.countdown-banner{
  margin:0 4% 24px;
  background:linear-gradient(135deg,rgba(229,9,20,.12),rgba(229,9,20,.04));
  border:1px solid rgba(229,9,20,.2);
  border-radius:12px;padding:16px 20px;
  display:flex;align-items:center;gap:16px;
}
.countdown-banner i{color:var(--red);font-size:24px;flex-shrink:0;}
.countdown-text strong{font-size:16px;font-weight:700;}
.countdown-text p{font-size:13px;color:var(--gray);margin-top:3px;}

/* Grupos de data */
.day-group{margin-bottom:36px;}
.day-header{
  display:flex;align-items:center;gap:12px;
  padding:0 4%;margin-bottom:16px;
}
.day-label{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:900;
  letter-spacing:.5px;
  white-space:nowrap;
}
.day-label.today{color:var(--red);}
.day-label.future{color:var(--green);}
.day-label.past{color:var(--gray);}
.day-badge{
  font-size:10px;font-weight:700;
  letter-spacing:1.5px;padding:4px 10px;
  border-radius:12px;text-transform:uppercase;
}
.day-badge.hoje{background:var(--red);color:#fff;}
.day-badge.novo{background:var(--green);color:#000;}
.day-badge.atrasado{background:var(--orange);color:#000;}
.day-line{flex:1;height:1px;background:rgba(255,255,255,.08);}

/* Carrossel horizontal */
.h-scroll{
  display:flex;gap:12px;
  padding:4px 4% 14px;
  overflow-x:auto;
  scrollbar-width:none;
  -webkit-overflow-scrolling:touch;
}
.h-scroll::-webkit-scrollbar{display:none;}

/* Card de episódio no calendário */
.ep-card{
  flex-shrink:0;
  width:140px;
  cursor:pointer;
  position:relative;
  border-radius:8px;
  overflow:hidden;
  background:linear-gradient(160deg,#1c1c1c,#111);
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 4px 16px rgba(0,0,0,.4);
  transition:transform .22s,box-shadow .22s;
}
.ep-card:hover{transform:scale(1.06);box-shadow:0 12px 32px rgba(0,0,0,.7);}
.ep-card:active{transform:scale(.96);}

.ep-poster{
  width:140px;aspect-ratio:2/3;
  background:#1a1a1a;
  position:relative;
  overflow:hidden;
}
.ep-poster img{
  width:100%;height:100%;object-fit:cover;
  display:block;transition:transform .3s;
}
.ep-card:hover .ep-poster img{transform:scale(1.05);}

.ep-poster .no-img{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;font-size:36px;color:#333;
  background:linear-gradient(135deg,#1a1a1a,#111);
}
.ep-poster .no-img span{
  font-size:10px;color:#444;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;
}

/* Status badge */
.ep-status{
  position:absolute;top:7px;left:7px;
  font-size:9px;font-weight:800;
  letter-spacing:.8px;
  padding:3px 8px;border-radius:4px;
  text-transform:uppercase;
  line-height:1;
}
.ep-status.hoje{background:var(--red);color:#fff;box-shadow:0 2px 10px rgba(229,9,20,.5);}
.ep-status.atualizado{background:var(--green);color:#000;font-weight:900;}
.ep-status.futuro{background:rgba(0,0,0,.8);border:1px solid rgba(255,255,255,.18);color:#ccc;}
.ep-status.atrasado{background:var(--orange);color:#000;}

/* Lista badge */
.ep-list-badge{
  position:absolute;bottom:8px;right:8px;
  background:var(--red);color:#fff;font-size:9px;font-weight:800;
  padding:3px 7px;border-radius:4px;letter-spacing:.5px;
  pointer-events:none;
}

/* Overlay para passados */
.ep-poster.past::after{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,.35);
}

/* Info do card */
.ep-info{padding:10px 10px 12px;}
.ep-title{
  font-size:12px;font-weight:700;
  line-height:1.35;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;color:#e8e8e8;margin-bottom:4px;
}
.ep-meta{
  font-size:10px;color:var(--gray);
  display:flex;flex-direction:column;gap:2px;
}
.ep-ep{font-size:10px;color:#888;font-weight:600;}

/* ═══════════════════════════════════════════════════════
   CALENDÁRIO MENSAL VISUAL — Grid de Dias
   ═══════════════════════════════════════════════════════ */
.cal-visual-wrap{
  padding:0 4%;
  margin-bottom:40px;
}
.cal-visual-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
  flex-wrap:wrap;
  gap:12px;
}
.cal-visual-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:24px;font-weight:900;
  letter-spacing:.5px;
  color:#fff;
}
.cal-visual-subtitle{
  font-size:13px;color:var(--gray);
  margin-top:4px;
}
.cal-visual-legend{
  display:flex;
  gap:16px;
  align-items:center;
  flex-wrap:wrap;
}
.cal-legend-item{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:11px;color:var(--gray);
}
.cal-legend-dot{
  width:8px;height:8px;border-radius:50%;
}
.cal-legend-dot.hoje{background:var(--red);}
.cal-legend-dot.passado{background:#555;}
.cal-legend-dot.futuro{background:var(--green);}
.cal-legend-dot.lancamento{background:var(--red);box-shadow:0 0 6px var(--red);}

/* Grid do calendário */
.cal-table{
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:6px;
}
.cal-table-head{
  text-align:center;
  font-size:11px;
  font-weight:700;
  color:#555;
  padding:8px 0;
  letter-spacing:1px;
  text-transform:uppercase;
}
.cal-table-cell{
  aspect-ratio:1;
  border-radius:10px;
  background:#151515;
  border:1px solid rgba(255,255,255,.04);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  cursor:default;
  transition:all .2s;
  min-height:60px;
}
.cal-table-cell.empty{
  background:transparent;
  border:none;
}
.cal-table-cell:hover:not(.empty){
  background:#1e1e1e;
  border-color:rgba(255,255,255,.1);
}

/* Número do dia */
.cal-day-num{
  font-size:15px;
  font-weight:700;
  color:#888;
  line-height:1;
}

/* Estados do dia */
.cal-table-cell.is-today{
  background:var(--red) !important;
  border-color:var(--red) !important;
}
.cal-table-cell.is-today .cal-day-num{
  color:#fff !important;
  font-size:18px;
}
.cal-table-cell.is-today::after{
  content:'HOJE';
  font-size:8px;
  font-weight:800;
  letter-spacing:1px;
  color:rgba(255,255,255,.8);
  margin-top:2px;
}

.cal-table-cell.is-past{
  opacity:.5;
}
.cal-table-cell.is-past .cal-day-num{
  color:#555;
}

.cal-table-cell.is-future .cal-day-num{
  color:#aaa;
}

/* Dia com lançamento */
.cal-table-cell.has-launch{
  background:linear-gradient(135deg, rgba(229,9,20,.15), rgba(229,9,20,.05));
  border-color:rgba(229,9,20,.3);
  cursor:pointer;
}
.cal-table-cell.has-launch:hover{
  background:linear-gradient(135deg, rgba(229,9,20,.25), rgba(229,9,20,.1));
  border-color:var(--red);
  transform:scale(1.05);
}
.cal-table-cell.has-launch .cal-day-num{
  color:var(--red);
  font-weight:800;
}
.cal-table-cell.has-launch.is-future{
  background:linear-gradient(135deg, rgba(70,211,105,.12), rgba(70,211,105,.04));
  border-color:rgba(70,211,105,.25);
}
.cal-table-cell.has-launch.is-future .cal-day-num{
  color:var(--green);
}
.cal-table-cell.has-launch.is-future:hover{
  background:linear-gradient(135deg, rgba(70,211,105,.2), rgba(70,211,105,.08));
  border-color:var(--green);
}

/* Indicador de conteúdo */
.cal-launch-indicator{
  position:absolute;
  bottom:6px;
  display:flex;
  gap:3px;
  align-items:center;
}
.cal-launch-dot{
  width:5px;height:5px;
  border-radius:50%;
  background:var(--red);
}
.cal-launch-dot.anime{background:#ff6b9d;}
.cal-launch-dot.serie{background:#4ecdc4;}
.cal-launch-dot.dorama{background:#a78bfa;}
.cal-launch-dot.filme{background:#f5c518;}
.cal-launch-count{
  font-size:9px;
  font-weight:700;
  color:var(--red);
  margin-left:2px;
}
.cal-table-cell.has-launch.is-future .cal-launch-dot{
  background:var(--green);
}
.cal-table-cell.has-launch.is-future .cal-launch-count{
  color:var(--green);
}

/* Tooltip no hover */
.cal-table-cell.has-launch::before{
  content:attr(data-tooltip);
  position:absolute;
  bottom:calc(100% + 8px);
  left:50%;
  transform:translateX(-50%) scale(0);
  background:#222;
  border:1px solid #333;
  padding:8px 12px;
  border-radius:8px;
  font-size:11px;
  color:#fff;
  white-space:nowrap;
  z-index:100;
  opacity:0;
  transition:all .2s;
  pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
.cal-table-cell.has-launch:hover::before{
  transform:translateX(-50%) scale(1);
  opacity:1;
}

/* Navegação do calendário */
.cal-nav{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  margin-bottom:24px;
}
.cal-nav-btn{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  color:#fff;
  width:36px;height:36px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:14px;
  transition:all .2s;
}
.cal-nav-btn:hover{
  background:var(--red);
  border-color:var(--red);
}
.cal-nav-month{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;
  font-weight:700;
  color:#fff;
  min-width:180px;
  text-align:center;
}

/* Janela de tempo */
.cal-window-info{
  margin:0 4% 24px;
  background:linear-gradient(90deg, rgba(229,9,20,.08), transparent);
  border-left:3px solid var(--red);
  padding:12px 16px;
  border-radius:0 8px 8px 0;
}
.cal-window-info p{
  font-size:13px;
  color:var(--gray);
  line-height:1.5;
}
.cal-window-info strong{
  color:#fff;
  font-weight:600;
}

/* ═══════════════════════════════════════════════════════
   MODAL DE DETALHES
   ═══════════════════════════════════════════════════════ */
#modal-overlay{
  position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,.8);
  display:none;
  align-items:flex-end;
  justify-content:center;
}
#modal-overlay.open{display:flex;}
#modal-sheet{
  width:100%;max-width:520px;
  background:var(--bg3);
  border-radius:20px 20px 0 0;
  overflow:hidden;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.25,.46,.45,.94);
  max-height:92vh;
  overflow-y:auto;
}
#modal-overlay.open #modal-sheet{transform:translateY(0);}
.modal-handle{
  width:40px;height:4px;
  background:rgba(255,255,255,.2);
  border-radius:2px;
  margin:12px auto 0;
}
.modal-backdrop{
  width:100%;height:220px;
  background:center/cover no-repeat #111;
  position:relative;flex-shrink:0;
}
.modal-backdrop::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg3) 0%,transparent 60%);
}
.modal-body{padding:0 22px 32px;}
.modal-poster-row{
  display:flex;gap:16px;
  align-items:flex-end;
  margin-top:-55px;
  position:relative;z-index:2;
  margin-bottom:16px;
}

<script>

/* ═══════════════════════════════════════════════════════
   CONFIGURAÇÃO E ESTADO GLOBAL
   ═══════════════════════════════════════════════════════ */
const CAL_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI1OWZmMTlmMGM4MjJhYmRmYjBjM2I0MWJmZDZiOTJiMCIsIm5iZiI6MTc3OTcxNTY2Ni41NzEsInN1YiI6IjZhMTQ0ZTUyODM4ZGNiYzhmNDAyZDY5MCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.pFS9ydcOA40ekPL09mC8DiNns6RK_j26KrRIGAt1HCg';
const CAL_BASE  = 'https://api.themoviedb.org/3';
const CAL_IMG   = 'https://image.tmdb.org/t/p/w500';
const CAL_OPTS  = { headers:{ Authorization:`Bearer ${CAL_TOKEN}` } };

let currentPage      = 'lista';
let currentCalView   = 'scroll';
let currentCalFilter = 'todos';
let currentListFilter= 'todos';
let calData          = [];
let filteredCalData  = [];
let searchTerm       = '';
let modalItem        = null;
let calVisualMonth   = new Date(); // Mês atual do calendário visual

const TODAY = new Date(); TODAY.setHours(0,0,0,0);

/* Janela de tempo: 10 dias passados, 20 dias futuros */
const WINDOW_PAST  = new Date(TODAY); WINDOW_PAST.setDate(WINDOW_PAST.getDate()-10);
const WINDOW_FUTURE= new Date(TODAY); WINDOW_FUTURE.setDate(WINDOW_FUTURE.getDate()+10);

/* ═══════════════════════════════════════════════════════
   UTILITÁRIOS
   ═══════════════════════════════════════════════════════ */
function fmtDate(str){
  if(!str) return '';
  const d = new Date(str+'T00:00:00');
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${dias[d.getDay()]}, ${d.getDate()} ${meses[d.getMonth()]}`;
}
function fmtFull(str){
  if(!str) return '';
  const d = new Date(str+'T00:00:00');
  const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}
function fmtMonthYear(date){
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${meses[date.getMonth()]} ${date.getFullYear()}`;
}
function dayKey(str){ return str ? str.split('T')[0] : ''; }
function isToday(str){ const d=new Date(str+'T00:00:00'); d.setHours(0,0,0,0); return d.getTime()===TODAY.getTime(); }
function isPast(str){ const d=new Date(str+'T00:00:00'); d.setHours(0,0,0,0); return d<TODAY; }
function isFuture(str){ const d=new Date(str+'T00:00:00'); d.setHours(0,0,0,0); return d>TODAY; }
function isInWindow(str){
  if(!str) return false;
  const d = new Date(str+'T00:00:00');
  return d >= WINDOW_PAST && d <= WINDOW_FUTURE;
}

function detectType(item){
  const raw = (item.type||item.category||item.media_type||item.genre||item.show_type||'').toLowerCase().trim();
  const orig = (item.original_language||item.language||'').toLowerCase();
  const country = (item.origin_country||item.country||'').toLowerCase();
  if(raw==='movie'||raw==='filme'||raw==='film') return 'filme';
  if(item.runtime && !item.episode_number && !item.season_number) return 'filme';
  if(item.is_anime||raw.includes('anime')) return 'anime';
  if((orig==='ja'||orig==='jp') && (raw==='tv'||raw==='serie'||raw==='series'||raw===''||raw.includes('anim'))) return 'anime';
  if(raw.includes('dorama')||raw.includes('k-drama')||raw.includes('kdrama')) return 'dorama';
  if((country.includes('kr')||country.includes('cn')||country.includes('tw')||country.includes('th')) && (raw==='tv'||raw==='serie'||raw==='')) return 'dorama';
  return 'serie';
}

function statusLabel(s){
  const m = {'Hoje':'hoje','Atualizado':'atualizado','Futuro':'futuro','Atrasado':'atrasado'};
  return m[s] || s?.toLowerCase() || 'futuro';
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function getWatchLaterSafe(){
  try{
    if(typeof getWatchLater==='function') return getWatchLater();
    return JSON.parse(localStorage.getItem('pf_watchlater')||'[]');
  }catch(e){ return []; }
}

/* ═══════════════════════════════════════════════════════
   NAVEGAÇÃO ENTRE PÁGINAS
   ═══════════════════════════════════════════════════════ */
function showPage(page, btn){
  currentPage = page;
  document.getElementById('page-lista').style.display = page==='lista' ? 'block' : 'none';
  document.getElementById('page-calendario').style.display = page==='calendario' ? 'block' : 'none';
  document.getElementById('pills-lista').style.display = page==='lista' ? 'flex' : 'none';
  document.getElementById('pills-calendario').style.display = page==='calendario' ? 'flex' : 'none';
  document.getElementById('view-toggle').style.display = page==='calendario' ? 'flex' : 'none';

  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else {
    const navBtn = document.querySelector(`.nav-btn[onclick*="'${page}'"]`);
    if(navBtn) navBtn.classList.add('active');
  }

  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  const bn = document.getElementById('bn-'+page);
  if(bn) bn.classList.add('active');

  window.scrollTo({top:0,behavior:'smooth'});

  if(page==='lista') renderLista();
  else if(page==='calendario'){
    if(calData.length===0) initCalendario();
    else renderCalAll();
  }
}

function setNavActive(btn){
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}

/* ═══════════════════════════════════════════════════════
   SEARCH
   ═══════════════════════════════════════════════════════ */
function toggleSearch(){
  const s=document.getElementById('searchbar');
  s.classList.toggle('open');
  if(s.classList.contains('open')){
    document.getElementById('search-input').focus();
  } else {
    document.getElementById('search-input').value='';
    searchTerm='';
    if(currentPage==='lista') renderLista();
    else { applyCalFilters(); renderCalAll(); }
  }
}

function onSearch(v){
  searchTerm = v.toLowerCase().trim();
  if(currentPage==='lista') renderLista();
  else { applyCalFilters(); renderCalAll(); }
}

/* ═══════════════════════════════════════════════════════
   ═══════ MINHA LISTA (Assistir Mais Tarde) ═══════
   ═══════════════════════════════════════════════════════ */

function setListFilter(filter, btn){
  currentListFilter = filter;
  document.querySelectorAll('#pills-lista .pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  renderLista();
}

function renderLista(){
  const grid = document.getElementById('lista-grid');
  const wl = getWatchLaterSafe();

  let items = wl;
  if(searchTerm){
    items = items.filter(i => (i.title||'').toLowerCase().includes(searchTerm));
  }
  if(currentListFilter !== 'todos'){
    items = items.filter(i => (i.type||'movie') === currentListFilter || 
      (currentListFilter==='tv' && (i.type==='tv'||i.type==='series')));
  }

  document.getElementById('lista-count-num').textContent = items.length;

  const heroBg = document.getElementById('lista-hero-bg');
  if(items.length > 0 && items[0].poster){
    heroBg.style.backgroundImage = `url('${items[0].poster}')`;
  } else {
    heroBg.style.backgroundImage = 'linear-gradient(135deg,#1a1a1a,#0a0a0a)';
  }

  if(!items.length){
    grid.innerHTML = `
      <div class="state-box" style="grid-column:1/-1;min-height:30vh;">
        <i class="fas fa-bookmark"></i>
        <p>${searchTerm ? 'Nenhum resultado encontrado' : 'Sua lista está vazia. Adicione títulos pelo site!'}</p>
      </div>`;
    return;
  }

  grid.innerHTML = '';
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'nf-card';
    const type = item.type === 'movie' ? 'FILME' : 'SÉRIE';
    const poster = item.poster || item.poster_path || '';
    card.innerHTML = `
      ${poster ? `<img src="${poster}" alt="${item.title||''}" loading="lazy" onerror="this.style.display='none'">` : ''}
      <span class="nf-badge">${type}</span>
      <div class="nf-card-overlay">
        <div class="nf-card-title">${item.title||'Sem título'}</div>
        <div class="nf-card-meta">${item.rating ? '⭐ ' + item.rating : ''} ${item.release ? '· ' + item.release.split('-')[0] : ''}</div>
        <div class="nf-card-actions">
          <button class="nf-card-btn" onclick="event.stopPropagation();playItem('${item.id}','${item.type||'movie'}')" title="Assistir"><i class="fas fa-play"></i></button>
          <button class="nf-card-btn remove" onclick="event.stopPropagation();removeFromList('${item.id}')" title="Remover"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `;
    card.onclick = () => playItem(item.id, item.type||'movie');
    grid.appendChild(card);
  });
}

function removeFromList(id){
  if(typeof removeWatchLater==='function'){
    removeWatchLater(id);
  } else {
    try {
      let list = JSON.parse(localStorage.getItem('pf_watchlater')||'[]');
      list = list.filter(x => String(x.id) !== String(id));
      localStorage.setItem('pf_watchlater', JSON.stringify(list));
    }catch(e){}
  }
  toast('🗑️ Removido da lista');
  renderLista();
}

function playItem(id, type){
  const t = type==='movie'?'movie':'tv';
  window.location.href = `index.html#${t}/${id}`;
}

/* ═══════════════════════════════════════════════════════
   ═══════ CALENDÁRIO — BUSCA TMDB (10 passados, 20 futuros) ═══════
   ═══════════════════════════════════════════════════════ */

async function initCalendario(){
  if(typeof requestNotifPermission==='function') requestNotifPermission();

  try{
    let data = await fetchCalendarTMDB();
    calData = data;
    toast(`✅ ${data.length} lançamentos carregados`);
  }catch(e){
    console.warn('TMDB falhou, usando demo:', e);
    calData = demoData();
    toast('📅 Mostrando lançamentos de exemplo');
  }

  // Garantir array válido
  if(!Array.isArray(calData)) calData = [];

  // Normalizar
  calData = calData.map(item => ({
    ...item,
    air_date:       item.air_date || item.date || item.release_date || item.premiere || item.data || '',
    poster_path:    item.poster_path || item.image || item.poster || item.thumbnail || item.img || '',
    season_number:  item.season_number ?? item.season ?? item.temporada ?? null,
    episode_number: item.episode_number ?? item.episode ?? item.episodio ?? item.ep ?? null,
    title:          item.title || item.name || item.titulo || item.nome || '',
    type:           item.type || item.category || item.tipo || item.categoria || '',
    tmdb_id:        item.tmdb_id || item.id || item.tmdb || '',
  }));

  // Filtrar apenas janela de 10 dias passados e 20 futuros
  calData = calData.filter(item => {
    if(!item.air_date || item.air_date.length < 8) return false;
    return isInWindow(item.air_date);
  });

  // Cruzar com Minha Lista
  const wl = getWatchLaterSafe();
  calData = calData.map(item => {
    const id = String(item.tmdb_id||item.id||'');
    return { ...item, _inWatchLater: id && wl.some(x=>String(x.id)===id) };
  });

  // Adicionar itens da Minha Lista não na API
  const apiIds = new Set(calData.map(i=>String(i.tmdb_id||i.id||'')));
  wl.forEach(wlItem => {
    if(!String(wlItem.id) || apiIds.has(String(wlItem.id))) return;
    if(!wlItem.release) return;
    if(!isInWindow(wlItem.release)) return;
    calData.push({
      title: wlItem.title||'', air_date: wlItem.release,
      poster_path: wlItem.poster||'', type: wlItem.type==='movie'?'filme':(wlItem.type||'serie'),
      status: new Date(wlItem.release+'T00:00:00')>TODAY ? 'Futuro' : 'Atualizado',
      tmdb_id: wlItem.id, _inWatchLater: true, _fromWatchLater: true,
    });
  });

  calData.sort((a,b) => new Date(a.air_date||'2099-01-01') - new Date(b.air_date||'2099-01-01'));
  filteredCalData = [...calData];

  document.getElementById('loading-state').style.display='none';
  document.getElementById('content').style.display='block';
  renderCalAll();
}

/* ── Fetch TMDB: séries, animes e doramas em exibição ── */
async function fetchCalendarTMDB(){
  const fmt = d => d.toISOString().split('T')[0];

  const fetchTMDB = async (path, params={}) => {
    const u = new URL(CAL_BASE + path);
    u.searchParams.set('language','pt-BR');
    Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
    const r = await fetch(u, CAL_OPTS);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  };

  const items = [];

  // 1. Buscar séries no ar hoje (mais preciso para lançamentos recentes)
  try{
    const airingToday = await fetchTMDB('/tv/airing_today', {page:1});
    if(airingToday && airingToday.results){
      airingToday.results.slice(0,20).forEach(show => {
        const poster = show.poster_path ? CAL_IMG + show.poster_path : '';
        const type = detectType({
          type: show.genre_ids?.includes(16) ? 'anime' : 'serie',
          original_language: show.original_language,
          origin_country: show.origin_country?.join(',') || ''
        });
        items.push({
          title: show.name, episode_title: 'Novo episódio',
          episode_number: null, season_number: null,
          air_date: fmt(TODAY), poster_path: poster,
          status: 'Hoje', type: type, tmdb_id: show.id
        });
      });
    }
  }catch(e){ console.log('[Calendário] airing_today falhou:', e.message); }

  // 2. Buscar séries em exibição (on_the_air) — cobre ~2 semanas
  const onAirPages = [1,2];
  const onAirResults = await Promise.allSettled(
    onAirPages.map(p => fetchTMDB('/tv/on_the_air', {page:p}))
  );

  const shows = new Map();
  onAirResults.forEach(r => {
    if(r.status==='fulfilled' && r.value && r.value.results){
      r.value.results.forEach(s => { if(!shows.has(s.id)) shows.set(s.id, s); });
    }
  });

  // 3. Buscar detalhes de cada série (limitado a 20 para não sobrecarregar)
  const showList = [...shows.values()].slice(0, 20);

  await Promise.allSettled(showList.map(async show => {
    try {
      const det = await fetchTMDB(`/tv/${show.id}`, {append_to_response:'external_ids'});
      if(!det || (!det.last_episode_to_air && !det.next_episode_to_air)) return;

      const poster = show.poster_path ? CAL_IMG + show.poster_path : '';
      const type = detectType({
        type: show.genre_ids?.includes(16) ? 'anime' : 'serie',
        original_language: show.original_language,
        origin_country: show.origin_country?.join(',') || ''
      });

      // Episódio anterior (se dentro da janela)
      if(det.last_episode_to_air){
        const ep = det.last_episode_to_air;
        const d  = ep.air_date;
        if(d && isInWindow(d)){
          items.push({
            title: show.name, episode_title: ep.name || '',
            episode_number: ep.episode_number, season_number: ep.season_number,
            air_date: d, poster_path: poster, 
            status: d===fmt(TODAY)?'Hoje':'Atualizado',
            type: type, tmdb_id: show.id
          });
        }
      }

      // Próximo episódio (se dentro da janela)
      if(det.next_episode_to_air){
        const ep = det.next_episode_to_air;
        const d  = ep.air_date;
        if(d && isInWindow(d)){
          items.push({
            title: show.name, episode_title: ep.name || '',
            episode_number: ep.episode_number, season_number: ep.season_number,
            air_date: d, poster_path: poster, status: 'Futuro',
            type: type, tmdb_id: show.id
          });
        }
      }
    } catch(e){}
  }));

  // 4. Buscar filmes upcoming (lançamentos futuros)
  try{
    const upcoming = await fetchTMDB('/movie/upcoming', {region:'BR', page:1});
    if(upcoming && upcoming.results){
      upcoming.results.slice(0,10).forEach(m => {
        if(m.release_date && isInWindow(m.release_date)){
          items.push({
            title: m.title, episode_title: '',
            episode_number: null, season_number: null,
            air_date: m.release_date,
            poster_path: m.poster_path ? CAL_IMG + m.poster_path : '',
            status: m.release_date===fmt(TODAY)?'Hoje':'Futuro',
            type: 'filme', tmdb_id: m.id
          });
        }
      });
    }
  }catch(e){ console.log('[Calendário] upcoming movies falhou:', e.message); }

  // Remover duplicados por tmdb_id + air_date
  const seen = new Set();
  const unique = [];
  items.forEach(it => {
    const key = (it.tmdb_id||'') + '_' + (it.air_date||'') + '_' + (it.episode_number||'');
    if(!seen.has(key)){ seen.add(key); unique.push(it); }
  });

  if(!unique.length) throw new Error('Sem dados');
  return unique;
}

/* ── Filtros do Calendário ── */
function setCalFilter(f, btn){
  currentCalFilter = f;
  document.querySelectorAll('#pills-calendario .pill').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  applyCalFilters();
  renderCalAll();
}

function applyCalFilters(){
  filteredCalData = calData.filter(item => {
    const type   = detectType(item);
    const status = statusLabel(item.status);
    const date   = item.air_date||'';
    const q = searchTerm;
    const titleMatch = (item.title||item.name||'').toLowerCase().includes(q);
    const epMatch    = (item.episode_title||'').toLowerCase().includes(q);
    if(q && !titleMatch && !epMatch) return false;
    if(currentCalFilter==='todos')      return true;
    if(currentCalFilter==='hoje')       return date && isToday(date);
    if(currentCalFilter==='futuro')     return date && isFuture(date);
    if(currentCalFilter==='atualizado') return date && (isToday(date)||isPast(date));
    if(currentCalFilter==='serie')      return type==='serie';
    if(currentCalFilter==='anime')      return type==='anime';
    if(currentCalFilter==='dorama')     return type==='dorama';
    if(currentCalFilter==='filme')      return type==='filme';
    if(currentCalFilter==='lista')      return item._inWatchLater;
    return true;
  });
}

}

/* ── VIEW 1: Carrossel por Dia ── */
function renderCalScroll(){
  const cont = document.getElementById('content');
  const calView = document.getElementById('cal-view');
  const calVisual = document.getElementById('cal-visual');
  cont.style.display='block'; calView.style.display='none'; calVisual.style.display='none';
  cont.innerHTML='';

  // Sempre mostrar info da janela
  const windowInfo = document.createElement('div');
  windowInfo.className='cal-window-info';
  const pastDays = Math.ceil((TODAY - WINDOW_PAST) / 86400000);
  const futureDays = Math.ceil((WINDOW_FUTURE - TODAY) / 86400000);
  windowInfo.innerHTML=`<p><strong>📅 Janela de Lançamentos:</strong> ${pastDays} dias passados + ${futureDays} dias futuros</p>`;
  cont.appendChild(windowInfo);

  if(!filteredCalData.length){
    cont.innerHTML += `<div class="state-box" style="min-height:40vh;"><i class="fas fa-calendar-times"></i><p>Nenhum conteúdo nesta janela. Tente ajustar os filtros!</p></div>`;
    return;
  }

  // Info da janela
  const windowInfo = document.createElement('div');
  windowInfo.className='cal-window-info';
  windowInfo.innerHTML=`<p><strong>📅 Janela de Lançamentos:</strong> Últimos 10 dias + Próximos 20 dias</p>`;
  cont.appendChild(windowInfo);

  // Banner hoje
  const todayItems = filteredCalData.filter(i=>isToday(i.air_date));
  if(todayItems.length){
    const banner = document.createElement('div');
    banner.className='countdown-banner';
    banner.innerHTML=`<i class="fas fa-bell"></i>
      <div class="countdown-text"><strong>${todayItems.length} lançamento${todayItems.length>1?'s':''} hoje!</strong><p>Novos episódios disponíveis agora</p></div>`;
    cont.appendChild(banner);
  }

  // Agrupar por data
  const groups = {};
  filteredCalData.forEach(item => {
    const k = dayKey(item.air_date) || 'sem-data';
    if(!groups[k]) groups[k]=[];
    groups[k].push(item);
  });

  Object.keys(groups).sort().forEach(dateKey => {
    if(dateKey==='sem-data') return;
    const items = groups[dateKey];
    const group = document.createElement('div');
    group.className='day-group';

    const today = isToday(dateKey);
    const past = isPast(dateKey);
    const future = isFuture(dateKey);
    const labelCls = today?'today':future?'future':'past';
    const badge = today ? '<span class="day-badge hoje">HOJE</span>' :
                  past ? '<span class="day-badge" style="background:rgba(70,211,105,.15);border:1px solid rgba(70,211,105,.3);color:#46d369;">DISPONÍVEL</span>' : '';

    const dh = document.createElement('div');
    dh.className='day-header';
    dh.innerHTML = `
      <span class="day-label ${labelCls}">${today?'📅 Hoje':fmtDate(dateKey)}</span>
      ${badge}
      <span class="day-badge" style="background:rgba(255,255,255,.06);color:#777;font-size:9px;font-weight:600;padding:3px 8px;border-radius:10px;">${items.length} título${items.length>1?'s':''}</span>
      <div class="day-line"></div>`;
    group.appendChild(dh);

    const scroll = document.createElement('div');
    scroll.className='h-scroll';
    items.forEach(item => scroll.appendChild(makeCalCard(item)));
    group.appendChild(scroll);
    cont.appendChild(group);
  });
}

function makeCalCard(item){
  const card = document.createElement('div');
  card.className='ep-card';
  const type = detectType(item);
  const typeIcon = type==='anime'?'⛩️':type==='dorama'?'🎌':type==='filme'?'🎬':'📺';
  const date = item.air_date||'';
  const pastClass = date && isPast(date) && !isToday(date) ? 'past' : '';

  let statusCls, statusTxt;
  if(date && isToday(date)) { statusCls='hoje'; statusTxt='HOJE'; }
  else if(date && isFuture(date)) { statusCls='futuro'; statusTxt='Em breve'; }
  else { statusCls='atualizado'; statusTxt='✓ Disponível'; }

  const listBadge = item._inWatchLater ? `<span class="ep-list-badge">🔖 LISTA</span>` : '';

  card.innerHTML = `
    <div class="ep-poster ${pastClass}">
      ${item.poster_path ? `<img src="${item.poster_path}" alt="${item.title||''}" loading="lazy" onerror="this.style.display='none';this.parentElement.querySelector('.no-img').style.display='flex';">` : ''}
      <div class="no-img" style="${item.poster_path?'display:none;':''}">${typeIcon}<span>${type==='filme'?'Filme':type==='anime'?'Anime':type==='dorama'?'Dorama':'Série'}</span></div>
      <span class="ep-status ${statusCls}">${statusTxt}</span>
      ${listBadge}
    </div>
    <div class="ep-info">
      <div class="ep-title">${item.title||item.name||'—'}</div>
      <div class="ep-meta">
        <span class="ep-ep">${item.season_number?'T'+item.season_number+' ':''}${item.episode_number?'Ep '+item.episode_number:''}</span>
        <span>${typeIcon} ${type==='filme'?'Filme':type==='anime'?'Anime':type==='dorama'?'Dorama':'Série'}</span>
      </div>
    </div>`;
  card.onclick = () => openModal(item);
  return card;
}

/* ── VIEW 2: Calendário Mensal Grid ── */
function renderCalGrid(){
  const cont = document.getElementById('content');
  const calView = document.getElementById('cal-view');
  const calVisual = document.getElementById('cal-visual');
  cont.style.display='none'; calView.style.display='block'; calVisual.style.display='none';
  calView.innerHTML='';

  const months = {};
  filteredCalData.forEach(item => {
    if(!item.air_date) return;
    const d = new Date(item.air_date+'T00:00:00');
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if(!months[key]) months[key] = {year:d.getFullYear(), month:d.getMonth(), items:{}};
    const dk = dayKey(item.air_date);
    if(!months[key].items[dk]) months[key].items[dk]=[];
    months[key].items[dk].push(item);
  });

  if(!Object.keys(months).length){
    calView.innerHTML = `<div class="state-box" style="min-height:40vh;"><i class="fas fa-calendar-times"></i><p>Nenhum conteúdo encontrado</p></div>`;
    return;
  }

  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dias = ['D','S','T','Q','Q','S','S'];

  Object.keys(months).sort().forEach(mk => {
    const {year, month, items} = months[mk];
    const wrap = document.createElement('div');
    wrap.className='cal-grid-wrap';

    const title = document.createElement('div');
    title.className='cal-grid-title';
    title.textContent = `${meses[month]} ${year}`;
    wrap.appendChild(title);

    const grid = document.createElement('div');
    grid.className='cal-grid';
    dias.forEach(d => { const h=document.createElement('div'); h.className='cal-head'; h.textContent=d; grid.appendChild(h); });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();

    for(let i=0; i<firstDay; i++){
      const e=document.createElement('div'); e.className='cal-day empty'; grid.appendChild(e);
    }
    for(let d=1; d<=daysInMonth; d++){
      const cell = document.createElement('div');
      const dk = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cellDate = new Date(year, month, d); cellDate.setHours(0,0,0,0);
      const isT = cellDate.getTime()===TODAY.getTime();
      const isP = cellDate<TODAY;
      const isF = cellDate>TODAY;
      const hasContent = !!items[dk];
      cell.className = `cal-day${hasContent?' has-content':''}${isT?' is-today':''}${isP?' is-past':''}${isF?' is-future':''}`;
      cell.textContent = d;
      if(hasContent){
        const dot = document.createElement('div'); dot.className='cal-dot'; cell.appendChild(dot);
        cell.title = `${items[dk].length} lançamento(s)`;
        cell.onclick = () => showDayDetail(dk, items[dk]);
      }
      grid.appendChild(cell);
    }
    wrap.appendChild(grid);
    calView.appendChild(wrap);
  });
}

/* ── VIEW 3: Calendário Visual Mensal (Grade de Dias) ── */
function renderCalVisual(){
  const cont = document.getElementById('content');
  const calView = document.getElementById('cal-view');
  const calVisual = document.getElementById('cal-visual');
  cont.style.display='none'; calView.style.display='none'; calVisual.style.display='block';
  calVisual.innerHTML='';

  if(!filteredCalData.length){
    calVisual.innerHTML = `<div class="state-box" style="min-height:40vh;"><i class="fas fa-calendar-times"></i><p>Nenhum conteúdo encontrado</p></div>`;
    return;
  }

  // Info da janela
  const windowInfo = document.createElement('div');
  windowInfo.className='cal-window-info';
  const pastDays = Math.ceil((TODAY - WINDOW_PAST) / 86400000);
  const futureDays = Math.ceil((WINDOW_FUTURE - TODAY) / 86400000);
  windowInfo.innerHTML = `<p><strong>📅 Janela Ativa:</strong> ${pastDays} dias passados + ${futureDays} dias futuros | <strong>Hoje:</strong> ${fmtFull(TODAY.toISOString().split('T')[0])}</p>`;
  calVisual.appendChild(windowInfo);

  // Agrupar por mês para navegação
  const months = {};
  filteredCalData.forEach(item => {
    if(!item.air_date) return;
    const d = new Date(item.air_date+'T00:00:00');
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    if(!months[key]) months[key] = {year:d.getFullYear(), month:d.getMonth(), items:{}};
    const dk = dayKey(item.air_date);
    if(!months[key].items[dk]) months[key].items[dk] = [];
    months[key].items[dk].push(item);
  });

  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const diasSemana = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

  Object.keys(months).sort().forEach(mk => {
    const {year, month, items} = months[mk];
    const wrap = document.createElement('div');
    wrap.className='cal-visual-wrap';

    // Header do mês
    const header = document.createElement('div');
    header.className='cal-visual-header';

    const titleWrap = document.createElement('div');
    const title = document.createElement('div');
    title.className='cal-visual-title';
    title.textContent = `${meses[month]} ${year}`;
    const sub = document.createElement('div');
    sub.className='cal-visual-subtitle';
    const itemCount = Object.values(items).reduce((a,b)=>a+b.length,0);
    sub.textContent = `${itemCount} lançamento${itemCount>1?'s':''}`;
    titleWrap.appendChild(title);
    titleWrap.appendChild(sub);

    // Legendas
    const legend = document.createElement('div');
    legend.className='cal-visual-legend';
    legend.innerHTML = `
      <div class="cal-legend-item"><div class="cal-legend-dot hoje"></div> Hoje</div>
      <div class="cal-legend-item"><div class="cal-legend-dot passado"></div> Passado</div>
      <div class="cal-legend-item"><div class="cal-legend-dot futuro"></div> Futuro</div>
      <div class="cal-legend-item"><div class="cal-legend-dot lancamento"></div> Lançamento</div>
    `;

    header.appendChild(titleWrap);
    header.appendChild(legend);
    wrap.appendChild(header);

    // Grid
    const table = document.createElement('div');
    table.className='cal-table';

    // Cabeçalhos
    diasSemana.forEach(d => {
      const th = document.createElement('div');
      th.className='cal-table-head';
      th.textContent = d;
      table.appendChild(th);
    });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();

    // Células vazias
    for(let i=0; i<firstDay; i++){
      const cell = document.createElement('div');
      cell.className='cal-table-cell empty';
      table.appendChild(cell);
    }

    // Células dos dias
    for(let d=1; d<=daysInMonth; d++){
      const cell = document.createElement('div');
      const dk = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cellDate = new Date(year, month, d);
      cellDate.setHours(0,0,0,0);

      const isT = cellDate.getTime() === TODAY.getTime();
      const isP = cellDate < TODAY;
      const isF = cellDate > TODAY;
      const hasContent = !!items[dk];
      const inWindow = cellDate >= WINDOW_PAST && cellDate <= WINDOW_FUTURE;

      let classes = 'cal-table-cell';
      if(hasContent) classes += ' has-launch';
      if(isT) classes += ' is-today';
      else if(isP) classes += ' is-past';
      else if(isF) classes += ' is-future';

      cell.className = classes;

      // Número do dia
      const num = document.createElement('span');
      num.className='cal-day-num';
      num.textContent = d;
      cell.appendChild(num);

      // Indicadores de lançamento
      if(hasContent){
        const dayItems = items[dk];
        const indicator = document.createElement('div');
        indicator.className='cal-launch-indicator';

        // Tooltip
        const tooltipTexts = dayItems.slice(0,3).map(i => i.title);
        if(dayItems.length > 3) tooltipTexts.push(`+${dayItems.length-3} mais`);
        cell.setAttribute('data-tooltip', tooltipTexts.join(' • '));

        // Dots por tipo
        const types = {};
        dayItems.forEach(i => { types[detectType(i)] = (types[detectType(i)]||0)+1; });

        Object.entries(types).slice(0,3).forEach(([type, count]) => {
          const dot = document.createElement('div');
          dot.className = `cal-launch-dot ${type}`;
          indicator.appendChild(dot);
        });

        if(dayItems.length > 1){
          const count = document.createElement('span');
          count.className='cal-launch-count';
          count.textContent = dayItems.length;
          indicator.appendChild(count);
        }

        cell.appendChild(indicator);
        cell.onclick = () => showDayDetail(dk, dayItems);
      }

      table.appendChild(cell);
    }

    wrap.appendChild(table);
    calVisual.appendChild(wrap);
  });
}

function showDayDetail(dateKey, items){
  const saved = filteredCalData;
  filteredCalData = items;
  currentCalView = 'scroll';
  document.getElementById('vt-scroll').classList.add('active');
  document.getElementById('vt-cal').classList.remove('active');
  document.getElementById('vt-visual').classList.remove('active');
  renderCalScroll();
  filteredCalData = saved;
  window.scrollTo({top:0, behavior:'smooth'});
  toast(`📅 ${fmtDate(dateKey)} — ${items.length} lançamento(s)`);
}

/* ═══════════════════════════════════════════════════════
   MODAL
   ═══════════════════════════════════════════════════════ */
function openModal(item){
  modalItem = item;
  const overlay = document.getElementById('modal-overlay');
  const status = statusLabel(item.status);
  const type = detectType(item);
  const typeIcon = type==='anime'?'⛩️ Anime':type==='dorama'?'🎌 Dorama':type==='filme'?'🎬 Filme':'📺 Série';
  const statusText = {hoje:'🔴 Hoje', atualizado:'✅ Atualizado', futuro:'🟢 Em breve', atrasado:'⚠️ Atrasado'};

  const bd = document.getElementById('modal-backdrop');
  bd.style.backgroundImage = item.backdrop_path ? `url(${item.backdrop_path})` :
    item.poster_path ? `url(${item.poster_path})` : '';

  const pi = document.getElementById('modal-poster-img');
  pi.src = item.poster_path || ''; pi.onerror = () => pi.style.display='none';

  document.getElementById('modal-title').textContent = item.title || '—';
  document.getElementById('modal-sub').textContent = 
    `${item.season_number?'Temporada '+item.season_number+' · ':''}${item.episode_number?'Episódio '+item.episode_number:''}`;
  document.getElementById('modal-ep-title').textContent = item.episode_title || '';
  document.getElementById('modal-date').textContent = item.air_date ? `📅 ${fmtFull(item.air_date)}` : '';

  document.getElementById('modal-badges').innerHTML = `
    <span class="mbadge ${status}">${statusText[status]||item.status}</span>
    <span class="mbadge type">${typeIcon}</span>`;

  const wlId = item.tmdb_id || item.id || (item.title+'_'+item.episode_number);
  const inList = isInWatchLaterSafe(wlId);
  updateModalWLButton(inList);

  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}

function isInWatchLaterSafe(id){
  try{
    if(typeof isInWatchLater==='function') return isInWatchLater(id);
    const list = JSON.parse(localStorage.getItem('pf_watchlater')||'[]');
    return list.some(x => String(x.id) === String(id));
  }catch(e){ return false; }
}

function updateModalWLButton(inList){
  const btn = document.getElementById('modal-wl-btn');
  const label = document.getElementById('modal-wl-label');
  label.textContent = inList ? 'Na Minha Lista ✓' : 'Assistir Mais Tarde';
  btn.classList.toggle('in-list', inList);
}

function toggleModalWL(){
  if(!modalItem) return;
  const wlId = modalItem.tmdb_id || modalItem.id || (modalItem.title+'_'+modalItem.episode_number);
  const wlItem = {
    id: wlId,
    type: detectType(modalItem)==='filme'?'movie':'tv',
    title: modalItem.title || '',
    poster: modalItem.poster_path || '',
    release: modalItem.air_date || '',
    overview: modalItem.episode_title || '',
    rating: ''
  };

  let added;
  if(typeof toggleWatchLater==='function'){
    added = toggleWatchLater(wlItem);
  } else {
    try {
      let list = JSON.parse(localStorage.getItem('pf_watchlater')||'[]');
      const idx = list.findIndex(x => String(x.id) === String(wlId));
      if(idx >= 0){ list.splice(idx,1); added=false; }
      else { list.unshift(wlItem); added=true; }
      localStorage.setItem('pf_watchlater', JSON.stringify(list));
    }catch(e){ added=false; }
  }

  updateModalWLButton(added);
  if(added){
    if(typeof addNotification==='function') addNotification(wlItem);
    toast('🔖 Adicionado à Minha Lista!');
  } else {
    if(typeof removeNotification==='function') removeNotification(wlId);
    toast('🗑️ Removido da Minha Lista');
  }

  if(currentPage==='lista') renderLista();
}

function closeModal(e){
  if(e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
  modalItem = null;
}

/* ═══════════════════════════════════════════════════════
   SCROLL HEADER
   ═══════════════════════════════════════════════════════ */
let lastScrollTop = 0;
window.addEventListener('scroll', () => {
  const header = document.getElementById('header');
  const st = window.pageYOffset || document.documentElement.scrollTop;
  header.classList.toggle('solid', st > 40);
  if(st > lastScrollTop && st > 100){
    header.style.transform = 'translateY(-100%)';
  } else {
    header.style.transform = 'translateY(0)';
  }
  lastScrollTop = Math.max(st, 0);
});

/* ── Swipe para fechar modal ── */
document.getElementById('modal-sheet').addEventListener('touchstart', e => {
  window._modalStartY = e.touches[0].clientY;
}, {passive:true});
document.getElementById('modal-sheet').addEventListener('touchend', e => {
  if(e.changedTouches[0].clientY - window._modalStartY > 80) closeModalDirect();
}, {passive:true});

/* ═══════════════════════════════════════════════════════
   INICIALIZAÇÃO
   ═══════════════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  renderLista();
});
</script>
