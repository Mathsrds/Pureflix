<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>PureFlix — Minha Lista</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --red:#e50914; --red2:#b20710;
  --bg:#0a0a0a; --bg2:#141414; --bg3:#1a1a1a;
  --white:#fff; --gray:#aaa;
  --green:#46d369; --gold:#f5c518;
  --card-w:160px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:80px;}

/* ── HEADER ── */
#header{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;gap:16px;
  padding:0 4%;height:60px;
  background:rgba(10,10,10,.97);
  border-bottom:1px solid #1a1a1a;
}
.back-btn{
  background:none;border:none;color:var(--gray);
  font-size:18px;cursor:pointer;padding:6px;
  display:flex;align-items:center;
  transition:color .2s;
}
.back-btn:hover{color:#fff;}
.logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:24px;font-weight:900;color:var(--red);
  letter-spacing:3px;text-decoration:none;
}
.page-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;font-weight:700;color:var(--gray);
  letter-spacing:1px;
}
.header-count{
  margin-left:auto;
  font-size:13px;color:var(--gray);
  background:#1a1a1a;border-radius:20px;
  padding:4px 12px;
}

/* ── FILTROS ── */
#filter-bar{
  display:flex;gap:8px;padding:16px 4%;
  overflow-x:auto;scrollbar-width:none;
}
#filter-bar::-webkit-scrollbar{display:none;}
.filter-btn{
  flex-shrink:0;background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  color:#ccc;font-size:12px;font-weight:600;
  font-family:'Barlow',sans-serif;
  padding:6px 16px;border-radius:20px;
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.filter-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
.filter-btn.active{background:#fff;border-color:#fff;color:#000;font-weight:700;}

/* ── GRID DE CARDS ── */
#grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr));
  gap:16px;
  padding:0 4% 24px;
}

/* ── CARD ── */
.wl-card{
  background:var(--bg3);border-radius:8px;
  overflow:hidden;cursor:pointer;
  transition:transform .25s,box-shadow .25s;
  position:relative;
}
.wl-card:hover{transform:scale(1.04);box-shadow:0 12px 32px rgba(0,0,0,.7);}
.wl-card:active{transform:scale(.97);}

.wl-poster{
  width:100%;aspect-ratio:2/3;
  object-fit:cover;display:block;
  background:#111;
}
.wl-no-poster{
  width:100%;aspect-ratio:2/3;
  background:#111;display:flex;
  align-items:center;justify-content:center;
  font-size:48px;
}

/* badge de tipo */
.type-badge{
  position:absolute;top:8px;left:8px;
  font-size:9px;font-weight:800;letter-spacing:1px;
  padding:3px 7px;border-radius:3px;
  text-transform:uppercase;background:rgba(0,0,0,.8);
  border:1px solid rgba(255,255,255,.2);color:#ccc;
}

/* botão remover */
.remove-btn{
  position:absolute;top:8px;right:8px;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.8);border:1px solid #555;
  color:#fff;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:all .2s;
}
.wl-card:hover .remove-btn{opacity:1;}
.remove-btn:hover{background:var(--red);border-color:var(--red);}

/* barra de countdown */
.wl-countdown{
  position:absolute;bottom:0;left:0;right:0;
  padding:28px 8px 8px;
  background:linear-gradient(to top,rgba(0,0,0,.9) 0%,transparent 100%);
  font-size:11px;color:var(--green);font-weight:700;
  text-align:center;
}
.wl-countdown.past{color:var(--gray);}

.wl-info{padding:10px 10px 12px;}
.wl-title{
  font-size:13px;font-weight:700;
  line-height:1.3;color:#e5e5e5;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:4px;
}
.wl-meta{font-size:11px;color:var(--gray);}

.wl-actions{
  display:grid;grid-template-columns:1fr 1fr;
  gap:6px;padding:0 10px 12px;
}
.btn-watch-now{
  background:var(--red);color:#fff;border:none;
  border-radius:5px;padding:8px 4px;font-size:12px;
  font-weight:700;font-family:'Barlow',sans-serif;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:5px;transition:background .2s;
}
.btn-watch-now:hover{background:var(--red2);}
.btn-remove{
  background:#222;color:var(--gray);border:1px solid #333;
  border-radius:5px;padding:8px 4px;font-size:12px;
  font-weight:700;font-family:'Barlow',sans-serif;
  cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:5px;transition:all .2s;
}
.btn-remove:hover{background:#333;color:#fff;border-color:var(--red);color:var(--red);}

/* ── VAZIO ── */
#empty{
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:60vh;gap:16px;color:var(--gray);
  text-align:center;padding:0 4%;
}
#empty i{font-size:64px;opacity:.2;}
#empty h2{font-size:22px;font-weight:700;color:#555;}
#empty p{font-size:14px;line-height:1.6;max-width:280px;}
#empty a{
  display:inline-flex;align-items:center;gap:8px;
  background:var(--red);color:#fff;
  border-radius:6px;padding:12px 24px;
  font-size:14px;font-weight:700;
  text-decoration:none;margin-top:8px;
  transition:background .2s;
}
#empty a:hover{background:var(--red2);}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:80px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#222;border:1px solid #333;
  color:#fff;padding:10px 20px;border-radius:8px;
  font-size:13px;white-space:nowrap;
  opacity:0;transition:all .25s;z-index:9999;
  pointer-events:none;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── MOBILE NAV ── */
#mobile-nav{
  display:none;position:fixed;
  bottom:0;left:0;right:0;height:56px;
  background:rgba(14,14,14,.95);
  backdrop-filter:blur(16px);
  border-top:1px solid #1a1a1a;
  z-index:500;align-items:center;
  justify-content:space-around;
}
.mnav-btn{
  display:flex;flex-direction:column;align-items:center;
  gap:3px;background:none;border:none;
  color:#666;font-size:9px;font-weight:600;
  cursor:pointer;padding:6px 12px;
  font-family:'Barlow',sans-serif;
  text-transform:uppercase;letter-spacing:.5px;
  -webkit-tap-highlight-color:transparent;
}
.mnav-btn i{font-size:20px;}
.mnav-btn.active{color:#fff;}

@media(max-width:768px){
  :root{--card-w:140px;}
  body{padding-bottom:70px;}
  #mobile-nav{display:flex;}
  .remove-btn{opacity:1;}
}
@media(min-width:500px){--card-w:180px;}
@media(min-width:768px){
  :root{--card-w:180px;}
  #mobile-nav{display:none;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <button class="back-btn" onclick="history.back()" title="Voltar">
    <i class="fas fa-arrow-left"></i>
  </button>
  <a href="index.html" class="logo">PUREFLIX</a>
  <span class="page-title">🔖 Minha Lista</span>
  <span class="header-count" id="count">0 títulos</span>
</div>

<!-- FILTROS -->
<div id="filter-bar">
  <button class="filter-btn active" onclick="setFilter('todos',this)">Todos</button>
  <button class="filter-btn" onclick="setFilter('movie',this)">🎬 Filmes</button>
  <button class="filter-btn" onclick="setFilter('tv',this)">📺 Séries</button>
  <button class="filter-btn" onclick="setFilter('anime',this)">⛩️ Animes</button>
  <button class="filter-btn" onclick="setFilter('futuro',this)">🟢 Ainda não lançou</button>
  <button class="filter-btn" onclick="setFilter('disponivel',this)">✅ Disponível</button>
</div>

<!-- GRID -->
<div id="grid"></div>

<!-- VAZIO -->
<div id="empty">
  <i class="fas fa-bookmark"></i>
  <h2>Sua lista está vazia</h2>
  <p>Adicione filmes, séries e animes ao clicar em "Assistir Mais Tarde" no calendário ou nos detalhes.</p>
  <a href="index.html"><i class="fas fa-home"></i> Voltar ao início</a>
</div>

<!-- BOTTOM NAV MOBILE -->
<nav id="mobile-nav">
  <button class="mnav-btn" onclick="window.location.href='index.html'">
    <i class="fas fa-home"></i><span>Início</span>
  </button>
  <button class="mnav-btn" onclick="window.location.href='calendario.html'">
    <i class="fas fa-calendar-alt"></i><span>Calendário</span>
  </button>
  <button class="mnav-btn active">
    <i class="fas fa-bookmark"></i><span>Minha Lista</span>
  </button>
</nav>

<!-- TOAST -->
<div id="toast"></div>

<script src="watchlater.js"></script>
<script src="notifications.js"></script>
<script>
const IMG = 'https://image.tmdb.org/t/p';
let currentFilter = 'todos';

/* ── Utilitários ── */
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

function formatCountdown(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T00:00:00');
  const now = new Date(); now.setHours(0,0,0,0);
  const diff = Math.floor((d-now)/86400000);
  if(diff < 0) return `Disponível há ${Math.abs(diff)} dia${Math.abs(diff)>1?'s':''}`;
  if(diff === 0) return '🔴 Lança hoje!';
  if(diff === 1) return '⏰ Amanhã!';
  return `⏳ Em ${diff} dias`;
}

function isAvailable(dateStr){
  if(!dateStr) return true;
  const d = new Date(dateStr+'T00:00:00');
  return d <= new Date();
}

function typeLabel(item){
  const t = (item.type||'').toLowerCase();
  if(t.includes('anime') || t==='anime') return 'anime';
  if(t==='tv') return 'tv';
  return 'movie';
}

function typeIcon(item){
  const t=typeLabel(item);
  if(t==='anime') return '⛩️';
  if(t==='tv')    return '📺';
  return '🎬';
}

/* ── Render ── */
function render(){
  const list = getWatchLater();
  const filtered = list.filter(item=>{
    if(currentFilter==='todos') return true;
    if(currentFilter==='movie') return typeLabel(item)==='movie';
    if(currentFilter==='tv')    return typeLabel(item)==='tv';
    if(currentFilter==='anime') return typeLabel(item)==='anime';
    if(currentFilter==='futuro') return !isAvailable(item.release);
    if(currentFilter==='disponivel') return isAvailable(item.release);
    return true;
  });

  document.getElementById('count').textContent = `${list.length} título${list.length!==1?'s':''}`;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  if(!filtered.length){
    grid.innerHTML='';
    empty.style.display='flex';
    return;
  }
  empty.style.display='none';

  grid.innerHTML='';
  filtered.forEach(item=>{
    const poster = item.poster
      ? (item.poster.startsWith('http') ? item.poster : `${IMG}/w500${item.poster}`)
      : '';
    const countdown = formatCountdown(item.release);
    const available = isAvailable(item.release);
    const tLabel = typeLabel(item);
    const tIcon  = typeIcon(item);

    const card = document.createElement('div');
    card.className='wl-card';
    card.innerHTML=`
      ${poster
        ? `<img class="wl-poster" src="${poster}" alt="${item.title}" loading="lazy" onerror="this.outerHTML='<div class=\\'wl-no-poster\\'>${tIcon}</div>'">`
        : `<div class="wl-no-poster">${tIcon}</div>`}
      <span class="type-badge">${tIcon} ${tLabel==='movie'?'Filme':tLabel==='anime'?'Anime':'Série'}</span>
      <button class="remove-btn" onclick="event.stopPropagation();doRemove('${item.id}')" title="Remover">✕</button>
      ${countdown?`<div class="wl-countdown${available?' past':''}">${countdown}</div>`:''}
      <div class="wl-info">
        <div class="wl-title">${item.title}</div>
        <div class="wl-meta">${item.release||'Sem data'}</div>
      </div>
      <div class="wl-actions">
        <button class="btn-watch-now" onclick="event.stopPropagation();goWatch('${item.id}','${item.type||'movie'}')">
          <i class="fas fa-play"></i> Assistir
        </button>
        <button class="btn-remove" onclick="event.stopPropagation();doRemove('${item.id}')">
          <i class="fas fa-trash"></i> Remover
        </button>
      </div>`;
    card.onclick = () => goDetail(item.id, item.type||'movie');
    grid.appendChild(card);
  });
}

function doRemove(id){
  removeWatchLater(id);
  removeNotification(id);
  toast('🗑️ Removido da lista');
  render();
}

function goDetail(id, type){
  window.location.href = `detalhes.html?id=${id}&type=${type}`;
}

function goWatch(id, type){
  window.location.href = `detalhes.html?id=${id}&type=${type}&autoplay=1`;
}

function setFilter(f, btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

/* ── Permissão de notificação ao entrar na página ── */
requestNotifPermission();

render();
</script>
</body>
</html>
