<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Teste Calendário API</title>
<style>
body{background:#0a0a0a;color:#fff;font-family:monospace;padding:20px;}
h2{color:#e50914;margin-bottom:16px;}
.url{color:#aaa;font-size:12px;word-break:break-all;}
.result{margin:10px 0 20px;padding:12px;border-radius:6px;font-size:13px;line-height:1.6;}
.ok{background:#0d2e0d;border:1px solid #46d369;color:#46d369;}
.fail{background:#2e0d0d;border:1px solid #e50914;color:#ff6b6b;}
.pending{background:#1a1a1a;border:1px solid #333;color:#aaa;}
button{background:#e50914;color:#fff;border:none;padding:12px 24px;border-radius:6px;font-size:14px;cursor:pointer;margin-bottom:24px;}
button:hover{background:#b20710;}
pre{white-space:pre-wrap;word-break:break-all;max-height:200px;overflow-y:auto;margin-top:8px;font-size:11px;}
.sample{color:#f5c518;}
</style>
</head>
<body>
<h2>🔍 Diagnóstico — API do Calendário</h2>
<button onclick="runAll()">▶ Rodar todos os testes</button>
<div id="output"></div>

<script>
const TARGETS = [
  { label:'warezcdn.lat direto',       url:'https://warezcdn.lat/calendario.php',       mode:'direto' },
  { label:'superflixapi.best direto',  url:'https://superflixapi.best/calendario.php',  mode:'direto' },
  { label:'superflixapi.help direto',  url:'https://superflixapi.help/calendario.php',  mode:'direto' },
  { label:'warezcdn.lat allorigins',   url:'https://warezcdn.lat/calendario.php',       mode:'allorigins' },
  { label:'superflixapi.best allorigins', url:'https://superflixapi.best/calendario.php', mode:'allorigins' },
  { label:'warezcdn.lat corsproxy',    url:'https://warezcdn.lat/calendario.php',       mode:'corsproxy' },
  { label:'superflixapi.best corsproxy', url:'https://superflixapi.best/calendario.php', mode:'corsproxy' },
];

function div(t){ return document.getElementById(t); }

async function test(label, url, mode){
  const out = document.getElementById('output');
  const id = 'r'+Math.random().toString(36).slice(2);
  out.innerHTML += `<div class="url">[${mode}] ${label}</div><div class="result pending" id="${id}">⏳ Testando...</div>`;

  let fetchUrl = url;
  if(mode==='allorigins') fetchUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  if(mode==='corsproxy')  fetchUrl = `https://corsproxy.io/?${encodeURIComponent(url)}`;

  try{
    const r = await fetch(fetchUrl, {mode:'cors'});
    const text = await r.text();
    let parsed;
    try{
      if(mode==='allorigins'){
        const wrap = JSON.parse(text);
        parsed = JSON.parse(wrap.contents);
      } else {
        parsed = JSON.parse(text);
      }
    }catch(e){
      div(id).className='result fail';
      div(id).innerHTML=`❌ HTTP ${r.status} — resposta não é JSON válido<br><pre>${text.slice(0,300)}</pre>`;
      return;
    }

    const arr = Array.isArray(parsed) ? parsed : Object.values(parsed).find(v=>Array.isArray(v));
    if(arr && arr.length){
      const sample = arr[0];
      div(id).className='result ok';
      div(id).innerHTML=`✅ SUCESSO! ${arr.length} itens recebidos<br>
        <span class="sample">Campos do 1º item: ${Object.keys(sample).join(', ')}</span><br>
        <pre>${JSON.stringify(sample, null, 2)}</pre>`;
    } else {
      div(id).className='result fail';
      div(id).innerHTML=`⚠️ HTTP ${r.status} — JSON recebido mas sem array<br><pre>${text.slice(0,400)}</pre>`;
    }
  }catch(e){
    div(id).className='result fail';
    div(id).innerHTML=`❌ ERRO: ${e.message}`;
  }
}

async function runAll(){
  document.getElementById('output').innerHTML='';
  for(const t of TARGETS){
    await test(t.label, t.url, t.mode);
  }
  document.getElementById('output').innerHTML += '<div style="color:#aaa;margin-top:16px;font-size:13px;">✔ Todos os testes concluídos. Envie um print para diagnóstico.</div>';
}
</script>
</body>
</html>
