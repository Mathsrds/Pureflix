<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>PureFlix</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

:root{
 --red:#e50914;
 --bg:#141414;
 --text:#fff;
 --gray:#aaa;
}

*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

body{
 background:var(--bg);
 color:var(--text);
 font-family:Arial,sans-serif;
}

.hero{
 position:relative;
 height:70vh;
 background-size:cover;
 background-position:center;
}

.hero::after{
 content:'';
 position:absolute;
 inset:0;
 background:linear-gradient(
  to top,
  #141414,
  transparent 60%
 );
}

.hero-content{
 position:absolute;
 bottom:30px;
 left:20px;
 z-index:2;
}

.title{
 font-size:40px;
 font-weight:700;
 margin-bottom:10px;
}

.buttons{
 display:flex;
 gap:10px;
 margin-top:20px;
}

.btn{
 border:none;
 padding:12px 25px;
 border-radius:6px;
 cursor:pointer;
 font-weight:700;
}

.play{
 background:white;
 color:black;
}

.remind{
 background:#333;
 color:white;
}

.info{
 padding:20px;
}

.meta{
 color:#ccc;
 margin-bottom:20px;
}

.synopsis{
 line-height:1.6;
 color:#ddd;
}

.section{
 margin-top:35px;
}

.section h2{
 margin-bottom:15px;
}

.trailer iframe{
 width:100%;
 height:250px;
 border:none;
 border-radius:10px;
}

.episodes{
 display:flex;
 flex-direction:column;
 gap:10px;
}

.episode{
 background:#1f1f1f;
 padding:15px;
 border-radius:10px;
 cursor:pointer;
}

.related{
 display:flex;
 overflow-x:auto;
 gap:10px;
}

.related img{
 width:140px;
 border-radius:8px;
}

</style>
</head>

<body>

<div class="hero" id="hero">

 <div class="hero-content">

   <div class="title" id="title">
     Carregando...
   </div>

   <div class="buttons">

     <button class="btn play">
       <i class="fas fa-play"></i>
       Assistir Agora
     </button>

     <button class="btn remind">
       <i class="fas fa-bell"></i>
       Lembrar-me
     </button>

   </div>

 </div>

</div>

<div class="info">

 <div class="meta" id="meta"></div>

 <div class="synopsis" id="overview"></div>

 <div class="section trailer">

   <h2>Trailer</h2>

   <iframe id="trailer"></iframe>

 </div>

 <div class="section">

   <h2>Episódios</h2>

   <div class="episodes" id="episodes"></div>

 </div>

 <div class="section">

   <h2>Conteúdos Relacionados</h2>

   <div class="related" id="related"></div>

 </div>

</div>

<script src="js/detalhes.js"></script>

</body>
</html>
