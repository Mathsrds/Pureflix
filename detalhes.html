<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Teste Calendário</title>
<style>
body{background:#0a0a0a;color:#fff;font-family:monospace;padding:20px;max-width:900px;}
h2{color:#e50914;margin-bottom:4px;}
p{color:#aaa;font-size:12px;margin-bottom:16px;}
button{background:#e50914;color:#fff;border:none;padding:12px 24px;border-radius:6px;font-size:14px;cursor:pointer;margin-bottom:24px;margin-right:8px;}
button:hover{background:#b20710;}
.label{color:#888;font-size:11px;margin-bottom:4px;margin-top:16px;}
.box{padding:12px 14px;border-radius:6px;font-size:12px;line-height:1.7;word-break:break-all;}
.ok   {background:#0a2e0a;border:1px solid #46d369;color:#46d369;}
.fail {background:#2e0a0a;border:1px solid #e50914;color:#ff6b6b;}
.warn {background:#2e2000;border:1px solid #f5c518;color:#f5c518;}
.info {background:#111;border:1px solid #333;color:#aaa;}
pre{margin:6px 0 0;white-space:pre-wrap;word-break:break-all;max-height:180px;overflow-y:auto;color:#ccc;font-size:11px;background:#000;padding:8px;border-radius:4px;}
</style>
</head>
<body>
<h2>🔍 Diagnóstico Completo — Calendário PureFlix</h2>
<p>Testa o proxy PHP local e as APIs externas. Rode após colocar o <b>calendario-proxy.php</b> na pasta.</p>
<button onclick="runAll()">▶ Rodar todos os testes</button>
<button onclick="document.getElementById('out').innerHTML=''">🗑 Limpar</button>
<div id="out"></div>
<script>
const out=document.getElementById('out');
function add(label,cls,html){out.innerHTML+=`<div class="label">${label}</div><div class="box ${cls}">${html}</div>`;}
function lastBox(){const b=out.querySelectorAll('.box');return b[b.length-1];}

async function testPhpActive(){
  add('0. PHP ativo no servidor?','info','⏳ Testando...');
  const box=lastBox();
  try{
    const r=await fetch('calendario-proxy.php',{cache:'no-store'});
    const text=await r.text();
    if(r.status===404){
      box.className='box fail';
      box.innerHTML='❌ Arquivo não encontrado (404) — coloque <b>calendario-proxy.php</b> na mesma pasta do index.html';
    } else if(text.includes('<?php')||text.startsWith('<?')){
      box.className='box fail';
      box.innerHTML='❌ PHP <b>não está executando</b> — servidor devolveu o código-fonte. Precisa de Apache/Nginx+PHP.';
    } else {
      box.className='box ok';
      box.innerHTML='✅ PHP está ativo e executando';
    }
  }catch(e){box.className='box fail';box.innerHTML='❌ '+e.message;}
}

async function testProxy(){
  add('1. Proxy PHP → calendario-proxy.php','info','⏳ Testando...');
  const box=lastBox();
  try{
    const r=await fetch('calendario-proxy.php',{cache:'no-store'});
    const text=await r.text();
    let parsed;
    try{parsed=JSON.parse(text);}catch(e){
      box.className='box warn';
      box.innerHTML=`⚠️ HTTP ${r.status} — não é JSON válido<pre>${text.slice(0,400)}</pre>`;
      return;
    }
    if(parsed.error){
      box.className='box fail';
      box.innerHTML=`❌ Proxy retornou erro: <b>${parsed.error}</b><br>O servidor PHP também não consegue acessar as APIs externas (firewall no servidor).`;
      return;
    }
    const arr=Array.isArray(parsed)?parsed:Object.values(parsed).find(v=>Array.isArray(v));
    if(arr&&arr.length){
      box.className='box ok';
      box.innerHTML=`✅ SUCESSO! <b>${arr.length} itens</b><br>Campos: ${Object.keys(arr[0]).join(', ')}<pre>${JSON.stringify(arr[0],null,2)}</pre>`;
    } else {
      box.className='box warn';
      box.innerHTML=`⚠️ JSON recebido mas sem array<pre>${text.slice(0,400)}</pre>`;
    }
  }catch(e){box.className='box fail';box.innerHTML='❌ '+e.message;}
}

async function testDirect(n,url){
  add(`${n}. Direto: ${url.replace('https://','')}`, 'info','⏳ Testando...');
  const box=lastBox();
  try{
    const r=await fetch(url,{mode:'cors',cache:'no-store'});
    const text=await r.text();
    if(r.ok){
      try{
        const d=JSON.parse(text);
        const arr=Array.isArray(d)?d:Object.values(d).find(v=>Array.isArray(v));
        box.className='box ok';
        box.innerHTML=`✅ HTTP ${r.status} — ${arr?arr.length+' itens':'JSON sem array'}<pre>${text.slice(0,200)}</pre>`;
      }catch(e){
        box.className='box warn';
        box.innerHTML=`⚠️ HTTP ${r.status} mas não é JSON<pre>${text.slice(0,300)}</pre>`;
      }
    } else {
      box.className='box fail';
      box.innerHTML=`❌ HTTP ${r.status}<pre>${text.slice(0,200)}</pre>`;
    }
  }catch(e){
    box.className='box fail';
    box.innerHTML=`❌ CORS bloqueado: ${e.message}`;
  }
}

async function runAll(){
  out.innerHTML='';
  await testPhpActive();
  await testProxy();
  await testDirect(2,'https://warezcdn.lat/calendario.php');
  await testDirect(3,'https://superflixapi.best/calendario.php');
  await testDirect(4,'https://superflixapi.help/calendario.php');
  add('— Resultado Final —','info',
    '<b>Proxy OK?</b> → calendário vai funcionar.<br>'+
    '<b>Proxy com erro + diretos bloqueados</b> → firewall no servidor, precisa de outro host.<br>'+
    '<b>PHP não executa</b> → servidor não tem PHP ativo.<br>'+
    '<b>404</b> → arquivo no lugar errado.');
}
</script>
</body>
</html>
