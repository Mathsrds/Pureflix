<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PureFlix</title>

  <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0b0b0b;
      color:white;
      font-family:'Poppins', sans-serif;
      overflow-x:hidden;
    }

    header{
      width:100%;
      padding:20px 50px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:fixed;
      top:0;
      left:0;
      z-index:1000;
      background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
    }

    .logo{
      font-size:34px;
      font-weight:700;
      color:#e50914;
      letter-spacing:2px;
    }

    .hero{
      height:100vh;
      background:
      linear-gradient(to top, #0b0b0b 5%, rgba(0,0,0,0.2)),
      url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?q=80&w=1920&auto=format&fit=crop') center/cover;

      display:flex;
      align-items:center;
      padding:0 70px;
    }

    .hero-content{
      max-width:700px;
    }

    .hero h1{
      font-size:70px;
      margin-bottom:20px;
      line-height:1;
    }

    .hero p{
      font-size:18px;
</html>
