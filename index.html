# Pureflix Premium — HTML Completo

```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pureflix Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111;
  color:white;
  font-family:Roboto,sans-serif;
}

.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 40px;
  z-index:9999;
  background:linear-gradient(to bottom,rgba(0,0,0,.9),transparent);
}

.logo{
  font-family:'Bebas Neue',sans-serif;
  color:#e50914;
  font-size:42px;
}

nav{
  display:flex;
  gap:20px;
}

nav a{
  color:white;
  text-decoration:none;
}

.hero{
  height:85vh;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  padding:0 60px;
  position:relative;
}

.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#111 0%,transparent 60%);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:600px;
}

.badge{
  background:#e50914;
  padding:6px 12px;
  border-radius:4px;
}

.hero h1{
  font-size:72px;
  margin:20px 0;
}

.hero p{
  line-height:1.6;
  color:#ddd;
}

.buttons{
  margin-top:20px;
  display:flex;
  gap:12px;
}

.buttons button{
  border:none;
  padding:14px 26px;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
}

.play-btn{
  background:white;
}

.info-btn{
  background:rgba(255,255,255,.2);
  color:white;
}

main{
  padding:20px 40px 60px;
}

.row{
  margin-bottom:40px;
}

.row h2{
  margin-bottom:15px;
}

.cards{
  display:flex;
  gap:14px;
  overflow-x:auto;
  scroll-behavior:smooth;
  padding-bottom:10px;
}

.cards::-webkit-scrollbar{
  display:none;
}

.card{
  min-width:180px;
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:scale(1.07);
}

.card img{
  width:100%;
  border-radius:10px;
}

.card-title{
  margin-top:8px;
  font-size:14px;
}

.player-modal{
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
}

.player-modal iframe{
  width:100%;
  height:100%;
  border:none;
}

.hidden{
  display:none;
}

.close-player{
  position:absolute;
  top:20px;
  right:20px;
  z-index:10;
  border:none;
  width:40px;
  height:40px;
  border-radius:50%;
  background:red;
  color:white;
  cursor:pointer;
}

@media(max-width:768px){

  nav{
    display:none;
  }

  .hero{
    padding:0 20px;
  }

  .hero h1{
    font-size:42px;
  }

  .card{
    min-width:140px;
  }
}
</style>
</head>
<body>

<header class="navbar">

  <div class="logo">PUREFLIX</div>

  <nav>
    <a href="#">Início</a>
    <a href="#">Filmes</a>
    <a href="#">Séries</a>
    <a href="#">Animes</a>
  </nav>

</header>

<section class="hero" id="hero">

  <div class="overlay"></div>

  <div class="hero-content">

    <span class="badge">EM ALTA</span>

    <h1 id="hero-title">Carregando...</h1>

    <p id="hero-description"></p>

    <div class="buttons">
      <button class="play-btn">▶ Assistir</button>
      <button class="info-btn">ℹ Informações</button>
    </div>

  </div>

</section>

<main id="content"></main>

<div id="playerModal" class="player-modal hidden">

  <button class="close-player"
          onclick="closePlayer()">
    ✕
  </button>

  <iframe
    id="playerFrame"
    allowfullscreen>
  </iframe>

</div>

<script>

const BRIDGE_URL = 'https://SEU_BACKEND.up.railway.app';

const PLAYERS = {

  movie: (id) =>
    `https://myembed.biz/filme/${id}`,

  tv: (id, season = 1, episode = 1) =>
    `https://myembed.biz/serie/${id}/${season}/${episode}`
};

const categories = [

  {
    title: '🔥 Em Alta',
    endpoint: '/trending/all/day'
  },

  {
    title: '🎬 Filmes Populares',
    endpoint: '/movie/popular?language=pt-BR'
  },

  {
    title: '⭐ Top Filmes',
    endpoint: '/movie/top_rated?language=pt-BR'
  },

  {
    title: '📺 Séries Populares',
    endpoint: '/tv/popular?language=pt-BR'
  },

  {
    title: '🎌 Animes Clássicos',
    endpoint: '/discover/tv?with_genres=16&with_origin_country=JP&first_air_date.lte=2010-01-01'
  },

  {
    title: '🚀 Animes Novos',
    endpoint: '/discover/tv?with_genres=16&sort_by=popularity.desc'
  },

  {
    title: '🇰🇷 Doramas',
    endpoint: '/discover/tv?with_origin_country=KR'
  },

  {
    title: '🎥 Filmes Dublados',
    endpoint: '/discover/movie?watch_region=BR&sort_by=popularity.desc'
  }
];

const content = document.getElementById('content');

async function fetchData(endpoint){

  const cacheKey = endpoint;

  const cached = localStorage.getItem(cacheKey);

  if(cached){
    return JSON.parse(cached);
  }

  const res = await fetch(
    `${BRIDGE_URL}/tmdb${endpoint}`
  );

  const data = await res.json();

  localStorage.setItem(
    cacheKey,
    JSON.stringify(data)
  );

  return data;
}

async function loadHero(){

  try{

    const data = await fetchData('/trending/all/day');

    const random =
      data.results[
        Math.floor(Math.random() * data.results.length)
      ];

    const hero = document.getElementById('hero');

    hero.style.backgroundImage =
      `url(https://image.tmdb.org/t/p/original${random.backdrop_path})`;

    document.getElementById('hero-title').innerText =
      random.title || random.name;

    document.getElementById('hero-description').innerText =
      random.overview;

  }catch(err){
    console.error(err);
  }
}

async function createRows(){

  for(const category of categories){

    const data = await fetchData(category.endpoint);

    const row = document.createElement('section');

    row.className = 'row';

    row.innerHTML = `

      <h2>${category.title}</h2>

      <div class="cards">

        ${data.results.map(item => `

          <div class="card"
               onclick='openPlayer(${JSON.stringify(item)})'>

            <img
              loading="lazy"
              src="https://image.tmdb.org/t/p/w500${item.poster_path}">

            <div class="card-title">
              ${item.title || item.name}
            </div>

          </div>

        `).join('')}

      </div>
    `;

    content.appendChild(row);
  }
}

function openPlayer(item){

  const modal =
    document.getElementById('playerModal');

  const iframe =
    document.getElementById('playerFrame');

  modal.classList.remove('hidden');

  const type =
    item.media_type ||
    (item.first_air_date ? 'tv' : 'movie');

  if(type === 'movie'){

    iframe.src =
      PLAYERS.movie(item.id);

  }else{

    iframe.src =
      PLAYERS.tv(item.id,1,1);
  }

  saveContinueWatching(item);
}

function closePlayer(){

  const modal =
    document.getElementById('playerModal');

  const iframe =
    document.getElementById('playerFrame');

  iframe.src = '';

  modal.classList.add('hidden');
}

function saveContinueWatching(item){

  const list =
    JSON.parse(
      localStorage.getItem('continueWatching') || '[]'
    );

  const exists =
    list.find(i => i.id === item.id);

  if(!exists){

    list.unshift(item);

    localStorage.setItem(
      'continueWatching',
      JSON.stringify(list.slice(0,20))
    );
  }
}

loadHero();
createRows();

</script>

</body>
</html>
```
