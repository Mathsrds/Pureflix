<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Pureflix - Filmes e Séries Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --red:   #e50914;
      --black: #141414;
      --dark:  #0a0a0a;
      --white: #ffffff;
      --gray:  #e5e5e5;
      --dim:   #999;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--black); color: var(--white); overflow-x: hidden; scroll-behavior: smooth; }
    
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* LOADING */
    #premium-loader { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
    .spinner { width: 50px; height: 50px; border: 5px solid #222; border-top-color: var(--red); border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* HEADER */
    header { position: fixed; top: 0; width: 100%; padding: 0 4%; height: 68px; display: flex; align-items: center; z-index: 1000; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); transition: background 0.4s; }
    header.scrolled { background: var(--black); border-bottom: 1px solid #222; }
    .logo { color: var(--red); font-family: 'Bebas Neue', sans-serif; font-size: 35px; letter-spacing: 1px; cursor: pointer; margin-right: 40px; }
    nav { display: flex; gap: 20px; align-items: center; }
    .nav-item { color: var(--gray); font-size: 14px; cursor: pointer; transition: color 0.2s; text-decoration: none; }
    .nav-item:hover, .nav-item.active { color: white; font-weight: 500; }
    .header-right { display: flex; align-items: center; gap: 20px; margin-left: auto; }
    .header-right i { font-size: 18px; cursor: pointer; color: var(--gray); transition: color 0.2s; }
    .header-right i:hover { color: white; }

    /* BARRA DE PESQUISA */
    #search-bar { display: none; position: fixed; top: 68px; left: 0; right: 0; background: rgba(10,10,10,0.98); padding: 15px 4%; z-index: 999; border-bottom: 1px solid #252525; }
    #search-bar.open { display: flex; gap: 12px; }
    #search-input { flex: 1; background: #222; border: 1px solid #444; border-radius: 4px; padding: 12px; color: white; font-size: 15px; outline: none; }
    #search-btn { background: var(--red); color: white; border: none; padding: 0 25px; border-radius: 4px; font-weight: bold; cursor: pointer; }

    /* HERO */
    .hero { height: 75vh; position: relative; background: center/cover no-repeat; display: flex; flex-direction: column; justify-content: center; padding: 0 4%; }
    .hero::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--black) 5%, transparent 50%), linear-gradient(to right, rgba(0,0,0,0.8) 0%, transparent 60%); }
    .hero-content { max-width: 650px; position: relative; z-index: 1; }
    .hero-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(229, 9, 20, 0.2); border: 1px solid var(--red); color: white; font-size: 12px; font-weight: 700; padding: 5px 10px; border-radius: 4px; margin-bottom: 15px; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 65px; letter-spacing: 1px; line-height: 1.1; margin-bottom: 15px; }
    .hero-desc { font-size: 16px; color: #e5e5e5; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .hero-btns { display: flex; gap: 15px; margin-top: 25px; }
    .btn-play { background: white; color: black; border: none; padding: 12px 30px; border-radius: 4px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: opacity 0.2s;}
    .btn-play:hover { opacity: 0.8; }
    .btn-info { background: rgba(109,109,110,0.7); color: white; border: none; padding: 12px 30px; border-radius: 4px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; backdrop-filter: blur(5px); }

    /* CARROSSEL */
    .main-container { padding: 0 4% 50px; margin-top: -60px; position: relative; z-index: 10; display: flex; flex-direction: column; gap: 28px; }
    .row-container { position: relative; }
    .section-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; color: #fff; }
    .carousel-wrapper { position: relative; display: flex; align-items: center; }
    .movie-carousel { display: flex; gap: 8px; overflow-x: auto; scroll-behavior: smooth; padding: 10px 0; width: 100%; }
    .movie-carousel::-webkit-scrollbar { display: none; }
    
    .movie-card { flex: 0 0 calc(100% / 6 - 7px); aspect-ratio: 16/10; background: #181818; border-radius: 4px; overflow: hidden; cursor: pointer; transition: transform 0.3s ease, z-index 0.3s; position: relative; }
    .movie-card:hover { transform: scale(1.2) translateY(-5px); z-index: 99; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .movie-card img { width: 100%; height: 100%; object-fit: cover; }
    .card-info { position: absolute; bottom: 0; width: 100%; padding: 20px 10px 8px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; opacity: 0; transition: opacity 0.2s; }
    .movie-card:hover .card-info { opacity: 1; }

    .arrow-btn { position: absolute; top: 0; bottom: 0; width: 4%; background: rgba(0,0,0,0.5); border: none; color: white; font-size: 22px; cursor: pointer; z-index: 5; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }
    .carousel-wrapper:hover .arrow-btn { opacity: 1; }
    .arrow-btn:hover { background: rgba(0,0,0,0.8); }
    .arrow-left { left: -4%; }
    .arrow-right { right: -4%; }

    /* GRID */
    #page-grid-view { display: none; padding: 90px 4% 50px; }
    .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }

    /* PLAYER PÁGINA */
    #page-details { position: fixed; inset: 0; background: var(--black); z-index: 2000; display: none; overflow-y: auto; padding-top: 68px; }
    .details-hero { width: 100%; height: 400px; position: relative; background: center/cover no-repeat; }
    .details-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, var(--black) 10%, transparent 100%); }
    .details-container { max-width: 1200px; margin: 0 auto; padding: 20px 4% 80px; display: flex; flex-direction: column; gap: 25px; }
    
    .meta-layout { display: flex; gap: 35px; margin-top: -120px; position: relative; z-index: 10; }
    .details-poster { width: 200px; flex-shrink: 0; border-radius: 6px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .details-poster img { width: 100%; height: auto; display: block; }
    .details-info { flex: 1; padding-top: 40px; }
    .details-title { font-family: 'Bebas Neue', sans-serif; font-size: 50px; margin-bottom: 10px; }
    .details-meta { display: flex; align-items: center; gap: 15px; font-weight: bold; margin-bottom: 15px; }
    .meta-rating { color: #46d369; }
    .meta-year { color: #aaa; }
    .meta-hd { border: 1px solid #555; padding: 1px 5px; border-radius: 3px; font-size: 11px; }
    .details-synopsis { font-size: 16px; line-height: 1.6; color: #ccc; }
    
    .action-row { display: flex; gap: 15px; margin-top: 15px; }
    .btn-fav { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid #444; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
    .btn-fav.active { color: var(--red); background: rgba(229,9,20,0.1); border-color: var(--red); }

    /* CONTROLES PLAYER */
    .player-section { background: #111; padding: 20px; border-radius: 6px; border: 1px solid #222; }
    .player-header { display: flex; flex-wrap: wrap; gap: 15px; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .selector-group { display: flex; gap: 15px; flex-wrap: wrap; }
    .selector-item { display: flex; flex-direction: column; gap: 5px; }
    .selector-item label { font-size: 11px; text-transform: uppercase; color: #666; font-weight: bold; }
    select { background: #222; color: #fff; border: 1px solid #444; padding: 8px 12px; border-radius: 4px; outline: none; cursor: pointer; min-width: 130px; }
    
    .player-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 4px; overflow: hidden; position: relative; }
    #det-frame { width: 100%; height: 100%; border: none; }
    
    #player-error-fallback { position: absolute; inset: 0; background: #050505; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; z-index: 10; }
    .btn-close-page { position: fixed; top: 15px; right: 4%; font-size: 20px; cursor: pointer; z-index: 2100; color: white; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .btn-close-page:hover { background: #000; }

    @media (max-width: 768px) {
      .meta-layout { flex-direction: column; align-items: center; text-align: center; margin-top: -40px; }
      .details-poster { width: 140px; }
      .details-title { font-size: 32px; }
      nav { display: none; }
      .movie-card { flex: 0 0 calc(100% / 3 - 6px); }
      .arrow-btn { display: none !important; }
    }
  </style>
</head>
<body>

<div id="premium-loader"><div class="logo" style="margin-bottom:20px;">PUREFLIX</div><div class="spinner"></div></div>

<header id="navbar">
  <div class="logo" onclick="window.location.hash=''">PUREFLIX</div>
  <nav>
    <a href="#" class="nav-item active" onclick="switchTab('home')">Início</a>
    <a href="#" class="nav-item" onclick="filterStatic('movie')">Filmes</a>
    <a href="#" class="nav-item" onclick="filterStatic('tv')">Séries</a>
    <a href="#" class="nav-item" onclick="showFavorites()">Minha Lista</a>
  </nav>
  <div class="header-right">
    <i class="fas fa-search" onclick="toggleSearch()"></i>
  </div>
</header>

<div id="search-bar">
  <input id="search-input" type="text" placeholder="Pesquisar filmes, séries ou animes...">
  <button id="search-btn" onclick="executeSearch()"><i class="fas fa-search"></i></button>
</div>

<div id="page-home">
  <section class="hero" id="hero-banner">
    <div class="hero-content">
      <span class="hero-badge"><i class="fas fa-fire"></i> Conteúdo em Português</span>
      <h1 class="hero-title" id="hero-title">Carregando catálogo...</h1>
      <p class="hero-desc" id="hero-desc"></p>
      <div class="hero-btns">
        <button class="btn-play" id="hero-play-btn"><i class="fas fa-play"></i> Assistir</button>
        <button class="btn-info" id="hero-info-btn"><i class="fas fa-info-circle"></i> Detalhes</button>
      </div>
    </div>
  </section>
  <div class="main-container" id="carousels-container"></div>
</div>

<div id="page-grid-view">
  <h2 class="section-title" id="grid-view-title">Resultados</h2>
  <div class="grid-layout" id="grid-view-content"></div>
</div>

<div id="page-details">
  <div class="btn-close-page" onclick="closeDetails()"><i class="fas fa-times"></i></div>
  <div class="details-hero" id="det-backdrop"></div>
  <div class="details-container">
    <div class="meta-layout">
      <div class="details-poster"><img id="det-poster" src="" alt="Poster"></div>
      <div class="details-info">
        <h1 id="det-title" class="details-title">Título</h1>
        <div class="details-meta">
          <span id="det-rating" class="meta-rating">⭐ 0.0</span>
          <span id="det-year" class="meta-year">0000</span>
          <span class="meta-hd">1080p</span>
          <span id="det-type-badge" class="meta-hd"></span>
        </div>
        <p id="det-synopsis" class="details-synopsis">Sinopse...</p>
        <div class="action-row">
          <button id="btn-add-fav" class="btn-fav" onclick="toggleFavoriteCurrent()"><i class="fas fa-plus"></i></button>
          <span style="align-self:center; font-size:14px; color:#aaa;">Minha Lista</span>
        </div>
      </div>
    </div>

    <div class="player-section">
      <div class="player-header">
        <div class="selector-group">
          <div class="selector-item" id="wrapper-season" style="display:none;">
            <label>Temporada</label>
            <select id="select-season" onchange="onSeasonChange()"></select>
          </div>
          <div class="selector-item" id="wrapper-episode" style="display:none;">
            <label>Episódio</label>
            <select id="select-episode" onchange="loadCurrentSelectedStream()"></select>
          </div>
          <div class="selector-item">
            <label>Áudio Preferencial</label>
            <select id="select-audio" onchange="loadCurrentSelectedStream()">
              <option value="dub">Dublado / PT-BR</option>
              <option value="leg">Original / Legendado</option>
            </select>
          </div>
          <div class="selector-item">
            <label>Servidor</label>
            <select id="select-server" onchange="loadCurrentSelectedStream()">
              <option value="superembed">SuperEmbed (BR - Dublagem Focada)</option>
              <option value="vidsrc_to">VidSrc.to (Internacional)</option>
              <option value="vidsrc_me">VidSrc.me</option>
              <option value="vidsrc_xyz">VidSrc.xyz</option>
            </select>
          </div>
        </div>
      </div>
      <div class="player-box">
        <div id="player-error-fallback">
          <i class="fas fa-sync-alt fa-spin" style="font-size:35px; color:var(--red); margin-bottom:15px"></i>
          <h3>Alternando Rota Automática</h3>
          <p style="color:#aaa; font-size:13px; margin-top:5px;">Buscando rota estável de transmissão...</p>
        </div>
        <iframe id="det-frame" allowfullscreen sandbox="allow-forms allow-modals allow-pointer-lock allow-popups allow-same-origin allow-scripts"></iframe>
      </div>
    </div>
  </div>
</div>

<script>
  // =========================================================================================
  // Troque para 'http://localhost:3000' se você for iniciar o Node local no terminal do seu PC
  // =========================================================================================
  const BRIDGE_URL = 'https://3000-i4ey8w62o2n6d0gznpsvz-9b402bb6.us2.manus.computer'; 

  const CATEGORIES = [
    { title: "Continuar Assistindo", endpoint: "continue-watching", type: "custom" },
    { title: "Lançamentos Imperdíveis", endpoint: "api/list/movie/now_playing" },
    { title: "Filmes de Ação", endpoint: "api/discover/movie?with_genres=28" },
    { title: "Séries em Alta", endpoint: "api/list/tv/popular" },
    { title: "Comédias para Rir Muito", endpoint: "api/discover/movie?with_genres=35" },
    { title: "Animes e Animações", endpoint: "api/discover/movie?with_genres=16" },
    { title: "Terror e Suspense", endpoint: "api/discover/movie?with_genres=27,53" },
    { title: "Documentários", endpoint: "api/discover/movie?with_genres=99" }
  ];

  let currentMediaId = null;
  let currentMediaType = 'movie';
  let currentServerIndex = 0;
  const SERVERS_ORDER = ['superembed', 'vidsrc_to', 'vidsrc_me', 'vidsrc_xyz'];

  const storage = {
    get: (key) => JSON.parse(localStorage.getItem(`pureflix_${key}`)) || [],
    set: (key, val) => localStorage.setItem(`pureflix_${key}`, JSON.stringify(val))
  };

  window.onscroll = () => { document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40); };

  window.onload = async () => {
    try {
      await loadHeroBanner();
      await buildHomeCarousels();
    } catch (e) {
      console.error("Erro ao renderizar Pureflix:", e);
    } finally {
      document.getElementById('premium-loader').style.opacity = '0';
      setTimeout(() => document.getElementById('premium-loader').style.display = 'none', 500);
    }
    window.onhashchange = handleHashRouter;
    handleHashRouter();
  };

  function handleHashRouter() {
    const h = window.location.hash;
    if (h.startsWith('#movie/')) {
      const parts = h.replace('#movie/', '').split('/');
      openPlayerView(parts[0], parts[1]);
    } else {
      closeDetails();
    }
  }

  async function loadHeroBanner() {
    try {
      const res = await fetch(`${BRIDGE_URL}/api/list/movie/popular`);
      const list = await res.json();
      if(list && list.length > 0) {
        const item = list[0];
        document.getElementById('hero-banner').style.backgroundImage = `url(https://image.tmdb.org/t/p/w1280${item.backdrop_path})`;
        document.getElementById('hero-title').innerText = item.title || item.name;
        document.getElementById('hero-desc').innerText = item.overview || "Sinopse não disponível em português.";
        const action = () => window.location.hash = `#movie/${item.id}/movie`;
        document.getElementById('hero-play-btn').onclick = action;
        document.getElementById('hero-info-btn').onclick = action;
      }
    } catch(e) { console.error(e); }
  }

  async function buildHomeCarousels() {
    const container = document.getElementById('carousels-container');
    if(!container) return;
    container.innerHTML = '';

    for (let cat of CATEGORIES) {
      let items = [];
      if (cat.type === "custom") {
        if(cat.endpoint === "continue-watching") items = storage.get('history');
      } else {
        items = await fetchCategoryData(cat.endpoint);
      }
      if(!items || items.length === 0) continue;

      const row = document.createElement('div');
      row.className = 'row-container';
      const uId = 'slider_' + Math.random().toString(36).substr(2, 9);
      row.innerHTML = `
        <h2 class="section-title">${cat.title}</h2>
        <div class="carousel-wrapper">
          <button class="arrow-btn arrow-left" onclick="scrollCarousel('${uId}', -1)"><i class="fas fa-chevron-left"></i></button>
          <div class="movie-carousel" id="${uId}"></div>
          <button class="arrow-btn arrow-right" onclick="scrollCarousel('${uId}', 1)"><i class="fas fa-chevron-right"></i></button>
        </div>
      `;
      container.appendChild(row);

      const track = document.getElementById(uId);
      items.forEach(item => {
        if(!item.backdrop_path && !item.poster_path) return;
        const card = document.createElement('div');
        card.className = 'movie-card';
        card.onclick = () => window.location.hash = `#movie/${item.id}/${cat.endpoint.includes('tv') ? 'tv' : 'movie'}`;
        const imgUrl = item.backdrop_path ? `https://image.tmdb.org/t/p/w500${item.backdrop_path}` : `https://image.tmdb.org/t/p/w500${item.poster_path}`;
        card.innerHTML = `<img src="${imgUrl}" loading="lazy"><div class="card-info">${item.title || item.name}</div>`;
        track.appendChild(card);
      });
    }
  }

  async function fetchCategoryData(endpoint) {
    try {
      const res = await fetch(`${BRIDGE_URL}/${endpoint}`);
      return await res.json();
    } catch(e) { return []; }
  }

  function scrollCarousel(id, dir) {
    const el = document.getElementById(id);
    if(el) el.scrollBy({ left: (el.clientWidth * 0.75) * dir, behavior: 'smooth' });
  }

  function toggleSearch() {
    const b = document.getElementById('search-bar'); b.classList.toggle('open');
    if(b.classList.contains('open')) document.getElementById('search-input').focus();
  }

  document.getElementById('search-input').onkeydown = (e) => { if(e.key === 'Enter') executeSearch(); };

  async function executeSearch() {
    const q = document.getElementById('search-input').value.trim();
    if(!q) return;
    document.getElementById('page-home').style.display = 'none';
    const g = document.getElementById('page-grid-view'); g.style.display = 'block';
    document.getElementById('grid-view-title').innerText = `Busca: "${q}"`;
    try {
      const res = await fetch(`${BRIDGE_URL}/api/search?q=${encodeURIComponent(q)}`);
      renderGridItems(await res.json());
    } catch(e) { console.error(e); }
  }

  function renderGridItems(items) {
    const grid = document.getElementById('grid-view-content'); grid.innerHTML = '';
    if(!items || items.length === 0) { grid.innerHTML = '<p style="color:#aaa;">Nenhum conteúdo encontrado.</p>'; return; }
    items.forEach(item => {
      const card = document.createElement('div'); card.className = 'movie-card'; card.style.flex = "initial";
      card.onclick = () => window.location.hash = `#movie/${item.id}/${item.media_type || 'movie'}`;
      const img = item.backdrop_path ? `https://image.tmdb.org/t/p/w500${item.backdrop_path}` : `https://image.tmdb.org/t/p/w500${item.poster_path}`;
      card.innerHTML = `<img src="${img || 'https://via.placeholder.com/500x280?text=Sem+Capa'}"><div class="card-info">${item.title || item.name}</div>`;
      grid.appendChild(card);
    });
  }

  async function filterStatic(type) {
    document.getElementById('page-home').style.display = 'none';
    const g = document.getElementById('page-grid-view'); g.style.display = 'block';
    document.getElementById('grid-view-title').innerText = type === 'movie' ? 'Filmes Populares' : 'Séries Populares';
    renderGridItems(await fetchCategoryData(`api/list/${type}/popular`));
  }

  async function openPlayerView(id, type) {
    currentMediaId = id; currentMediaType = type; currentServerIndex = 0;
    document.getElementById('page-details').style.display = 'block';
    document.getElementById('player-error-fallback').style.display = 'none';
    try {
      const res = await fetch(`${BRIDGE_URL}/api/details/${type}/${id}`);
      const data = await res.json();
      document.getElementById('det-title').innerText = data.title || data.name;
      document.getElementById('det-synopsis').innerText = data.overview || "Sinopse em português pendente no catálogo.";
      document.getElementById('det-year').innerText = (data.release_date || data.first_air_date || '----').split('-')[0];
      document.getElementById('det-rating').innerText = `⭐ ${(data.vote_average || 0).toFixed(1)}`;
      document.getElementById('det-type-badge').innerText = type === 'tv' ? 'Série' : 'Filme';
      document.getElementById('det-poster').src = `https://image.tmdb.org/t/p/w500${data.poster_path}`;
      document.getElementById('det-backdrop').style.backgroundImage = `url(https://image.tmdb.org/t/p/w1280${data.backdrop_path})`;
      
      updateFavoriteBadgeState(id);
      addToHistory(data, type);

      if (type === 'tv') {
        document.getElementById('wrapper-season').style.display = 'block';
        document.getElementById('wrapper-episode').style.display = 'block';
        buildSeasonDropdown(data.seasons || []);
      } else {
        document.getElementById('wrapper-season').style.display = 'none';
        document.getElementById('wrapper-episode').style.display = 'none';
        loadCurrentSelectedStream();
