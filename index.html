<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PureFlix Ultra - Bibliotecas Integradas</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ background:#0b0b0b; color:white; font-family:'Poppins', sans-serif; overflow-x:hidden; }
    
    header{ 
      width:100%; padding:15px 50px; display:flex; justify-content:space-between; align-items:center; 
      position:fixed; top:0; left:0; z-index:1000; background:rgba(0,0,0,0.95); border-bottom: 1px solid #222;
    }
    .logo{ font-size:28px; font-weight:700; color:#e50914; letter-spacing:2px; cursor: pointer; }

    .container{ max-width: 1200px; margin: 100px auto 50px; padding: 0 20px; }

    .search-section{ text-align: center; margin-bottom: 40px; }
    .search-section h1{ font-size: 42px; margin-bottom: 10px; }
    
    .input-group{ max-width: 700px; margin: 20px auto; display: flex; flex-direction: column; gap: 15px; }
    .search-container{ display: flex; gap: 10px; }
    
    input{ 
      flex:1; padding:15px; border:none; border-radius:8px; background:#1e1e1e; 
      color:white; font-size:16px; outline:none; border: 2px solid transparent; transition: 0.3s; 
    }
    input:focus{ border-color: #e50914; }
    
    button{ 
      padding:15px 25px; border:none; border-radius:8px; background:#e50914; 
      color:white; font-size:16px; font-weight:600; cursor:pointer; transition:0.3s; 
    }
    button:hover{ background:#ff1f29; transform: translateY(-2px); }
    button.secondary{ background: #333; }

    /* Resultados da Busca */
    .results-grid{ 
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
      gap: 20px; margin-top: 30px; display: none;
    }
    .result-card{ 
      background: #181818; border-radius: 12px; padding: 20px; border: 1px solid #333;
      transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; position: relative;
    }
    .result-card:hover{ border-color: #e50914; background: #222; transform: scale(1.02); }
    
    .source-badge{ position: absolute; top: 10px; right: 10px; background: #2980b9; color: white; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; }
    .best-badge{ background: #e50914; margin-right: 5px; }

    .result-title{ font-size: 15px; font-weight: 600; margin-bottom: 10px; color: #fff; line-height: 1.4; padding-right: 60px; }
    .result-meta{ font-size: 12px; color: #888; display: flex; justify-content: space-between; align-items: center; }
    .seeders{ color: #2ecc71; font-weight: bold; }

    /* Player Section */
    #player-section{ display: none; margin-top: 30px; }
    .player-wrapper{ 
      background: #000; border-radius: 15px; overflow: hidden; 
      box-shadow: 0 10px 50px rgba(0,0,0,0.8); position: relative;
    }
    video, audio{ width: 100%; max-height: 70vh; display: block; background: #000; }
    
    .status-bar{ 
      background: #181818; padding: 15px 20px; border-radius: 0 0 15px 15px; 
      border: 1px solid #333; border-top: none;
    }
    .info-row{ display: flex; justify-content: space-between; font-size: 13px; color: #aaa; margin-bottom: 5px; }

    #loading-overlay{
      position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000;
      display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; padding: 20px;
    }
    .spinner{ width: 50px; height: 50px; border: 5px solid #333; border-top-color: #e50914; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
    @keyframes spin{ to{ transform: rotate(360deg); } }

    @media(max-width: 768px){
      header{ padding: 15px 20px; }
      .container{ margin-top: 80px; }
      .search-section h1{ font-size: 30px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="location.reload()">PUREFLIX</div>
</header>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p id="loading-text" style="font-weight: 600; font-size: 18px;">Extraindo da Biblioteca...</p>
</div>

<div class="container">
  
  <section class="search-section">
    <h1>Bibliotecas Integradas</h1>
    <p style="color: #888;">Pesquisando em HDRTorrent, Blogs de Cinema e Fontes Globais.</p>
    
    <div class="input-group">
      <div class="search-container">
        <input type="text" id="search-input" placeholder="O que você quer assistir hoje?" onkeypress="if(event.key==='Enter') searchTorrents()" />
        <button id="search-btn" onclick="searchTorrents()">Buscar</button>
      </div>
      
      <div class="search-container">
        <input type="text" id="magnet-input" placeholder="Ou cole o magnet link aqui..." />
        <button class="secondary" onclick="playWithBridge(document.getElementById('magnet-input').value, 'Link Manual')">Abrir Link</button>
      </div>
    </div>
  </section>

  <div id="results-grid" class="results-grid"></div>

  <section id="player-section">
    <div class="player-wrapper" id="video-container"></div>
    <div class="status-bar">
      <div class="info-row">
        <span id="status-text" style="color: #2ecc71; font-weight: bold;">✓ Streaming Ativo</span>
        <span id="stream-info">Ponte Turbo Ativada</span>
      </div>
      <div id="file-name" style="font-size: 13px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Arquivo: Carregando...</div>
      <div style="margin-top: 15px; display: flex; gap: 10px;">
        <button onclick="document.querySelector('video, audio')?.requestFullscreen()" style="padding: 8px 15px; font-size: 12px;">Tela Cheia</button>
        <button onclick="location.reload()" style="padding: 8px 15px; font-size: 12px; background: #333;">Fechar Player</button>
      </div>
    </div>
  </section>

</div>

<script>
  const BRIDGE_URL = 'https://3000-i4ey8w62o2n6d0gznpsvz-9b402bb6.us2.manus.computer';

  async function searchTorrents() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;

    const btn = document.getElementById('search-btn');
    const grid = document.getElementById('results-grid');
    
    btn.disabled = true;
    btn.innerText = 'Buscando...';
    grid.innerHTML = '';
    grid.style.display = 'grid';
    document.getElementById('player-section').style.display = 'none';

    try {
      const response = await fetch(`${BRIDGE_URL}/search?q=${encodeURIComponent(query)}`);
      const data = await response.json();

      if (!data || data.length === 0) {
        grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #888;">Nenhum resultado encontrado.</p>';
      } else {
        data.forEach((item, index) => {
          const magnet = item.info_hash ? `magnet:?xt=urn:btih:${item.info_hash}&dn=${encodeURIComponent(item.name)}` : item.magnet;
          const card = document.createElement('div');
          card.className = 'result-card';
          card.onclick = () => playWithBridge(magnet, item.name);
          
          const sizeGB = (item.size / 1024 / 1024 / 1024).toFixed(2);
          const sourceClass = item.source === 'Biblioteca' ? 'source-badge' : 'source-badge best-badge';
          
          card.innerHTML = `
            <div class="${sourceClass}">${item.source}</div>
            <div class="result-title">${item.name}</div>
            <div class="result-meta">
              <span>${sizeGB} GB</span>
              <span class="seeders">Seeds: ${item.seeders}</span>
            </div>
          `;
          grid.appendChild(card);
        });
      }
    } catch (error) {
      grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #e50914;">Erro na busca.</p>';
    } finally {
      btn.disabled = false;
      btn.innerText = 'Buscar';
      grid.scrollIntoView({ behavior: 'smooth' });
    }
  }

  function playWithBridge(magnet, name) {
    if(!magnet) return alert('Magnet link inválido.');
    document.getElementById('loading-overlay').style.display = 'flex';
    document.getElementById('results-grid').style.display = 'none';
    document.getElementById('file-name').innerText = 'Arquivo: ' + name;
    
    const streamUrl = `${BRIDGE_URL}/stream?magnet=${encodeURIComponent(magnet)}`;
    const container = document.getElementById('video-container');
    container.innerHTML = '';

    const video = document.createElement('video');
    video.controls = true;
    video.autoplay = true;
    video.style.width = '100%';
    
    const source = document.createElement('source');
    source.src = streamUrl;
    video.appendChild(source);
    container.appendChild(video);

    video.oncanplay = () => {
      document.getElementById('loading-overlay').style.display = 'none';
      document.getElementById('player-section').style.display = 'block';
      document.getElementById('player-section').scrollIntoView({ behavior: 'smooth' });
    };

    video.onerror = () => {
      document.getElementById('loading-overlay').style.display = 'none';
      alert('Erro ao carregar o vídeo.');
    };
  }
</script>

</body>
</html>
