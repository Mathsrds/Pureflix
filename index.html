<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PureFlix Pro - Streaming Fluido</title>

  <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ background:#0b0b0b; color:white; font-family:'Poppins', sans-serif; overflow-x:hidden; }
    header{ width:100%; padding:20px 50px; display:flex; justify-content:space-between; align-items:center; position:fixed; top:0; left:0; z-index:1000; background:linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); }
    .logo{ font-size:34px; font-weight:700; color:#e50914; letter-spacing:2px; }
    .hero{ min-height:100vh; background: linear-gradient(to top, #0b0b0b 5%, rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?q=80&w=1920&auto=format&fit=crop') center/cover; display:flex; align-items:center; padding:100px 70px 50px 70px; }
    .hero-content{ max-width:800px; width:100%; }
    .hero h1{ font-size:60px; margin-bottom:20px; line-height:1.1; }
    .hero p{ font-size:18px; color:#ddd; margin-bottom:25px; }
    .search-box{ display:flex; gap:15px; flex-wrap:wrap; margin-bottom:20px; }
    input{ flex:1; min-width:300px; padding:18px; border:none; border-radius:10px; background:#1e1e1e; color:white; font-size:16px; outline:none; border: 2px solid transparent; transition: 0.3s; }
    input:focus{ border-color: #e50914; }
    button{ padding:18px 25px; border:none; border-radius:10px; background:#e50914; color:white; font-size:16px; font-weight:600; cursor:pointer; transition:0.3s; }
    button:hover{ transform:scale(1.05); background:#ff1f29; }
    button.secondary{ background: #333; }
    button.secondary:hover{ background: #444; }
    .status-container{ background: rgba(0,0,0,0.6); padding:20px; border-radius:15px; margin-top:20px; border: 1px solid #333; }
    .status{ color:#eee; font-size:15px; margin-bottom:10px; display: flex; justify-content: space-between; }
    .progress-bar{ width:100%; height:10px; background:#222; border-radius:50px; overflow:hidden; position: relative; }
    .progress{ height:100%; width:0%; background:#e50914; transition:0.3s; position: absolute; z-index: 2; }
    .buffer-progress{ height:100%; width:0%; background:rgba(255,255,255,0.2); transition:0.3s; position: absolute; z-index: 1; }
    .main-content{ padding:40px 60px; }
    #video-container{ width:100%; margin-top:30px; border-radius:18px; overflow:hidden; background:black; box-shadow:0 0 40px rgba(0,0,0,0.8); min-height: 300px; display: flex; align-items: center; justify-content: center; }
    video, audio{ width:100%; max-height:80vh; background:black; outline: none; }
    audio{ height: 80px; background: #111; padding: 10px; }
    .controls{ margin-top:20px; display:flex; gap:10px; flex-wrap:wrap; }
    .badge{ padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
    .badge-buffer{ background: #f39c12; color: #000; }
    .badge-ready{ background: #2ecc71; color: #000; }
    @media(max-width:768px){ .hero{ padding:100px 25px 50px 25px; } .hero h1{ font-size:40px; } .main-content{ padding:30px 20px; } header{ padding:20px; } }
  </style>
</head>
<body>

<div id="loading-screen" style="position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:9999;font-size:28px;font-weight:700;color:#e50914;">
  PUREFLIX PRO
</div>

<header>
  <div class="logo">PUREFLIX</div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1>Streaming Inteligente</h1>
    <p>Suporte a Vídeo (MP4, MKV) e Áudio (MP3). Sistema de buffer agressivo para evitar travamentos.</p>

    <div class="search-box">
      <input type="text" id="magnet" placeholder="Cole o magnet link aqui..." />
      <button onclick="playTorrent()">Assistir Agora</button>
    </div>

    <div class="controls">
      <button class="secondary" onclick="toggleMute()">Mudar Áudio</button>
      <button class="secondary" onclick="toggleFullscreen()">Tela Cheia</button>
      <button class="secondary" onclick="clearPlayer()">Limpar Player</button>
    </div>

    <div class="status-container" id="status-box" style="display:none;">
      <div class="status">
        <span id="status-text">Iniciando...</span>
        <span id="media-type" class="badge"></span>
      </div>
      <div class="progress-bar">
        <div class="buffer-progress" id="buffer-progress"></div>
        <div class="progress" id="progress"></div>
      </div>
      <div style="margin-top:10px; font-size:12px; color:#888; display:flex; justify-content:space-between;">
        <span id="download-speed">Velocidade: 0 KB/s</span>
        <span id="peers-count">Seeds: 0</span>
      </div>
    </div>
  </div>
</section>

<section class="main-content">
  <div id="video-container">
    <div style="color:#444; text-align:center;">O player aparecerá aqui após carregar o link.</div>
  </div>
</section>

<script>
  window.addEventListener('load', () => {
    setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 800);
  });

  let client = null;
  if(typeof WebTorrent !== 'undefined'){
    client = new WebTorrent();
  }

  let currentTorrent = null;
  let bufferInterval = null;

  function playTorrent(){
    if(!client) return alert('WebTorrent não carregado.');
    const magnetURI = document.getElementById('magnet').value.trim();
    if(!magnetURI) return alert('Cole um link magnet válido.');

    document.getElementById('status-box').style.display = 'block';
    document.getElementById('status-text').innerText = 'Buscando metadados...';
    
    if(currentTorrent){
      client.remove(currentTorrent.infoHash, () => startNewTorrent(magnetURI));
    } else {
      startNewTorrent(magnetURI);
    }
  }

  function startNewTorrent(uri){
    // Limpar estados anteriores
    if(bufferInterval) clearInterval(bufferInterval);
    document.getElementById('progress').style.width = '0%';
    document.getElementById('buffer-progress').style.width = '0%';

    client.add(uri, torrent => {
      currentTorrent = torrent;
      
      // Identificar o arquivo principal (Vídeo ou Áudio)
      const file = torrent.files.find(f => {
        const name = f.name.toLowerCase();
        return name.endsWith('.mp4') || name.endsWith('.mkv') || name.endsWith('.webm') || 
               name.endsWith('.mp3') || name.endsWith('.wav') || name.endsWith('.ogg');
      });

      if(!file){
        document.getElementById('status-text').innerText = 'Nenhum arquivo compatível encontrado.';
        return;
      }

      const isAudio = file.name.toLowerCase().endsWith('.mp3') || file.name.toLowerCase().endsWith('.wav');
      const typeBadge = document.getElementById('media-type');
      typeBadge.innerText = isAudio ? 'Áudio' : 'Vídeo';
      typeBadge.className = 'badge badge-buffer';

      // ESTRATÉGIA DE BUFFER AGRESSIVO
      // Priorizamos o download das primeiras partes do arquivo
      file.deselect(); 
      file.select(); // Seleciona o arquivo principal com prioridade

      // Monitorar progresso e velocidade
      torrent.on('download', () => {
        const speed = (torrent.downloadSpeed / 1024 / 1024).toFixed(2);
        document.getElementById('download-speed').innerText = `Velocidade: ${speed} MB/s`;
        document.getElementById('peers-count').innerText = `Seeds: ${torrent.numPeers}`;
        
        const totalProgress = (torrent.progress * 100).toFixed(1);
        document.getElementById('buffer-progress').style.width = totalProgress + '%';
      });

      document.getElementById('status-text').innerText = 'Criando buffer de segurança...';

      // Renderizar o player
      const container = document.getElementById('video-container');
      container.innerHTML = '';
      
      file.renderTo(container, {
        autoplay: false, // Não inicia sozinho para garantir o buffer inicial
        controls: true
      }, (err, elem) => {
        if(err) return console.error(err);

        // Quando o player estiver pronto, aplicamos a lógica de fluidez
        elem.onwaiting = () => {
          document.getElementById('status-text').innerText = 'Buffering... (Aguarde)';
          typeBadge.className = 'badge badge-buffer';
        };

        elem.onplaying = () => {
          document.getElementById('status-text').innerText = 'Reproduzindo com fluidez';
          typeBadge.className = 'badge badge-ready';
        };

        // Lógica de "10 minutos" ou Buffer Inicial
        // Como não sabemos o bitrate exato, garantimos que pelo menos 2% ou 5MB iniciais existam
        // WebTorrent já prioriza o início, mas vamos forçar um delay de segurança se a internet for lenta
        let bufferReady = false;
        const checkBuffer = setInterval(() => {
          // Se já baixou 1% ou tem 3 seeds estáveis, liberamos o play
          if(!bufferReady && (torrent.progress > 0.01 || torrent.numPeers > 2)){
            bufferReady = true;
            elem.play().catch(e => console.log("Autoplay bloqueado, clique no play"));
            document.getElementById('status-text').innerText = 'Buffer pronto!';
            container.scrollIntoView({ behavior: 'smooth' });
            clearInterval(checkBuffer);
          }
        }, 1000);

        // Atualizar barra de progresso do player real
        elem.ontimeupdate = () => {
          const p = (elem.currentTime / elem.duration * 100).toFixed(1);
          document.getElementById('progress').style.width = p + '%';
        };
      });
    });
  }

  function toggleMute(){
    const media = document.querySelector('video, audio');
    if(media) media.muted = !media.muted;
  }

  function toggleFullscreen(){
    const video = document.querySelector('video');
    if(video){
      if(document.fullscreenElement) document.exitFullscreen();
      else if(video.requestFullscreen) video.requestFullscreen();
      else if(video.webkitRequestFullscreen) video.webkitRequestFullscreen();
    }
  }

  function clearPlayer(){
    if(currentTorrent) client.remove(currentTorrent.infoHash);
    document.getElementById('video-container').innerHTML = '<div style="color:#444;">Player limpo.</div>';
    document.getElementById('status-box').style.display = 'none';
    document.getElementById('magnet').value = '';
  }
</script>

</body>
</html>
