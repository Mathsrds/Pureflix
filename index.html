<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Pureflix</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════════════════════
   1. VARIÁVEIS E GERAIS
   ═══════════════════════════════════════════════════════ */
:root{
  --red:#e50914; --red2:#b20710;
  --bg:#0a0a0a; --bg2:#141414; --bg3:#1a1a1a;
  --white:#fff; --gray:#aaa; --light:#e5e5e5;
  --green:#46d369; --gold:#f5c518;
  --card-w:180px; --card-h:270px;
  --header-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{height:4px;width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#333;border-radius:4px;}

/* ═══════════════════════════════════════════════════════
   2. CABEÇALHO (HEADER) INTELIGENTE
   ═══════════════════════════════════════════════════════ */
#header{position:fixed;top:0;left:0;right:0;height:var(--header-h);display:flex;align-items:center;padding:0 4%;z-index:900;transition: background 0.4s, transform 0.3s ease-in-out;}
#header.solid{background:var(--bg2);box-shadow:0 2px 20px rgba(0,0,0,.6);}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--red);letter-spacing:3px;cursor:pointer;margin-right:30px;flex-shrink:0;}
.nav{display:flex;gap:6px;align-items:center;}
.nav-btn{background:none;border:none;color:var(--gray);font-family:'Barlow',sans-serif;font-size:13px;padding:6px 10px;cursor:pointer;border-radius:4px;transition:all .2s;white-space:nowrap;}
.nav-btn:hover,.nav-btn.active{color:var(--white);background:rgba(255,255,255,.08);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.header-right button{background:none;border:none;color:var(--gray);font-size:16px;cursor:pointer;transition:color .2s;padding:4px;}
.header-right button:hover{color:var(--white);}
.avatar{width:30px;height:30px;background:var(--red);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}

/* Busca */
#searchbar{position:fixed;top:var(--header-h);left:0;right:0;background:rgba(10,10,10,.97);padding:14px 4%;z-index:899;border-bottom:1px solid #222;display:none;}
#searchbar.open{display:flex;gap:10px;}
#searchbar input{flex:1;background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:10px 16px;color:#fff;font-size:15px;font-family:'Barlow',sans-serif;outline:none;}
#searchbar input:focus{border-color:#555;}
#searchbar button{background:var(--red);color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;}

/* ═══════════════════════════════════════════════════════
   3. HERO (BANNER PRINCIPAL) E CARROSSÉIS
   ═══════════════════════════════════════════════════════ */
#hero{height:70vh;position:relative;overflow:hidden;}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1s;background:center/cover no-repeat;}
.hero-slide.active{opacity:1;}
.hero-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,10,.4) 40%,transparent 70%), linear-gradient(to right,rgba(10,10,10,.85) 0%,transparent 55%);}
.hero-content{position:absolute;bottom:8%;left:4%;max-width:540px;z-index:10;}
.hero-grad{background:linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,.6) 40%, transparent 100%);}
.hero-tags{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.hero-tag{font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:2px;text-transform:uppercase;}
.hero-tag.red{background:var(--red);}
.hero-tag.outline{border:1px solid rgba(255,255,255,.4);color:#ddd;}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-size:62px;font-weight:900;line-height:.95;letter-spacing:1px;margin-bottom:12px;text-shadow:0 2px 20px rgba(0,0,0,.5);}
.hero-meta{font-size:13px;color:var(--gray);margin-bottom:12px;display:flex;gap:12px;align-items:center;}
.hero-meta .score{color:var(--green);font-weight:700;}
.hero-desc{font-size:15px;color:#ccc;line-height:1.6;max-height:72px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.hero-btns{display:flex;gap:12px;margin-top:20px;}
.btn-watch{background:var(--red);color:#fff;border:none;padding:11px 28px;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'Barlow',sans-serif;transition:background .2s;}
.btn-watch:hover{background:var(--red2);}
.btn-more{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);padding:11px 24px;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'Barlow',sans-serif;backdrop-filter:blur(4px);transition:background .2s;}
.btn-more:hover{background:rgba(255,255,255,.25);}
.hero-dots{position:absolute;bottom:6%;left:4%;display:flex;gap:6px;z-index:10;}
.hero-dot{width:6px;height:6px;background:rgba(255,255,255,.3);border-radius:50%;cursor:pointer;transition:all .3s;}
.hero-dot.active{width:20px;border-radius:3px;background:var(--red);}

#page-home{padding-bottom:60px;}
.section{padding:0 4%;margin-top:24px;}
.section-header{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:.5px;}

.carousel-wrap{position:relative;}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(10,10,10,.85);border:1px solid #333;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:0;}
.carousel-wrap:hover .carousel-btn{opacity:1;}
.carousel-btn:hover{background:rgba(229,9,20,.8);border-color:var(--red);}
.carousel-btn.prev{left:-22px;}
.carousel-btn.next{right:-22px;}
.carousel{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;padding-bottom:6px;}
.carousel::-webkit-scrollbar{height:0;}

.card{flex:0 0 var(--card-w);width:var(--card-w);background:var(--bg3);border-radius:6px;overflow:hidden;cursor:pointer;position:relative;scroll-snap-align:start;transition:transform .25s,box-shadow .25s;}
.card-thumb{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#1a1a1a;transition:transform .3s;}
.card:hover{transform:scale(1.07);z-index:20;box-shadow:0 14px 40px rgba(0,0,0,.7);}
.card img{width:100%;height:100%;object-fit:cover;display:block;}
.card-overlay{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.97));opacity:0;transition:opacity .25s;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;}
.card:hover .card-overlay{opacity:1;}
.card-title{font-size:12px;font-weight:700;line-height:1.3;margin-bottom:4px;}
.card-meta{font-size:11px;color:var(--green);font-weight:700;}
.card-actions{display:flex;gap:8px;margin-top:8px;}
.card-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.5);background:rgba(0,0,0,.6);color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.card-btn:hover{background:var(--red);border-color:var(--red);}
.card-btn.fav-on{background:var(--red);border-color:var(--red);}
.card-badge{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;letter-spacing:.5px;text-transform:uppercase;}
.card-continue{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red);}
.skel{background:linear-gradient(90deg,#1a1a1a 25%,#262626 50%,#1a1a1a 75%);background-size:400% 100%;animation:skel 1.4s infinite;border-radius:6px;flex:0 0 var(--card-w);height:var(--card-h);}
@keyframes skel{0%{background-position:400% 0}100%{background-position:-400% 0}}

/* ═══════════════════════════════════════════════════════
   4. PÁGINA DE DETALHES E PLAYER
   ═══════════════════════════════════════════════════════ */
#page-details{position:fixed;inset:0;background:var(--bg);z-index:950;display:none;overflow-y:auto;padding-top:0;}
.det-backdrop{width:100%;height:calc(420px + var(--header-h));position:relative;background:center/cover no-repeat;flex-shrink:0;}
.det-backdrop::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,10,.3) 55%,transparent 85%);}
.det-body{max-width:1100px;margin:0 auto;padding:0 4% 60px;display:flex;gap:36px;margin-top:-160px;position:relative;z-index:5;}
.det-poster{width:210px;flex-shrink:0;border-radius:8px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.7);}
.det-poster img{width:100%;display:block;}
.det-info{flex:1;min-width:0;}
.det-title{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;letter-spacing:1px;line-height:.95;margin-bottom:14px;}
.det-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.det-tag{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:4px 12px;border-radius:3px;font-size:12px;color:#ccc;}
.det-tag.green{color:var(--green);border-color:rgba(70,211,105,.3);}
.det-tag.red{background:rgba(229,9,20,.15);border-color:rgba(229,9,20,.3);color:#ff7070;}
.det-synopsis{font-size:15px;line-height:1.7;color:#bbb;margin-bottom:24px;}
.det-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px;}

/* Player e Servidores */
.player-section{margin-bottom:20px;}
.player-label{font-size:11px;color:var(--gray);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px;}
.server-grid{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px;margin-bottom:14px;flex-wrap:nowrap;}
.server-grid::-webkit-scrollbar{display:none;}
.srv-btn{background:transparent;border:1px solid #444;color:#ccc;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;font-family:'Barlow',sans-serif;white-space:nowrap;flex-shrink:0;}
.srv-btn:hover:not(.active){border-color:#fff;color:#fff;}
.srv-btn.active{background:var(--red);border-color:var(--red);color:#fff;}
.srv-btn.trying{border-color:orange;color:orange;animation:pulse .8s infinite;}
.srv-btn.srv-unavail{opacity:.4;cursor:not-allowed;}
.srv-btn[title*="sem anúncios"]{border-color:rgba(70,211,105,.5);}
.srv-btn[title*="sem anúncios"].active{background:linear-gradient(135deg,#1a6b30,#e50914);border-color:#46d369;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.player-box{width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;overflow:hidden;position:relative;}
.player-box iframe{width:100%;height:100%;border:none;display:block;position:absolute;inset:0;}
.player-loader{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:2;}
.spinner{width:48px;height:48px;border:3px solid #222;border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.player-loader p{font-size:13px;color:#555;}
/* Botão de play falso */
#fake-play-btn{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#000;cursor:pointer;transition:background .2s;}
#fake-play-btn:hover,#fake-play-btn:active{background:#111;}
#fake-play-btn .play-circle{width:72px;height:72px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(229,9,20,.5);transition:transform .15s;}
#fake-play-btn:hover .play-circle,#fake-play-btn:active .play-circle{transform:scale(1.1);}
#fake-play-btn .play-circle i{font-size:28px;color:#fff;margin-left:4px;}
#fake-play-btn .play-label{font-size:13px;color:#aaa;font-weight:600;letter-spacing:.5px;}
#fake-play-btn .play-title{font-size:15px;color:#fff;font-weight:700;text-align:center;padding:0 20px;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fallback-bar{margin-top:10px;display:none;background:rgba(255,165,0,.1);border:1px solid rgba(255,165,0,.3);border-radius:6px;padding:10px 16px;font-size:13px;color:orange;align-items:center;justify-content:space-between;gap:10px;}
.fallback-bar.show{display:flex;}
.fallback-bar button{background:orange;color:#000;border:none;border-radius:4px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;}

/* Temporadas (Apenas Séries) */
.seasons-section{margin-top:24px;}
.seasons-label{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.season-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.season-tab{background:var(--bg3);border:1px solid #2a2a2a;color:#ccc;padding:6px 16px;border-radius:4px;font-size:13px;cursor:pointer;transition:all .2s;font-family:'Barlow',sans-serif;}
.season-tab:hover{border-color:#555;}
.season-tab.active{background:var(--red);border-color:var(--red);color:#fff;}
.episodes-grid{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;padding-right:4px;}
.episode-card{display:flex;gap:14px;background:var(--bg3);border-radius:6px;padding:10px;cursor:pointer;border:1px solid transparent;transition:all .2s;}
.episode-card:hover,.episode-card.active{border-color:#333;background:#222;}
.episode-card.active{border-color:var(--red);}
.ep-thumb{width:120px;height:68px;background:#111;border-radius:4px;overflow:hidden;flex-shrink:0;position:relative;}
.ep-thumb img{width:100%;height:100%;object-fit:cover;}
.ep-thumb .play-over{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.episode-card:hover .play-over{opacity:1;}
.ep-info{flex:1;min-width:0;}
.ep-num{font-size:11px;color:var(--gray);margin-bottom:4px;}
.ep-title{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ep-desc{font-size:12px;color:#777;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ═══════════════════════════════════════════════════════
   5. COMPONENTES EXTRAS
   ═══════════════════════════════════════════════════════ */
.empty-row{text-align:center;padding:30px;color:#444;font-size:14px;}
.ver-mais-wrap{text-align:center;margin-top:14px;}
.ver-mais-btn{background:transparent;border:1px solid #333;color:#aaa;padding:8px 28px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .2s;}
.ver-mais-btn:hover{border-color:var(--red);color:#fff;background:rgba(229,9,20,.1);}
.ver-mais-btn:disabled{opacity:.4;cursor:default;}
#toast{position:fixed;bottom:30px;right:30px;background:#222;border:1px solid #333;border-radius:8px;padding:12px 20px;font-size:14px;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
.btn-close{position:fixed;top:16px;right:4%;width:38px;height:38px;background:rgba(0,0,0,.7);border:1px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;z-index:960;transition:background .2s;}
.btn-close:hover{background:var(--red);}

/* Mobile Adapts */
/* ═══════════════════════════════════════
   MOBILE — Estilo Netflix App
   ═══════════════════════════════════════ */
@media(max-width:768px){
  :root{--card-w:130px;--card-h:195px;--header-h:56px;}

  /* Header mobile: transparente no topo, escuro ao rolar */
  #header{padding:0 16px;background:transparent;transform:none!important;}
  #header.solid{background:rgba(10,10,10,.97)!important;box-shadow:0 2px 12px rgba(0,0,0,.6);}
  .logo{font-size:26px;margin-right:0;}
  .nav{display:none!important;}
  .header-right{gap:12px;}
  .header-right button{font-size:18px;}
  .avatar{width:28px;height:28px;font-size:12px;border-radius:4px;}

  /* Barra de busca mobile */
  #searchbar{top:var(--header-h);padding:10px 16px;}
  #searchbar input{font-size:14px;padding:9px 14px;}

  /* Pills de categoria horizontais (abaixo do header) */
  #mobile-cats{
    display:flex;gap:8px;padding:10px 16px 4px;
    overflow-x:auto;scrollbar-width:none;
    position:sticky;top:var(--header-h);z-index:800;
    background:linear-gradient(var(--bg) 80%,transparent);
  }
  #mobile-cats::-webkit-scrollbar{display:none;}
  .mob-cat{
    flex-shrink:0;padding:5px 16px;border-radius:20px;
    border:1px solid #444;background:rgba(255,255,255,.08);
    color:#ccc;font-size:13px;font-weight:600;cursor:pointer;
    white-space:nowrap;transition:all .2s;font-family:'Barlow',sans-serif;
  }
  .mob-cat.active,.mob-cat:active{background:#fff;color:#000;border-color:#fff;}

  /* Hero mobile: tela quase cheia */
  #hero{height:65vw;min-height:240px;max-height:420px;}
  .hero-title{font-size:32px;line-height:1.1;}
  .hero-content{bottom:6%;left:16px;right:16px;max-width:100%;}
  .hero-btns{flex-wrap:wrap;gap:8px;}
  .hero-btns button{font-size:13px;padding:9px 18px;}

  /* Carrosséis */
  .section{margin-bottom:28px;margin-top:0;}
  .section-title{font-size:16px;padding:0 0;margin-bottom:12px;}
  .carousel-wrap{padding:0 16px;}
  .carousel{gap:8px;}
  .carousel-btn{display:none;}
  .card-thumb{border-radius:6px;}

  /* Página de detalhes mobile */
  .det-body{flex-direction:column;margin-top:-50px;padding:0 16px 100px;}
  .det-poster{width:110px;margin:0 auto;}
  .det-title{font-size:26px;text-align:center;}
  .det-tags{justify-content:center;}
  .det-synopsis{font-size:13px;}
  .det-btns{justify-content:center;}
  .player-section{margin-top:20px;}
  .server-grid{gap:6px;flex-wrap:nowrap;}
  .srv-btn{font-size:12px;padding:7px 14px;border-radius:20px;}

  /* Episódios */
  .episode-card{padding:10px;}
  .ep-thumb{width:100px;height:56px;}

  /* Espaço para bottom nav */
  #page-home{padding-bottom:70px;}

  /* Bottom Navigation Bar — estilo Netflix */
  #mobile-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    height:60px;background:rgba(10,10,10,.97);
    border-top:1px solid #1f1f1f;z-index:1000;
    justify-content:space-around;align-items:center;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .mob-nav-btn{
    display:flex;flex-direction:column;align-items:center;
    gap:3px;background:none;border:none;color:#777;
    font-size:10px;font-weight:600;cursor:pointer;
    font-family:'Barlow',sans-serif;padding:6px 10px;
    transition:color .2s;min-width:48px;
  }
  .mob-nav-btn i{font-size:20px;}
  .mob-nav-btn.active,.mob-nav-btn:active{color:#fff;}
  .mob-nav-btn.active i{color:#fff;}

  /* Esconde bottom nav na página de detalhes */
  #page-details ~ #mobile-nav{display:none;}
}

/* Desktop: esconde elementos mobile */
@media(min-width:769px){
  #mobile-cats{display:none;}
  #mobile-nav{display:none;}
}
</style>
<base target="_blank">
</head>
<body>

<div id="header">
  <div class="logo" onclick="goHome(event)">PUREFLIX</div>
  <div class="nav">
    <button class="nav-btn active" onclick="goHome(event)">Início</button>
    <button class="nav-btn" onclick="showSection('movies', event)">Filmes</button>
    <button class="nav-btn" onclick="showSection('series', event)">Séries</button>
    <button class="nav-btn" onclick="showSection('animes', event)">Animes</button>
    <button class="nav-btn" onclick="showSection('brasil', event)">🇧🇷 Brasil</button>
    <button class="nav-btn" onclick="showFav(event)">Favoritos</button>
    <button class="nav-btn" onclick="showContinue(event)">Continuar</button>
    <button class="nav-btn" onclick="window.location.href='assistir-mais-tarde.html'">🔖 Minha Lista</button>
  </div>
  <div class="header-right">
    <button onclick="toggleSearch()" title="Buscar"><i class="fas fa-search"></i></button>
    <div class="avatar">P</div>
  </div>
</div>

<div id="searchbar">
  <input id="searchInput" type="text" placeholder="Buscar filmes, séries, animes..." onkeydown="if(event.key==='Enter')doSearch()">
  <button onclick="doSearch()"><i class="fas fa-search"></i> Buscar</button>
</div>

<!-- Pills de categoria mobile -->

/* ══ WATCHLATER (inline) ══ */
const WL_KEY='pf_watchlater';
function getWatchLater(){try{return JSON.parse(localStorage.getItem(WL_KEY)||'[]');}catch(e){return[];}}
function saveWatchLater(list){localStorage.setItem(WL_KEY,JSON.stringify(list));}
function isInWatchLater(id){return getWatchLater().some(x=>String(x.id)===String(id));}
function addWatchLater(item){
  const list=getWatchLater();
  if(list.some(x=>String(x.id)===String(item.id))) return false;
  list.unshift({id:item.id,type:item.type||item.media_type||'movie',title:item.title||item.name||'',poster:item.poster||item.poster_path||'',backdrop:item.backdrop||item.backdrop_path||'',release:item.release||item.release_date||item.first_air_date||'',overview:item.overview||'',rating:item.rating||item.vote_average||'',savedAt:Date.now()});
  saveWatchLater(list); return true;
}
function removeWatchLater(id){saveWatchLater(getWatchLater().filter(x=>String(x.id)!==String(id)));}
function toggleWatchLater(item){if(isInWatchLater(item.id)){removeWatchLater(item.id);return false;}else{addWatchLater(item);return true;}}

  let list=getNotifications();
  if(list.some(x=>String(x.id)===String(item.id))) return false;

  localStorage.setItem(NOTIF_KEY,JSON.stringify(list)); return true;
}
function removeNotification(id){localStorage.setItem(NOTIF_KEY,JSON.stringify(getNotifications().filter(x=>String(x.id)!==String(id))));}
function isNotifying(id){return getNotifications().some(x=>String(x.id)===String(id));}
async function requestNotifPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission==='granted') return true;
  if(Notification.permission==='denied') return false;
  const p=await Notification.requestPermission();
  return p==='granted';
}

// ── SISTEMA DE LINKS DIRETOS ──
let _directDB  = null;      // null = não carregado ainda, {} = carregado mas vazio
let _directPrm = null;      // promise em andamento (evita fetch duplo)

async function loadDirectDB(){
  if(_directDB !== null) return _directDB;
  if(_directPrm) return _directPrm;
  _directPrm = (async()=>{
    // Tenta múltiplos caminhos — resolve problemas de subpasta e servidor
    const paths = [
      'direct_links.json',
      './direct_links.json',
      location.pathname.replace(/\/[^/]*$/, '/') + 'direct_links.json',
    ];
    for(const path of paths){
      try{
        const r = await fetch(path, { cache:'no-store' });
        if(!r.ok) continue;
        _directDB = await r.json();
        console.log(`[PureFlix Direct] ✅ Carregado (${path}):`, Object.keys(_directDB).length, 'títulos');
        return _directDB;
      }catch(e){ /* tenta próximo */ }
    }
    console.warn('[PureFlix Direct] ⚠️ direct_links.json não encontrado — verifique se o arquivo está na mesma pasta do index.html');
    _directDB = {};
    return _directDB;
  })();
  return _directPrm;
}

async function getDirectLink(id, type, season, episode){
  const db = await loadDirectDB();
  const entry = db[String(id)];
  if(!entry) return null;
  if(type === 'movie') return entry.url || null;
  const s = season || 1, ep = episode || 1;
  const found = (entry.episodes||[]).find(e => e.season===s && e.episode===ep);
  return found ? (found.url || null) : null;
}

function hasDirectLink(id, type, season, episode){
  // Síncrono: só funciona se o DB já carregou
  if(!_directDB) return false;
  const entry = _directDB[String(id)];
  if(!entry) return false;
  if(type === 'movie') return !!(entry.url);
  const s = season || 1, ep = episode || 1;
  return (entry.episodes||[]).some(e => e.season===s && e.episode===ep && e.url);
}

async function api(path, params={}) {
  const url = new URL(BASE+path);
  url.searchParams.set('language','pt-BR');
  url.searchParams.set('include_adult','false');     // bloqueia conteúdo adulto
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  // Adiciona exclusão de keywords adultas em endpoints /discover e /trending
  if(path.includes('/discover') || path.includes('/trending') || path.includes('/popular') || path.includes('/top_rated') || path.includes('/upcoming') || path.includes('/airing')){
    const curKw = url.searchParams.get('without_keywords') || '';
    const merged = curKw ? curKw+','+ADULT_KEYWORDS : ADULT_KEYWORDS;
    url.searchParams.set('without_keywords', merged);
  }
  const key = url.toString();
  if (MEM[key]) return MEM[key];
  try {
    const r = await fetch(url, OPTS);
    const d = await r.json();
    if(d && d.results){
      // Filtro 1: remove adultos
      d.results = d.results.filter(item => !item.adult);
      // Filtro 2: conteúdo japonês deve ser obrigatoriamente Animação (genre 16)
      // Elimina live-action japonês, variety shows e qualquer não-anime
      if(params.with_original_language === 'ja'){
        d.results = d.results.filter(item =>
          item.original_language === 'ja' &&
          (item.genre_ids || []).includes(16)
        );
      }
    }
    MEM[key] = d;
    return d;
  } catch(e) { return {}; }
}

// 5. BANCO DE DADOS LOCAL (Favoritos e Continuar)
const store = {
  get:(k)=>{ try{ return JSON.parse(localStorage.getItem(k)||'{}') }catch{ return {} } },
  set:(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)) }catch{} },
};
function getFavs(){ return store.get('pf_favs'); }
function toggleFav(id,type,name,poster){
  const f=getFavs();
  if(f[id]){ delete f[id]; toast('Removido dos favoritos'); }
  else{ f[id]={id,type,name,poster}; toast('⭐ Adicionado aos favoritos!'); }
  store.set('pf_favs',f);
  document.querySelectorAll(`.card-btn.fav[data-id="${id}"]`).forEach(b=>{
    b.classList.toggle('fav-on',!!f[id]); b.title = f[id]?'Remover':'Favoritar';
  });
}
function getContinue(){ return store.get('pf_cont'); }
function saveContinue(id,type,name,poster,season,ep){
  const c=getContinue(); c[id]={id,type,name,poster,season,ep,ts:Date.now()};
  store.set('pf_cont',c);
}

// Mensagens Toast (Pop-ups)
let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2500);
}

// 6. HERO (BANNER ROTATIVO NO TOPO) — atualiza a cada 1 hora
let heroItems=[], heroIdx=0, heroTimer;
async function loadHero(){
  try{
    // Cache de 1h no localStorage
    const HERO_KEY='pf_hero_cache', HERO_TTL=3600000;
    const cached=store.get(HERO_KEY);
    let results;
    if(cached.ts && Date.now()-cached.ts < HERO_TTL && cached.items?.length){
      results=cached.items;
    } else {
      const d=await api('/trending/all/week',{region:'BR'});
      results=(d.results||[]).filter(m=>m.backdrop_path && m.poster_path && !m.adult).slice(0,8);
      store.set(HERO_KEY,{ts:Date.now(),items:results});
    }
    heroItems=results;
    const hero=document.getElementById('hero');
    const dots=document.getElementById('hero-dots');
    hero.querySelectorAll('.hero-slide').forEach(s=>s.remove());
    dots.innerHTML='';
    heroItems.forEach((m,i)=>{
      const s=document.createElement('div');
      s.className='hero-slide'+(i===0?' active':'');
      s.style.backgroundImage=`url('${IMG}/w1280${m.backdrop_path}')`;
      hero.insertBefore(s,dots);
      const d2=document.createElement('div');
      d2.className='hero-dot'+(i===0?' active':'');
      d2.onclick=()=>setHero(i);
      dots.appendChild(d2);
    });
    renderHeroContent(0);
    heroTimer=setInterval(()=>setHero((heroIdx+1)%heroItems.length),7000);
  }catch(err){}
}
function setHero(i){
  heroIdx=i;
  document.querySelectorAll('.hero-slide').forEach((s,j)=>s.classList.toggle('active',j===i));
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
  renderHeroContent(i);
}
function renderHeroContent(i){
  const m=heroItems[i]; if(!m) return;
  const hero=document.getElementById('hero');
  let c=hero.querySelector('.hero-content');
  if(!c){ c=document.createElement('div'); c.className='hero-content'; hero.insertBefore(c,hero.querySelector('.hero-dots')); }
  const y=(m.release_date||m.first_air_date||'').split('-')[0];
  const r=m.vote_average?m.vote_average.toFixed(1):'N/A';
  const mtype=m.media_type||'movie';
  const typeLabel=mtype==='tv'?'SÉRIE':'FILME';
  c.innerHTML=`
    <div class="hero-tags">
      <span class="hero-tag red">🔥 Em Alta</span>
      <span class="hero-tag outline">${typeLabel}</span>
      <span class="hero-tag outline">${y}</span>
      <span class="hero-tag outline">⭐ ${r}</span>
    </div>
    <h1 class="hero-title">${m.title||m.name}</h1>
    <div class="hero-meta"><span class="score">★ ${r}</span><span>${y}</span></div>
    <p class="hero-desc">${m.overview||''}</p>
    <div class="hero-btns">
      <button class="btn-watch" onclick="openDetails(${m.id},'${mtype}')"><i class="fas fa-play"></i> Assistir</button>
      <button class="btn-more" onclick="openDetails(${m.id},'${mtype}')"><i class="fas fa-info-circle"></i> Mais Info</button>
    </div>`;
}

// 7. CARROSSÉIS DE FILMES E SÉRIES
function makeCarousel(sec, items, type, hasMore){
  const wrap=document.createElement('div'); wrap.className='section'; wrap.id='sec-'+sec.id;
  wrap.innerHTML=`
    <div class="section-header"><span class="section-title">${sec.title}</span></div>
    <div class="carousel-wrap">
      <button class="carousel-btn prev" onclick="scrollCar('${sec.id}',-1)"><i class="fas fa-chevron-left"></i></button>
      <div class="carousel" id="car-${sec.id}"></div>
      <button class="carousel-btn next" onclick="scrollCar('${sec.id}',1)"><i class="fas fa-chevron-right"></i></button>
    </div>
    ${hasMore!==false?`<div class="ver-mais-wrap"><button class="ver-mais-btn" id="vm-${sec.id}" onclick="loadMore('${sec.id}')">Ver mais ↓</button></div>`:''}`;
  const car=wrap.querySelector('.carousel');
  items.forEach(m=>{
    if(m.adult) return; // bloqueia conteúdo adulto
    const itemType = m.media_type||type||'movie';
    const name=m.title||m.name||'';
    const year=(m.release_date||m.first_air_date||'').split('-')[0];
    const rating=m.vote_average?m.vote_average.toFixed(1):'';
    const poster=m.poster_path?`${IMG}/w500${m.poster_path}`:'';
    const favs=getFavs();
    const isFav=!!favs[m.id];
    const contData=getContinue()[m.id];
    const card=document.createElement('div');
    card.className='card'; card.title=name;
    card.onclick=()=>openDetails(m.id,itemType);
    card.innerHTML=`
      ${poster?`<img src="${poster}" alt="${name}" class="card-thumb" loading="lazy" onerror="this.style.display='none'">`:''}
      ${itemType==='tv'?'<div class="card-badge">SÉRIE</div>':''}
      ${contData?`<div class="card-continue" style="width:60%"></div>`:''}
      <div class="card-overlay">
        <div class="card-title">${name}</div>
        <div class="card-meta">${rating?'⭐ '+rating:''} ${year}</div>
        <div class="card-actions">
          <div class="card-btn" onclick="event.stopPropagation();openDetails(${m.id},'${itemType}')"><i class="fas fa-play"></i></div>
          <div class="card-btn fav ${isFav?'fav-on':''}" data-id="${m.id}" title="${isFav?'Remover':'Favoritar'}"
            onclick="event.stopPropagation();toggleFav(${m.id},'${itemType}','${name.replace(/'/g,"\'")}','${poster}')">
            <i class="fas fa-heart"></i>
          </div>
        </div>
      </div>`;
    car.appendChild(card);
  });
  return wrap;
}

function scrollCar(id,dir){
  const car=document.getElementById('car-'+id);
  if(car) car.scrollBy({left:dir*600,behavior:'smooth'});
}

// Rastreia página atual de cada seção para "Ver mais"
const secPages={};

async function loadSection(sec){
  const wrap=document.createElement('div'); wrap.className='section'; wrap.id='sec-'+sec.id;
  wrap.innerHTML=`
    <div class="section-header"><span class="section-title">${sec.title}</span></div>
    <div class="carousel-wrap"><div class="carousel" id="car-${sec.id}">${Array(8).fill('<div class="skel"></div>').join('')}</div></div>`;
  document.getElementById('sections-container').appendChild(wrap);
  try{
    const d=await api(sec.endpoint,{...sec.params,page:1});
    const items=(d.results||[]).filter(m=>m.poster_path && !m.adult).slice(0,20);
    if(!items.length){ wrap.remove(); return; } // remove seção vazia
    secPages[sec.id]={sec, page:1, totalPages:d.total_pages||1};
    const hasMore=(d.total_pages||1)>1;
    wrap.replaceWith(makeCarousel(sec,items,sec.type,hasMore));
  }catch(e){ wrap.remove(); }
}

async function loadMore(secId){
  const state=secPages[secId]; if(!state) return;
  const btn=document.getElementById('vm-'+secId);
  if(btn){ btn.disabled=true; btn.textContent='Carregando...'; }
  try{
    const nextPage=state.page+1;
    const d=await api(state.sec.endpoint,{...state.sec.params, page:nextPage});
    const items=(d.results||[]).filter(m=>m.poster_path && !m.adult).slice(0,20);
    const car=document.getElementById('car-'+secId);
    if(car){
      items.forEach(m=>{
        const itemType=m.media_type||state.sec.type||'movie';
        const name=m.title||m.name||'';
        const year=(m.release_date||m.first_air_date||'').split('-')[0];
        const rating=m.vote_average?m.vote_average.toFixed(1):'';
        const poster=m.poster_path?`${IMG}/w500${m.poster_path}`:'';
        const isFav=!!getFavs()[m.id];
        const contData=getContinue()[m.id];
        const card=document.createElement('div');
        card.className='card'; card.title=name;
        card.onclick=()=>openDetails(m.id,itemType);
        card.innerHTML=`
          ${poster?`<img src="${poster}" alt="${name}" class="card-thumb" loading="lazy" onerror="this.style.display='none'">`:''}
          ${itemType==='tv'?'<div class="card-badge">SÉRIE</div>':''}
          ${contData?`<div class="card-continue" style="width:60%"></div>`:''}
          <div class="card-overlay">
            <div class="card-title">${name}</div>
            <div class="card-meta">${rating?'⭐ '+rating:''} ${year}</div>
            <div class="card-actions">
              <div class="card-btn" onclick="event.stopPropagation();openDetails(${m.id},'${itemType}')"><i class="fas fa-play"></i></div>
              <div class="card-btn fav ${isFav?'fav-on':''}" data-id="${m.id}"
                onclick="event.stopPropagation();toggleFav(${m.id},'${itemType}','${name.replace(/'/g,"\'")}','${poster}')">
                <i class="fas fa-heart"></i>
              </div>
            </div>
          </div>`;
        car.appendChild(card);
      });
      car.scrollBy({left:car.scrollWidth,behavior:'smooth'});
    }
    state.page=nextPage;
    if(btn){
      if(nextPage >= (d.total_pages||1)){
        btn.style.display='none';
      } else {
        btn.disabled=false; btn.textContent='Ver mais ↓';
      }
    }
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent='Ver mais ↓'; }
  }
}

function clearPage(hideHero, eventElement) {
  clearTimeout(fallbackTimer);
  document.getElementById('player-box').innerHTML='';
  document.getElementById('page-home').style.display='block';
  document.getElementById('page-details').style.display='none';
  window.location.hash='';
  document.getElementById('hero').style.display = hideHero ? 'none' : 'block';
  const sc = document.getElementById('sections-container');
  sc.innerHTML='';
  // Espaçamento: quando hero está oculto, garante distância do header
  sc.style.paddingTop = hideHero ? 'calc(var(--header-h) + 32px)' : '0';
  // Fecha a barra de busca sempre que mudar de seção
  document.getElementById('searchbar').classList.remove('open');

  if(eventElement) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      eventElement.classList.add('active');
  }
}

async function goHome(e){
  const el = e ? e.currentTarget : document.querySelector('.nav-btn[onclick="goHome(event)"]');
  clearPage(false, el);
  for(const sec of SECTIONS_HOME){
    loadSection(sec);
    await new Promise(r=>setTimeout(r,120));
  }
}

  clearPage(true, e?.currentTarget||null);

  if(!categories) return;
  for(const sec of categories){
    loadSection(sec);
    await new Promise(r=>setTimeout(r,150));

}

function buildPlayerBox(url, srvLabel, autoplay){
  const box = document.getElementById('player-box');
  box.innerHTML = ''; // limpa iframe anterior

  if(!autoplay){
    // Mostra botão de play falso — iframe ainda não existe
    const btn = document.createElement('div');
    btn.id = 'fake-play-btn';
    // Pega título do filme/série para exibir
    const titleEl = document.getElementById('det-title');
    const titleText = titleEl ? titleEl.textContent : '';
    btn.innerHTML = `
      <div class="play-title">${titleText}</div>
      <div class="play-circle"><i class="fas fa-play"></i></div>
      <div class="play-label">${srvLabel} — Toque para assistir</div>
    `;
    btn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      btn.remove();
      injectIframe(box, url);
    }, {once: true});
    box.appendChild(btn);
  } else {
    injectIframe(box, url);
  }
}

function injectIframe(box, url){
  // Loader
  const loader = document.createElement('div');
  loader.className = 'player-loader'; loader.id = 'player-loader';
  loader.innerHTML = '<div class="spinner"></div><p>Carregando stream...</p>';
  box.appendChild(loader);

  const frame = document.createElement('iframe');
  frame.id = 'player-frame';
  frame.allowFullscreen = true;
  frame.setAttribute('allow','autoplay; fullscreen *; picture-in-picture *; encrypted-media');
  frame.style.cssText = 'width:100%;height:100%;border:none;display:block;position:absolute;inset:0;';
  frame.addEventListener('load', onFrameLoad);
  box.appendChild(frame);

  // Função que gera srcdoc para qualquer URL — isola o player num documento próprio
  function makeSrcdoc(embedUrl, isHLS){
    // Codifica o URL em JSON para passar com segurança ao srcdoc
    const safeUrl = JSON.stringify(embedUrl);
    if(isHLS){
      return `<!DOCTYPE html><html><head><style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100%;height:100%;background:#000;overflow:hidden;}
        video{width:100%;height:100%;display:block;object-fit:contain;}
      </style></head><body>
        <video id="v" controls autoplay playsinline></video>
        <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"><\/script>
        <script>
          const v=document.getElementById('v');
          const src=${safeUrl};
          if(Hls.isSupported()){
            const h=new Hls({enableWorker:false});
            h.loadSource(src); h.attachMedia(v);
            h.on(Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}));
          } else if(v.canPlayType('application/vnd.apple.mpegurl')){
            v.src=src; v.play().catch(()=>{});
          } else {
            document.body.innerHTML='<p style="color:#fff;padding:20px">HLS não suportado neste browser.</p>';
          }
        <\/script>
      </body></html>`;
    } else {
      // iframe genérico (Blogger, meusdoramas, etc.) com script fixSize
      return `<!DOCTYPE html><html><head><style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html,body{width:100vw;height:100vh;background:#000;overflow:hidden;}
        iframe{position:fixed!important;inset:0!important;width:100%!important;height:100%!important;border:none!important;}
        video,object,embed{position:fixed!important;inset:0!important;width:100%!important;height:100%!important;}
      </style></head><body>
        <iframe src=${safeUrl} frameborder="0"
          allowfullscreen allow="autoplay; fullscreen *; encrypted-media; gyroscope"></iframe>
        <script>
          function fixSize(){
            document.querySelectorAll('iframe,video,object,embed').forEach(el=>{
              el.removeAttribute('width'); el.removeAttribute('height');
              el.style.cssText='position:fixed!important;inset:0!important;width:100%!important;height:100%!important;border:none!important;';
            });
          }
          fixSize(); setInterval(fixSize,800);
          new MutationObserver(fixSize).observe(document.body,{childList:true,subtree:true,attributes:true});
        <\/script>
      </body></html>`;
    }
  }

  const isHLS      = url && (url.includes('.m3u8') || url.includes('videohls'));
  const isBlogger  = url && url.includes('blogger.com');
  const isMeudo    = url && (url.includes('meusdoramas') || url.includes('serv01.'));

  if(isHLS){
    // HLS: srcdoc com hls.js
    frame.setAttribute('data-direct','1');
    frame.srcdoc = makeSrcdoc(url, true);
  } else if(isBlogger){
    // Blogger: srcdoc com iframe interno
    frame.setAttribute('data-direct','1');
    frame.srcdoc = makeSrcdoc(url, false);
  } else {
    frame.src = url;
  }
  clearTimeout(fallbackTimer);
  fallbackTimer=setTimeout(()=>{
    document.getElementById('fallback-msg').textContent=`⚠️ "${SERVERS[curSrvIdx].label}" pode estar com problemas. Tentar próximo?`;
    document.getElementById('fallback-bar').classList.add('show');
  },12000);
}

// Mostra aviso de servidor bloqueado (ex: meusdoramas 403)
function showBlockedMessage(box, url){
  // Remover frame e loader se existirem
  box.innerHTML =
    '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#111;">' +
    '<div style="text-align:center;padding:30px 20px;">' +
    '<div style="font-size:40px;margin-bottom:16px;">🔒</div>' +
    '<p style="color:#ccc;font-size:14px;margin-bottom:20px;line-height:1.5;">' +
    'Este servidor bloqueia reprodução em iframe.<br>Clique para assistir em nova aba.</p>' +
    '<a href="' + url + '" target="_blank" rel="noopener" ' +
    'style="background:#e50914;color:#fff;padding:12px 28px;border-radius:6px;' +
    'font-weight:700;font-size:14px;text-decoration:none;display:inline-block;">' +
    '▶ Abrir Player em Nova Aba</a>' +
    '<p style="color:#666;font-size:11px;margin-top:14px;">Ou escolha outro servidor abaixo</p>' +
    '</div></div>';
  clearTimeout(fallbackTimer);
  document.getElementById('fallback-bar').classList.remove('show');
}

async function loadServer(i){
  curSrvIdx=i; clearTimeout(fallbackTimer);
  document.getElementById('fallback-bar').classList.remove('show');
  document.querySelectorAll('.srv-btn').forEach((b,j)=>{ b.classList.toggle('active',j===i); b.classList.remove('trying'); });
  window._curId   = curId;
  window._curType = curType;
  window._curSrv  = i;

  // Servidor Direct: verificar se existe link antes de carregar
  if(SERVERS[i].direct){
    const url = await getDirectLink(curId, curType, curType==='tv'?curSeason:null, curType==='tv'?curEp:null);
    if(!url){
      toast('⭐ Sem link direto para este episódio. A tentar próximo servidor...');
      setTimeout(()=>loadServer((i+1)%SERVERS.length), 1200);
      return;
    }
    // meusdoramas bloqueia iframe — mostrar botão em vez de tentar carregar
    if(url.includes('meusdoramas') || url.includes('serv01.')){
      const box = document.getElementById('player-box');
      box.innerHTML = ''; // limpar
      showBlockedMessage(box, url);
      if(curType==='tv') saveContinue(curId,curType,'','',curSeason,curEp);
      return;
    }
    buildPlayerBox(url, SERVERS[i].label, true);
    if(curType==='tv') saveContinue(curId,curType,'','',curSeason,curEp);
    return;
  }

  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  const url = SERVERS[i].fn ? SERVERS[i].fn(curId, curType, curType==='tv'?curSeason:null, curType==='tv'?curEp:null) : null;
  if(!url){ toast('Servidor indisponível.'); setTimeout(()=>loadServer((i+1)%SERVERS.length),800); return; }
  buildPlayerBox(url, SERVERS[i].label, !isMobile);
  if(curType==='tv') saveContinue(curId,curType,'','',curSeason,curEp);
}

function nextServer(){ const next=(curSrvIdx+1)%SERVERS.length; toast(`Trocando para ${SERVERS[next].label}...`); loadServer(next); }

function onFrameLoad(){
  const frame=document.getElementById('player-frame');
  if(!frame) return;
  // Aceita tanto frame.src normal como srcdoc (src fica vazio ou igual à página)
  const hasSrc    = frame.src && frame.src !== window.location.href;
  const hasSrcdoc = frame.hasAttribute('data-direct');
  if(!hasSrc && !hasSrcdoc) return;
  const loader=document.getElementById('player-loader');
  if(loader) loader.style.display='none';
  clearTimeout(fallbackTimer);
  document.getElementById('fallback-bar').classList.remove('show');
  fallbackTimer=setTimeout(()=>{
    document.getElementById('fallback-msg').textContent='⚠️ Tela preta? Tente outro servidor.';
    document.getElementById('fallback-bar').classList.add('show');
  },8000);
}

// 11. SÉRIES: TEMPORADAS E EPISÓDIOS
async function loadSeasons(id, numSeasons){
  const sec=document.getElementById('seasons-section'); sec.style.display='block';
  const tabs=document.getElementById('season-tabs'); tabs.innerHTML='';
  for(let s=1;s<=Math.min(numSeasons,15);s++){
    const b=document.createElement('button'); b.className='season-tab'+(s===1?' active':''); b.textContent=`Temporada ${s}`;
    b.onclick=()=>{ document.querySelectorAll('.season-tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); curSeason=s; loadEpisodes(id,s); };
    tabs.appendChild(b);
  }
  loadEpisodes(id,1);
}

async function loadEpisodes(id,season){
  const grid=document.getElementById('episodes-grid');
  grid.innerHTML='<div style="color:#555;padding:10px;font-size:13px">Carregando episódios...</div>';
  try{
    const d=await api(`/tv/${id}/season/${season}`);
    grid.innerHTML='';
    const _savedEp = (season===curSeason) ? curEp : null;
    (d.episodes||[]).forEach(ep=>{
      const card=document.createElement('div');
      card.className='episode-card'+(ep.episode_number===curEp&&season===curSeason?' active':'');
      const still=ep.still_path?`${IMG}/w300${ep.still_path}`:'';
      card.innerHTML=`
        <div class="ep-thumb">${still?`<img src="${still}" alt="">`:' '}<div class="play-over"><i class="fas fa-play" style="color:#fff;font-size:18px"></i></div></div>
        <div class="ep-info">
          <div class="ep-num">Ep. ${ep.episode_number} ${ep.runtime?'· '+ep.runtime+'min':''}</div>
          <div class="ep-title">${ep.name||'Episódio '+ep.episode_number}</div>
          <div class="ep-desc">${ep.overview||''}</div>
        </div>`;
      card.onclick=async ()=>{
        curSeason=season; curEp=ep.episode_number;
        document.querySelectorAll('.episode-card').forEach(c=>c.classList.remove('active'));
        card.classList.add('active'); await loadServer(curSrvIdx); await buildServerBtns();
        toast(`▶ T${season} E${ep.episode_number}: ${ep.name}`);
        // Salva temporada e episódio atual
        const _sc=getContinue(); if(_sc[curId]){ _sc[curId].season=curSeason; _sc[curId].ep=curEp; store.set('pf_cont',_sc); }
      };
      // Destaca episódio salvo ao carregar lista
      if(_savedEp && ep.episode_number === _savedEp){
        card.classList.add('active');
        setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'center'}),300);
      }
      grid.appendChild(card);
    });
  }catch(e){ grid.innerHTML='<div class="empty-row">Erro ao carregar episódios.</div>'; }
}

async function openDetails(id,type){
  window.location.hash=`#${type}/${id}`;
  document.getElementById('page-home').style.display='none'; document.getElementById('page-details').style.display='block'; window.scrollTo(0,0);
  document.getElementById('player-box').innerHTML='';
  document.getElementById('seasons-section').style.display='none'; document.getElementById('fallback-bar').classList.remove('show');
  clearTimeout(fallbackTimer);
  curId=id; curType=type; curSrvIdx=0;
  // Restaura temporada/episódio salvo
  const _saved = getContinue()[id];
  curSeason = (_saved && type==='tv' && _saved.season) ? _saved.season : 1;
  curEp     = (_saved && type==='tv' && _saved.ep)     ? _saved.ep     : 1;

  try{
    const m=await api(`/${type}/${id}`,{append_to_response:'external_ids,videos,credits'});
    const name=m.title||m.name; const year=(m.release_date||m.first_air_date||'').split('-')[0];
    const rating=m.vote_average?m.vote_average.toFixed(1):'N/A';
    const runtime=m.runtime||(m.episode_run_time&&m.episode_run_time[0]);
    const genres=(m.genres||[]).map(g=>g.name);
    
    if(m.backdrop_path) document.getElementById('det-backdrop').style.backgroundImage=`url('${IMG}/w1280${m.backdrop_path}')`;
    document.getElementById('det-poster').src=m.poster_path?`${IMG}/w500${m.poster_path}`:'';
    document.getElementById('det-title').textContent=name;
    document.getElementById('det-tags').innerHTML=`
      <span class="det-tag green">⭐ ${rating}</span><span class="det-tag">${year}</span>
      ${runtime?`<span class="det-tag">${runtime} min</span>`:''}
      <span class="det-tag">${type==='tv'?'SÉRIE':'FILME'}</span>
      ${genres.slice(0,3).map(g=>`<span class="det-tag red">${g}</span>`).join('')}
    `;
    document.getElementById('det-synopsis').textContent=m.overview||'Sinopse não disponível.';
    
    const trailer=(m.videos?.results||[]).find(v=>v.type==='Trailer'&&v.site==='YouTube');
    document.getElementById('det-btns').innerHTML=`
      <button class="btn-watch" onclick="loadServer(0)"><i class="fas fa-play"></i> Assistir</button>
      ${trailer?`<button class="btn-more" onclick="openTrailer('${trailer.key}')"><i class="fab fa-youtube"></i> Trailer</button>`:''}
      <button class="btn-more" onclick="toggleFav(${id},'${type}','${name.replace(/'/g,"\'")}','${m.poster_path?IMG+'/w500'+m.poster_path:''}')">
        <i class="fas fa-heart"></i> ${getFavs()[id]?'Remover':'Favoritar'}
      </button>
      <button class="btn-more" id="wl-btn-${id}" onclick="doToggleWatchLater(${id},'${type}','${name.replace(/'/g,"\\'")}','${m.poster_path||''}','${m.release_date||m.first_air_date||''}','${m.overview||''}',${m.vote_average||0})">
        <i class="fas fa-bookmark"></i> ${isInWatchLater(id)?'Na Lista':'Minha Lista'}
      </button>
    `;

    await buildServerBtns(); await loadServer(0);
    if(type==='tv' && m.number_of_seasons){
      await loadSeasons(id, m.number_of_seasons);
      // Se foi restaurado da lista "Continuar", destaca o episódio e faz scroll
      if(_saved && _saved.season && _saved.ep){
        const activeCard = document.querySelector(`.ep-card.active`);
        if(activeCard) activeCard.scrollIntoView({behavior:'smooth',block:'center'});
      }
    }
    saveContinue(id,type,name,m.poster_path?`${IMG}/w500${m.poster_path}`:'',curSeason,curEp);
    
    // Chama as recomendações adicionadas agora
    await loadRecommendations(id, type);

  }catch(err){ document.getElementById('det-title').textContent='Erro ao carregar.'; }
}

let lastScrollTop = 0;
window.addEventListener('scroll', () => {
  const header = document.getElementById('header');
  const scrollTop = window.pageYOffset || document.documentElement.scrollTop;
  header.classList.toggle('solid', scrollTop > 50);
  
  // Lógica do cabeçalho que se esconde (A Nova Função)
  if (scrollTop > lastScrollTop && scrollTop > 100) {
    header.style.transform = 'translateY(-100%)';
  } else {
    header.style.transform = 'translateY(0)';
  }
  lastScrollTop = Math.max(scrollTop, 0); 
});

// 16. BLOQUEADOR AGRESSIVO DE ANÚNCIOS + PERSISTÊNCIA DE ESTADO
// ══════════════════════════════════════════════════════════════
(function(){

  // ── A. Bloqueio SIMPLES: só window.open e _blank — não interfere nos players ──
  window.open = function(){
    console.log('[PureFlix] popup bloqueado');
    return null;
  };

  document.addEventListener('click', function(e){
    const a = e.target.tagName === 'A' ? e.target : e.target.closest('a');
    if(a && a.target === '_blank'){
      e.preventDefault();
      e.stopPropagation();
      console.log('[PureFlix] link _blank bloqueado');
    }
  }, true);

  // ── B. Auto-Resume: salva estado com localStorage para sobreviver a redirects ──
  function pfSaveWatching(){
    try{
      localStorage.setItem('pf_watching', JSON.stringify({
        hash:    window.location.hash,
        id:      window._curId   || '',
        type:    window._curType || '',
        srv:     window._curSrv  || 0,
        ts:      Date.now()
      }));
    }catch(e){}
  }

  function pfRestoreWatching(){
    try{
      const raw = localStorage.getItem('pf_watching');
      if(!raw) return;
      const w = JSON.parse(raw);
      // Só restaura se foi há menos de 30 segundos (saiu por anúncio)
      if(!w || (Date.now() - w.ts) > 30000) return;
      localStorage.removeItem('pf_watching');
      if(w.hash && w.hash.match(/^#(movie|tv)\/\d+/)){
        // Redireciona de volta para o filme/série
        setTimeout(()=>{ window.location.hash = w.hash; }, 300);
      }
    }catch(e){}
  }

  // Salva sempre que o usuário está assistindo
  window.addEventListener('pagehide',        pfSaveWatching);
  window.addEventListener('visibilitychange', ()=>{ if(document.hidden) pfSaveWatching(); });

  // Restaura ao carregar/voltar para a página
  pfRestoreWatching();
  window.addEventListener('pageshow', (e)=>{ if(e.persisted) pfRestoreWatching(); });

  console.log('[PureFlix] Proteção ativa ✓');
})();

function mobNavActive(btn){

}
function mobCatActive(btn){
  document.querySelectorAll('.mob-cat').forEach(b=>b.classList.remove('active'));

}
function syncMobileCat(key){
  // Sincroniza pills com o estado atual
  document.querySelectorAll('.mob-cat').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('onclick').includes("'"+key+"'") || (key==='home' && b.getAttribute('onclick').includes("'home'")));
  });
}
function mobNav(btn, section){
  mobNavActive(btn);
  if(section==='home')       { goHome(null); syncMobileCat('home'); }
  else if(section==='fav')   { showFav(null); syncMobileCat('fav'); }
  else if(section==='continue'){ showContinue(null); syncMobileCat('continue'); }
}
function mobCat(btn, section){
  mobCatActive(btn);
  if(section==='home')        goHome(null);
  else if(section==='fav')    showFav(null);
  else if(section==='continue') showContinue(null);
  else                        showSection(section, null);
  // Sincroniza bottom nav
  const map = {home:'mbn-home',fav:'mbn-fav',continue:'mbn-continue'};
  if(map[section]){
    mobNavActive(document.getElementById(map[section]));
  } else {
    mobNavActive(document.getElementById('mbn-home'));
  }
}

// Função para toggling da Minha Lista diretamente do index
function doToggleWatchLater(id, type, title, poster_path, release, overview, rating){
  const item = {
    id, type, title,
    poster: poster_path ? (poster_path.startsWith('http') ? poster_path : poster_path) : '',
    release, overview, rating
  };
  const added = toggleWatchLater(item);
  const btn = document.getElementById('wl-btn-'+id);
  if(btn){
    btn.innerHTML = added
      ? '<i class="fas fa-bookmark"></i> Na Lista'
      : '<i class="fas fa-bookmark"></i> Minha Lista';
  }
  toast(added ? '🔖 Adicionado à Minha Lista!' : '🗑️ Removido da Minha Lista');
  if(added){
    addNotification(item);
  } else {
    removeNotification(id);
  }
}
