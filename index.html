<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>PureFlix - App Edition</title>

  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#141414">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="data:application/manifest+json,{"name":"PureFlix","short_name":"PureFlix","start_url":".","display":"standalone","background_color":"#141414","theme_color":"#e50914"}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --netflix-red: #e50914;
      --netflix-black: #141414;
      --netflix-dark: #000000;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background-color: var(--netflix-black); 
      color: white; 
      font-family: 'Roboto', sans-serif; 
      overflow-x: hidden;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 12px 4%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
      transition: background 0.3s;
    }

    .logo { color: var(--netflix-red); font-size: 22px; font-weight: 900; text-transform: uppercase; cursor: pointer; }

    .hero {
      height: 50vh;
      position: relative;
      background: linear-gradient(to right, rgba(0,0,0,0.9) 20%, transparent 80%),
                  url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 4%;
    }

    .search-box {
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.8);
      padding: 5px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.2);
      width: 100%;
      max-width: 450px;
      margin-top: 20px;
    }

    .search-box input { flex: 1; background: transparent; border: none; color: white; font-size: 15px; outline: none; padding: 8px; }
    .btn-search { background-color: var(--netflix-red); color: white; padding: 8px 16px; border-radius: 4px; font-weight: bold; border: none; cursor: pointer; }

    .filters-bar {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      overflow-x: auto;
      padding-bottom: 5px;
      scrollbar-width: none;
    }
    .filters-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .filter-btn.active { background: white; color: black; border-color: white; }

    .main-container { padding: 20px 4%; margin-top: -40px; position: relative; z-index: 5; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 15px; color: #e5e5e5; display: flex; justify-content: space-between; align-items: center; }

    .results-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .movie-card {
      position: relative;
      aspect-ratio: 2/3;
      background: #1a1a1a;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .movie-card:hover { transform: scale(1.05); z-index: 10; }
    .movie-card-info { position: absolute; bottom: 0; width: 100%; padding: 10px; background: linear-gradient(to top, rgba(0,0,0,1), transparent); opacity: 0; transition: opacity 0.3s; }
    .movie-card:hover .movie-card-info { opacity: 1; }
    .movie-title { font-size: 11px; font-weight: bold; }

    .btn-add-list {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.6);
      color: white;
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .movie-card:hover .btn-add-list { opacity: 1; }
    .btn-add-list.in-list { color: var(--netflix-red); opacity: 1; }

    #player-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
      display: none;
      flex-direction: column;
    }

    .player-header {
      padding: 10px 4%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.9);
      z-index: 10001;
    }

    .btn-close { background: transparent; border: none; color: white; font-size: 30px; cursor: pointer; }

    .player-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-option { background: #333; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 11px; cursor: pointer; font-weight: bold; }
    .btn-option.active { background: var(--netflix-red); }

    #video-container { flex: 1; width: 100%; height: 100%; background: black; }
    iframe { width: 100%; height: 100%; border: none; }

    .netflix-loader {
      position: fixed;
      inset: 0;
      background: var(--netflix-dark);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 11000;
    }

    .loader-circle { width: 40px; height: 40px; border: 3px solid #333; border-top-color: var(--netflix-red); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) {
      .results-row { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      .hero { height: 40vh; }
    }
  </style>
</head>
<body>

<div id="loader" class="netflix-loader">
  <div class="loader-circle"></div>
</div>

<header id="navbar">
  <div class="logo" onclick="location.reload()">PureFlix</div>
</header>

<section class="hero">
  <h1 style="font-size: 32px; font-weight: 900;">App Edition</h1>
  <div class="search-box">
    <input type="text" id="search-input" placeholder="Filmes, Séries, TV..." onkeypress="if(event.key==='Enter') searchMovies()" />
    <button class="btn-search" onclick="searchMovies()">Buscar</button>
  </div>
  <div class="filters-bar">
    <button class="filter-btn active" onclick="applyFilter('all', this)">Tudo</button>
    <button class="filter-btn" onclick="applyFilter('4k', this)">4K Ultra HD</button>
    <button class="filter-btn" onclick="applyFilter('1080p', this)">1080p Full HD</button>
    <button class="filter-btn" onclick="applyFilter('dublado', this)">Dublado</button>
    <button class="filter-btn" onclick="applyFilter('2024', this)">Lançamentos</button>
    <button class="filter-btn" onclick="applyFilter('action', this)">Ação</button>
    <button class="filter-btn" onclick="applyFilter('comedy', this)">Comédia</button>
  </div>
</section>

<div class="main-container">
  <!-- Minha Lista -->
  <div id="my-list-section" style="display: none;">
    <h2 class="section-title">Minha Lista</h2>
    <div id="my-list-grid" class="results-row"></div>
  </div>

  <!-- Resultados da Busca -->
  <div id="results-section" style="display: none;">
    <h2 class="section-title">Resultados</h2>
    <div id="results-grid" class="results-row"></div>
  </div>

  <!-- Tendências -->
  <h2 class="section-title">Tendências de Hoje</h2>
  <div class="results-row" id="trending-grid"></div>
</div>

<div id="player-overlay">
  <div class="player-header">
    <button class="btn-close" onclick="closePlayer()">×</button>
    <div class="player-options">
      <button id="btn-webtor" class="btn-option active" onclick="switchPlayer('webtor')">Webtor (Nuvem)</button>
      <button id="btn-bridge" class="btn-option" onclick="switchPlayer('bridge')">Ponte Turbo</button>
      <button id="btn-vlc" class="btn-option" style="background:#ff8800">VLC</button>
    </div>
  </div>
  <div id="video-container"></div>
</div>

<script>
  const BRIDGE_URL = 'https://3000-i4ey8w62o2n6d0gznpsvz-9b402bb6.us2.manus.computer';
  let currentMagnet = '';
  let myList = JSON.parse(localStorage.getItem('pureflix_list')) || [];

  window.onload = () => {
    loadTrending();
    updateMyListUI();
  };

  async function loadTrending() {
    try {
      const response = await fetch(`${BRIDGE_URL}/search?q=2024+trending`);
      const data = await response.json();
      if (data && data.length > 0) renderResults(data.slice(0, 12), document.getElementById('trending-grid'));
    } catch (e) {}
  }

  async function searchMovies() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;
    showLoader(true);
    try {
      const response = await fetch(`${BRIDGE_URL}/search?q=${encodeURIComponent(query)}`);
      const data = await response.json();
      document.getElementById('results-section').style.display = 'block';
      renderResults(data, document.getElementById('results-grid'));
      window.scrollTo({ top: 350, behavior: 'smooth' });
    } catch (e) { alert('Erro na busca.'); }
    finally { showLoader(false); }
  }

  function applyFilter(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('search-input').value = type === 'all' ? '' : type;
    searchMovies();
  }

  function renderResults(data, container) {
    container.innerHTML = '';
    data.forEach(item => {
      const magnet = `magnet:?xt=urn:btih:${item.info_hash}&dn=${encodeURIComponent(item.name)}`;
      const isInList = myList.some(m => m.info_hash === item.info_hash);
      
      const card = document.createElement('div');
      card.className = 'movie-card';
      card.innerHTML = `
        <div onclick="openPlayer('${magnet}', '${item.name}')" style="height:100%; display:flex; align-items:center; justify-content:center; background:#222; padding:10px; text-align:center; font-size:11px; color:#aaa;">${item.name}</div>
        <button class="btn-add-list ${isInList ? 'in-list' : ''}" onclick="toggleMyList(event, ${JSON.stringify(item).replace(/"/g, '&quot;')})">${isInList ? '✓' : '+'}</button>
        <div class="movie-card-info" onclick="openPlayer('${magnet}', '${item.name}')">
          <div class="movie-title">${item.name}</div>
          <div style="font-size:9px; color:#46d369; margin-top:4px;">${item.seeders} Seeds</div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function toggleMyList(event, item) {
    event.stopPropagation();
    const index = myList.findIndex(m => m.info_hash === item.info_hash);
    if (index > -1) {
      myList.splice(index, 1);
    } else {
      myList.unshift(item);
    }
    localStorage.setItem('pureflix_list', JSON.stringify(myList));
    updateMyListUI();
    
    // Atualizar ícone no card clicado
    event.target.classList.toggle('in-list');
    event.target.innerText = event.target.classList.contains('in-list') ? '✓' : '+';
  }

  function updateMyListUI() {
    const section = document.getElementById('my-list-section');
    const grid = document.getElementById('my-list-grid');
    if (myList.length > 0) {
      section.style.display = 'block';
      renderResults(myList, grid);
    } else {
      section.style.display = 'none';
    }
  }

  function openPlayer(magnet, name) {
    currentMagnet = magnet;
    document.getElementById('player-overlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    document.getElementById('btn-vlc').onclick = () => window.location.href = magnet;
    switchPlayer('webtor');
  }

  function switchPlayer(type) {
    const container = document.getElementById('video-container');
    container.innerHTML = '';
    document.getElementById('btn-webtor').classList.toggle('active', type === 'webtor');
    document.getElementById('btn-bridge').classList.toggle('active', type === 'bridge');

    if (type === 'webtor') {
      const iframe = document.createElement('iframe');
      iframe.src = `https://webtor.io/show?magnet=${encodeURIComponent(currentMagnet)}`;
      iframe.allowFullscreen = true;
      container.appendChild(iframe);
    } else {
      const video = document.createElement('video');
      video.controls = true;
      video.autoplay = true;
      video.src = `${BRIDGE_URL}/stream?magnet=${encodeURIComponent(currentMagnet)}`;
      container.appendChild(video);
    }
  }

  function closePlayer() {
    document.getElementById('video-container').innerHTML = '';
    document.getElementById('player-overlay').style.display = 'none';
    document.body.style.overflow = 'auto';
  }

  function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }
</script>

</body>
</html>
