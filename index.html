<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pureflix Premium</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<header id="navbar">
  <div class="logo">PUREFLIX</div>

  <nav>
    <a href="#">Início</a>
    <a href="#">Filmes</a>
    <a href="#">Séries</a>
    <a href="#">Bombando</a>
  </nav>

  <div class="header-right">
    <i class="fas fa-search"></i>
    <i class="fas fa-bell"></i>
    <div class="avatar"></div>
  </div>
</header>

<section class="hero" id="hero-banner">
  <div class="overlay"></div>

  <div class="hero-content">
    <span class="hero-badge">EM DESTAQUE</span>
    <h1 id="hero-title">Carregando...</h1>
    <p id="hero-desc"></p>

    <div class="hero-buttons">
      <button class="play-btn">
        <i class="fas fa-play"></i>
        Assistir
      </button>

      <button class="info-btn">
        <i class="fas fa-info-circle"></i>
        Informações
      </button>
    </div>
  </div>
</section>

<main>
  <section>
    <h2>Lançamentos</h2>
    <div class="movie-grid" id="movie-grid"></div>
  </section>
</main>

<script src="assets/js/app.js"></script>
</body>
</html>
