<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PureFlix - Performance Edition</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --netflix-red: #e50914;
      --netflix-black: #141414;
      --netflix-dark: #000000;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body { 
      background-color: var(--netflix-black); 
      color: white; 
      font-family: 'Roboto', sans-serif; 
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* Otimização de Renderização: GPU Acceleration */
    header, .movie-card, .netflix-loader {
      will-change: transform, opacity;
      transform: translateZ(0);
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 4%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
      transition: background 0.3s ease;
    }

    header.scrolled { background-color: var(--netflix-dark); }

    .logo {
      color: var(--netflix-red);
      font-size: 28px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
    }

    .hero {
      height: 80vh;
      position: relative;
      background: linear-gradient(to right, rgba(0,0,0,0.9) 20%, transparent 80%),
                  url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=1200&auto=format&fit=crop') center/cover no-repeat;
      display: flex;
      align-items: center;
      padding: 0 4%;
    }

    .hero-content { max-width: 550px; z-index: 2; }
    .hero-title { font-size: clamp(32px, 8vw, 56px); font-weight: 900; margin-bottom: 15px; line-height: 1.1; }
    .hero-desc { font-size: 16px; margin-bottom: 25px; color: #ccc; }

    .search-box {
      display: flex;
      gap: 8px;
      background: rgba(0,0,0,0.6);
      padding: 8px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .search-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      font-size: 16px;
      outline: none;
      padding: 8px;
    }

    .btn-play {
      background-color: var(--netflix-red);
      color: white;
      padding: 10px 20px;
      border-radius: 4px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .btn-play:hover { transform: scale(1.05); }

    .main-container { padding: 20px 4%; margin-top: -80px; position: relative; z-index: 5; }
    .section-title { font-size: 20px; font-weight: 700; margin-bottom: 15px; color: #e5e5e5; }

    .results-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
      margin-bottom: 40px;
    }

    .movie-card {
      position: relative;
      aspect-ratio: 16/9;
      background: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(0.33, 1, 0.68, 1);
    }

    .movie-card:hover {
      transform: scale(1.1) translateY(-5px);
      z-index: 10;
      box-shadow: 0 10px 20px rgba(0,0,0,0.6);
    }

    .movie-card-info {
      position: absolute;
      bottom: 0;
      width: 100%;
      padding: 10px;
      background: linear-gradient(to top, rgba(0,0,0,1), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .movie-card:hover .movie-card-info { opacity: 1; }
    .movie-title { font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .movie-meta { font-size: 10px; color: #46d369; margin-top: 4px; }

    #player-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 2000;
      display: none;
      flex-direction: column;
    }

    .player-header { padding: 15px 4%; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.5); }
    .btn-back { background: transparent; border: none; color: white; font-size: 24px; cursor: pointer; }

    #video-container { flex: 1; display: flex; align-items: center; justify-content: center; }
    video { width: 100%; height: 100%; max-height: 100vh; outline: none; }

    .netflix-loader {
      position: fixed;
      inset: 0;
      background: var(--netflix-dark);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 3000;
    }

    .loader-circle {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top-color: var(--netflix-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loader" class="netflix-loader">
  <div class="loader-circle"></div>
</div>

<header id="navbar">
  <div class="logo" onclick="location.reload()">PureFlix</div>
</header>

<section class="hero">
  <div class="hero-content">
    <h1 class="hero-title">Otimizado para você.</h1>
    <p class="hero-desc">Streaming fluido, busca instantânea e performance de elite.</p>
    
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Título, gênero ou artista..." onkeypress="if(event.key==='Enter') searchMovies()" />
      <button class="btn-play" onclick="searchMovies()">Buscar</button>
    </div>
  </div>
</section>

<div class="main-container">
  <div id="results-section" style="display: none;">
    <h2 class="section-title">Encontrados para você</h2>
    <div id="results-grid" class="results-row"></div>
  </div>

  <h2 class="section-title">Em alta</h2>
  <div class="results-row" id="trending-row">
    <!-- Placeholder cards -->
    <div class="movie-card"><div style="height:100%; background:#222;"></div></div>
    <div class="movie-card"><div style="height:100%; background:#222;"></div></div>
    <div class="movie-card"><div style="height:100%; background:#222;"></div></div>
    <div class="movie-card"><div style="height:100%; background:#222;"></div></div>
    <div class="movie-card"><div style="height:100%; background:#222;"></div></div>
  </div>
</div>

<div id="player-overlay">
  <div class="player-header">
    <button class="btn-back" onclick="closePlayer()">←</button>
    <div id="playing-title" style="font-weight: bold;">Carregando...</div>
  </div>
  <div id="video-container"></div>
</div>

<script>
  const BRIDGE_URL = 'https://3000-i4ey8w62o2n6d0gznpsvz-9b402bb6.us2.manus.computer';

  // Otimização de Scroll do Header (Throttling)
  let lastScroll = 0;
  window.addEventListener('scroll', () => {
    const now = Date.now();
    if (now - lastScroll < 50) return;
    lastScroll = now;
    
    const header = document.getElementById('navbar');
    if (window.scrollY > 50) header.classList.add('scrolled');
    else header.classList.remove('scrolled');
  });

  async function searchMovies() {
    const query = document.getElementById('search-input').value.trim();
    if (!query) return;

    showLoader(true);
    const grid = document.getElementById('results-grid');
    grid.innerHTML = '';

    try {
      const response = await fetch(`${BRIDGE_URL}/search?q=${encodeURIComponent(query)}`);
      const data = await response.json();

      document.getElementById('results-section').style.display = 'block';
      
      if (!data || data.length === 0) {
        grid.innerHTML = '<p style="padding: 20px; color: #888;">Nenhum resultado encontrado.</p>';
      } else {
        // DocumentFragment para otimizar inserção no DOM
        const fragment = document.createDocumentFragment();
        
        data.slice(0, 18).forEach(item => {
          const magnet = `magnet:?xt=urn:btih:${item.info_hash}&dn=${encodeURIComponent(item.name)}`;
          const card = document.createElement('div');
          card.className = 'movie-card';
          card.onclick = () => playMovie(magnet, item.name);
          
          const sizeGB = (item.size / 1024 / 1024 / 1024).toFixed(1);
          
          card.innerHTML = `
            <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#1a1a1a; font-size:10px; text-align:center; padding:10px; color:#555;">
              ${item.name}
            </div>
            <div class="movie-card-info">
              <div class="movie-title">${item.name}</div>
              <div class="movie-meta">${item.seeders} Seeds • ${sizeGB} GB</div>
            </div>
          `;
          fragment.appendChild(card);
        });
        grid.appendChild(fragment);
      }
      window.scrollTo({ top: 500, behavior: 'smooth' });
    } catch (e) {
      console.error(e);
    } finally {
      showLoader(false);
    }
  }

  function playMovie(magnet, name) {
    showLoader(true);
    document.getElementById('playing-title').innerText = name;
    
    const streamUrl = `${BRIDGE_URL}/stream?magnet=${encodeURIComponent(magnet)}`;
    const container = document.getElementById('video-container');
    container.innerHTML = '';

    const video = document.createElement('video');
    video.controls = true;
    video.autoplay = true;
    video.playsInline = true;
    
    const source = document.createElement('source');
    source.src = streamUrl;
    video.appendChild(source);
    container.appendChild(video);

    video.oncanplay = () => {
      showLoader(false);
      document.getElementById('player-overlay').style.display = 'flex';
      document.body.style.overflow = 'hidden';
    };

    video.onerror = () => {
      showLoader(false);
      alert('Erro ao carregar o vídeo.');
    };
  }

  function closePlayer() {
    document.getElementById('player-overlay').style.display = 'none';
    document.getElementById('video-container').innerHTML = '';
    document.body.style.overflow = 'auto';
  }

  function showLoader(show) {
    document.getElementById('loader').style.display = show ? 'flex' : 'none';
  }
</script>

</body>
</html>
