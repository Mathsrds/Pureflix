<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Pureflix</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════════════════════
   1. VARIÁVEIS E GERAIS
   ═══════════════════════════════════════════════════════ */
:root{
  --red:#e50914; --red2:#b20710;
  --bg:#0a0a0a; --bg2:#141414; --bg3:#1a1a1a; --bg4:#222;
  --white:#fff; --gray:#aaa; --light:#e5e5e5;
  --green:#46d369; --gold:#f5c518; --blue:#0071eb;
  --orange:#f39c12;
  --card-w:180px; --card-h:270px;
  --header-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;overflow-x:hidden;min-height:100vh;}
::-webkit-scrollbar{height:4px;width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#333;border-radius:4px;}

/* ═══════════════════════════════════════════════════════
   2. CABEÇALHO (HEADER) INTELIGENTE
   ═══════════════════════════════════════════════════════ */
#header{position:fixed;top:0;left:0;right:0;height:var(--header-h);display:flex;align-items:center;padding:0 4%;z-index:900;transition:background .4s, transform .3s ease-in-out;will-change:transform,background;contain:layout style;}
#header.solid{background:var(--bg2);box-shadow:0 2px 20px rgba(0,0,0,.6);}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--red);letter-spacing:3px;cursor:pointer;margin-right:30px;flex-shrink:0;}
.nav{display:flex;gap:6px;align-items:center;}
.nav-btn{background:none;border:none;color:var(--gray);font-family:'Barlow',sans-serif;font-size:13px;padding:6px 10px;cursor:pointer;border-radius:4px;transition:all .2s;white-space:nowrap;}
.nav-btn:hover,.nav-btn.active{color:var(--white);background:rgba(255,255,255,.08);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.header-right button{background:none;border:none;color:var(--gray);font-size:16px;cursor:pointer;transition:color .2s;padding:4px;}
.header-right button:hover{color:var(--white);}
.avatar{width:30px;height:30px;background:var(--red);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}

/* Busca */
#searchbar{position:fixed;top:var(--header-h);left:0;right:0;background:rgba(10,10,10,.97);padding:14px 4%;z-index:899;border-bottom:1px solid #222;display:none;}
#searchbar.open{display:flex;gap:10px;}
#searchbar input{flex:1;background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:10px 16px;color:#fff;font-size:15px;font-family:'Barlow',sans-serif;outline:none;}
#searchbar input:focus{border-color:#555;}
#searchbar button{background:var(--red);color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;}

/* ═══════════════════════════════════════════════════════
   3. HERO (BANNER PRINCIPAL) E CARROSSÉIS
   ═══════════════════════════════════════════════════════ */
#hero{height:90vh;position:relative;overflow:hidden;}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1s;background:center/cover no-repeat;}
.hero-slide.active{opacity:1;}
.hero-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,10,.4) 40%,transparent 70%), linear-gradient(to right,rgba(10,10,10,.85) 0%,transparent 55%);}
.hero-content{position:absolute;bottom:18%;left:4%;max-width:540px;z-index:10;}
.hero-grad{background:linear-gradient(to top, rgba(10,10,10,1) 0%, rgba(10,10,10,.6) 40%, transparent 100%);}
.hero-tags{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.hero-tag{font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:2px;text-transform:uppercase;}
.hero-tag.red{background:var(--red);}
.hero-tag.outline{border:1px solid rgba(255,255,255,.4);color:#ddd;}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-size:62px;font-weight:900;line-height:.95;letter-spacing:1px;margin-bottom:12px;text-shadow:0 2px 20px rgba(0,0,0,.5);}
.hero-meta{font-size:13px;color:var(--gray);margin-bottom:12px;display:flex;gap:12px;align-items:center;}
.hero-meta .score{color:var(--green);font-weight:700;}
.hero-desc{font-size:15px;color:#ccc;line-height:1.6;max-height:72px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.hero-btns{display:flex;gap:12px;margin-top:20px;}
.btn-watch{background:var(--red);color:#fff;border:none;padding:11px 28px;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'Barlow',sans-serif;transition:background .2s;}
.btn-watch:hover{background:var(--red2);}
.btn-more{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);padding:11px 24px;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'Barlow',sans-serif;backdrop-filter:blur(4px);transition:background .2s;}
.btn-more:hover{background:rgba(255,255,255,.25);}
.hero-dots{position:absolute;bottom:6%;left:4%;display:flex;gap:6px;z-index:10;}
.hero-dot{width:6px;height:6px;background:rgba(255,255,255,.3);border-radius:50%;cursor:pointer;transition:all .3s;}
.hero-dot.active{width:20px;border-radius:3px;background:var(--red);}

#page-home{padding-bottom:60px;}
.section{padding:0 4%;margin-top:48px;content-visibility:auto;contain-intrinsic-size:auto 300px;}
.section-header{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:.5px;}

.carousel-wrap{position:relative;}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(10,10,10,.85);border:1px solid #333;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:0;}
.carousel-wrap:hover .carousel-btn{opacity:1;}
.carousel-btn:hover{background:rgba(229,9,20,.8);border-color:var(--red);}
.carousel-btn.prev{left:-22px;}
.carousel-btn.next{right:-22px;}
.carousel{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;padding-bottom:6px;overscroll-behavior-x:contain;-webkit-overflow-scrolling:touch;}
.carousel::-webkit-scrollbar{height:0;}

.card{flex:0 0 var(--card-w);width:var(--card-w);background:var(--bg3);border-radius:6px;overflow:hidden;cursor:pointer;position:relative;scroll-snap-align:start;transition:transform .25s,box-shadow .25s;contain:layout style paint;content-visibility:auto;contain-intrinsic-size:0 270px;}
.card-thumb{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:#1a1a1a;transition:transform .3s;}
.card:hover{transform:scale(1.07);z-index:20;box-shadow:0 14px 40px rgba(0,0,0,.7);}
.card img{width:100%;height:100%;object-fit:cover;display:block;}
.card-overlay{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.97));opacity:0;transition:opacity .25s;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;}
.card:hover .card-overlay{opacity:1;}
.card-title{font-size:12px;font-weight:700;line-height:1.3;margin-bottom:4px;}
.card-meta{font-size:11px;color:var(--green);font-weight:700;}
.card-actions{display:flex;gap:8px;margin-top:8px;}
.card-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.5);background:rgba(0,0,0,.6);color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.card-btn:hover{background:var(--red);border-color:var(--red);}
.card-btn.fav-on{background:var(--red);border-color:var(--red);}
.card-badge{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;letter-spacing:.5px;text-transform:uppercase;}
.card-continue{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red);}
.skel{background:linear-gradient(90deg,#1a1a1a 25%,#262626 50%,#1a1a1a 75%);background-size:400% 100%;animation:skel 1.4s infinite;border-radius:6px;flex:0 0 var(--card-w);height:var(--card-h);}
@keyframes skel{0%{background-position:400% 0}100%{background-position:-400% 0}}

/* ═══════════════════════════════════════════════════════
   4. PÁGINA DE DETALHES E PLAYER
   ═══════════════════════════════════════════════════════ */
#page-details{position:fixed;inset:0;background:var(--bg);z-index:950;display:none;overflow-y:auto;padding-top:0;}
.det-backdrop{width:100%;height:calc(420px + var(--header-h));position:relative;background:center/cover no-repeat;flex-shrink:0;}
.det-backdrop::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,10,.3) 55%,transparent 85%);}
.det-body{max-width:1100px;margin:0 auto;padding:0 4% 60px;display:flex;gap:36px;margin-top:-160px;position:relative;z-index:5;}
.det-poster{width:210px;flex-shrink:0;border-radius:8px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.7);}
.det-poster img{width:100%;display:block;}
.det-info{flex:1;min-width:0;}
.det-title{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;letter-spacing:1px;line-height:.95;margin-bottom:14px;}
.det-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.det-tag{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:4px 12px;border-radius:3px;font-size:12px;color:#ccc;}
.det-tag.green{color:var(--green);border-color:rgba(70,211,105,.3);}
.det-tag.red{background:rgba(229,9,20,.15);border-color:rgba(229,9,20,.3);color:#ff7070;}
.det-synopsis{font-size:15px;line-height:1.7;color:#bbb;margin-bottom:24px;}
.det-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px;}

/* Player e Servidores */
.player-section{margin-bottom:20px;}
.player-label{font-size:11px;color:var(--gray);margin-bottom:10px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:6px;}
.server-grid{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px;margin-bottom:14px;flex-wrap:nowrap;overscroll-behavior-x:contain;-webkit-overflow-scrolling:touch;}
.server-grid::-webkit-scrollbar{display:none;}
.srv-btn{background:transparent;border:1px solid #444;color:#ccc;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;font-family:'Barlow',sans-serif;white-space:nowrap;flex-shrink:0;}
.srv-btn:hover:not(.active){border-color:#fff;color:#fff;}
.srv-btn.active{background:var(--red);border-color:var(--red);color:#fff;}
.srv-btn.trying{border-color:orange;color:orange;animation:pulse .8s infinite;}
.srv-btn.srv-unavail{opacity:.4;cursor:not-allowed;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.player-box{width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;overflow:hidden;position:relative;}
.player-box iframe{width:100%;height:100%;border:none;display:block;position:absolute;inset:0;}
.player-loader{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:2;}
.spinner{width:48px;height:48px;border:3px solid #222;border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.player-loader p{font-size:13px;color:#555;}

/* Botão de play falso */
#fake-play-btn{position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#000;cursor:pointer;transition:background .2s;}
#fake-play-btn:hover,#fake-play-btn:active{background:#111;}
#fake-play-btn .play-circle{width:72px;height:72px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(229,9,20,.5);transition:transform .15s;}
#fake-play-btn:hover .play-circle,#fake-play-btn:active .play-circle{transform:scale(1.1);}
#fake-play-btn .play-circle i{font-size:28px;color:#fff;margin-left:4px;}
#fake-play-btn .play-label{font-size:13px;color:#aaa;font-weight:600;letter-spacing:.5px;}
#fake-play-btn .play-title{font-size:15px;color:#fff;font-weight:700;text-align:center;padding:0 20px;max-width:320px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fallback-bar{margin-top:10px;display:none;background:rgba(255,165,0,.1);border:1px solid rgba(255,165,0,.3);border-radius:6px;padding:10px 16px;font-size:13px;color:orange;align-items:center;justify-content:space-between;gap:10px;}
.fallback-bar.show{display:flex;}
.fallback-bar button{background:orange;color:#000;border:none;border-radius:4px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;}

/* Temporadas (Apenas Séries) */
.seasons-section{margin-top:24px;}
.seasons-label{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.season-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.season-tab{background:var(--bg3);border:1px solid #2a2a2a;color:#ccc;padding:6px 16px;border-radius:4px;font-size:13px;cursor:pointer;transition:all .2s;font-family:'Barlow',sans-serif;}
.season-tab:hover{border-color:#555;}
.season-tab.active{background:var(--red);border-color:var(--red);color:#fff;}
.episodes-grid{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;padding-right:4px;}
.episode-card{display:flex;gap:14px;background:var(--bg3);border-radius:6px;padding:10px;cursor:pointer;border:1px solid transparent;transition:all .2s;}
.episode-card:hover,.episode-card.active{border-color:#333;background:#222;}
.episode-card.active{border-color:var(--red);}
.ep-thumb{width:120px;height:68px;background:#111;border-radius:4px;overflow:hidden;flex-shrink:0;position:relative;}
.ep-thumb img{width:100%;height:100%;object-fit:cover;}
.ep-thumb .play-over{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.episode-card:hover .play-over{opacity:1;}
.ep-info{flex:1;min-width:0;}
.ep-num{font-size:11px;color:var(--gray);margin-bottom:4px;}
.ep-title{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ep-desc{font-size:12px;color:#777;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ═══════════════════════════════════════════════════════
   5. COMPONENTES EXTRAS
   ═══════════════════════════════════════════════════════ */
.empty-row{text-align:center;padding:30px;color:#444;font-size:14px;}
.ver-mais-wrap{text-align:center;margin-top:14px;}
.ver-mais-btn{background:transparent;border:1px solid #333;color:#aaa;padding:8px 28px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow',sans-serif;transition:all .2s;}
.ver-mais-btn:hover{border-color:var(--red);color:#fff;background:rgba(229,9,20,.1);}
.ver-mais-btn:disabled{opacity:.4;cursor:default;}
#toast{position:fixed;bottom:30px;right:30px;background:#222;border:1px solid #333;border-radius:8px;padding:12px 20px;font-size:14px;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
.btn-close{position:fixed;top:16px;right:4%;width:38px;height:38px;background:rgba(0,0,0,.7);border:1px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;z-index:960;transition:background .2s;}
.btn-close:hover{background:var(--red);}

/* Mobile Adapts */
@media(max-width:768px){
  :root{--card-w:130px;--card-h:195px;--header-h:56px;}
  #header{padding:0 16px;background:transparent;transform:none!important;}
  #header.solid{background:rgba(10,10,10,.97)!important;box-shadow:0 2px 12px rgba(0,0,0,.6);}
  .logo{font-size:26px;margin-right:0;}
  .nav{display:none!important;}
  .header-right{gap:12px;}
  .header-right button{font-size:18px;}
  .avatar{width:28px;height:28px;font-size:12px;border-radius:4px;}
  #searchbar{top:var(--header-h);padding:10px 16px;}
  #searchbar input{font-size:14px;padding:9px 14px;}
  #mobile-cats{
    display:flex;gap:8px;padding:10px 16px 4px;
    overflow-x:auto;scrollbar-width:none;
    position:sticky;top:var(--header-h);z-index:800;
    background:linear-gradient(var(--bg) 80%,transparent);
  }
  #mobile-cats::-webkit-scrollbar{display:none;}
  .mob-cat{
    flex-shrink:0;padding:5px 16px;border-radius:20px;
    border:1px solid #444;background:rgba(255,255,255,.08);
    color:#ccc;font-size:13px;font-weight:600;cursor:pointer;
    white-space:nowrap;transition:all .2s;font-family:'Barlow',sans-serif;
  }
  .mob-cat.active,.mob-cat:active{background:#fff;color:#000;border-color:#fff;}
  #hero{height:82vw;min-height:280px;max-height:480px;}
  .hero-title{font-size:32px;line-height:1.1;}
  .hero-content{bottom:10%;left:16px;right:16px;max-width:100%;}
  .hero-btns{flex-wrap:wrap;gap:8px;}
  .hero-btns button{font-size:13px;padding:9px 18px;}
  .section{margin-bottom:28px;margin-top:0;}
  .section-title{font-size:16px;padding:0 0;margin-bottom:12px;}
  .carousel-wrap{padding:0 16px;}
  .carousel{gap:8px;}
  .carousel-btn{display:none;}
  .card-thumb{border-radius:6px;}
  .det-body{flex-direction:column;margin-top:-50px;padding:0 16px 100px;}
  .det-poster{width:110px;margin:0 auto;}
  .det-title{font-size:26px;text-align:center;}
  .det-tags{justify-content:center;}
  .det-synopsis{font-size:13px;}
  .det-btns{justify-content:center;}
  .player-section{margin-top:20px;}
  .server-grid{gap:6px;flex-wrap:nowrap;}
  .srv-btn{font-size:12px;padding:7px 14px;border-radius:20px;}
  .episode-card{padding:10px;}
  .ep-thumb{width:100px;height:56px;}
  #page-home{padding-bottom:70px;}
  #mobile-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    height:60px;background:rgba(10,10,10,.97);
    border-top:1px solid #1f1f1f;z-index:1000;
    justify-content:space-around;align-items:center;
    padding-bottom:env(safe-area-inset-bottom);
  }
  .mob-nav-btn{
    display:flex;flex-direction:column;align-items:center;
    gap:3px;background:none;border:none;color:#777;
    font-size:10px;font-weight:600;cursor:pointer;
    font-family:'Barlow',sans-serif;padding:6px 10px;
    transition:color .2s;min-width:48px;
  }
  .mob-nav-btn i{font-size:20px;}
  .mob-nav-btn.active,.mob-nav-btn:active{color:#fff;}
  .mob-nav-btn.active i{color:#fff;}
  #page-details ~ #mobile-nav{display:none;}
}
@media(min-width:769px){
  #mobile-cats{display:none;}
  #mobile-nav{display:none;}
}

/* ═══════ CALENDÁRIO ═══════ */
#page-calendario{display:none;min-height:100vh;padding-top:var(--header-h);}

/* Variáveis Calendário */
:root{
  --today:#e50914;
  --future:#46d369;
  --past:#aaa;
  --delayed:#f39c12;
  --pill-h:44px;
  --bottom-h:60px;
}

#pills-bar{
  position:fixed;
  top:var(--header-h);
  left:0;right:0;
  height:var(--pill-h);
  z-index:800;
  display:flex;
  gap:8px;
  padding:0 4%;
  align-items:center;
  overflow-x:auto;
  background:linear-gradient(to bottom,rgba(10,10,10,.95),rgba(10,10,10,.7));
  scrollbar-width:none;
}
#pills-bar::-webkit-scrollbar{display:none;}
.pill{
  flex-shrink:0;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  color:#ccc;
  font-size:13px;font-weight:600;
  font-family:'Barlow',sans-serif;
  padding:6px 18px;
  border-radius:20px;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.pill:hover{background:rgba(255,255,255,.18);color:#fff;}
.pill.active{background:#fff;border-color:#fff;color:#000;font-weight:700;}

#main{
  padding-top:calc(var(--header-h) + var(--pill-h) + 12px);
  padding-bottom:calc(var(--bottom-h) + 16px);
  min-height:100vh;
}

#state-box{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:50vh;gap:16px;color:var(--gray);
}

/g,'\n').replace(/
/g,'\r'); }
function normalizePoster(poster){ if(!poster)return''; if(poster.startsWith('http'))return poster; if(poster.startsWith('/'))return `${IMG}/w500${poster}`; return `${IMG}/w500/${poster}`; }

function addWatchLater(item){
  const list=getWatchLater();
  if(list.some(x=>String(x.id)===String(item.id))) return false;
  const overview=(item.overview||'').substring(0,500);
  list.unshift({ id:item.id, type:item.type||item.media_type||'movie', title:item.title||item.name||'', poster:normalizePoster(item.poster||item.poster_path||''), backdrop:normalizePoster(item.backdrop||item.backdrop_path||''), release:item.release||item.release_date||item.first_air_date||'', overview:overview, rating:item.rating||item.vote_average||'', savedAt:Date.now() });
  try{ saveWatchLater(list); return true; }
  catch(e){ toast('❌ Erro: lista cheia'); return false; }
}
function removeWatchLater(id){saveWatchLater(getWatchLater().filter(x=>String(x.id)!==String(id)));}
function toggleWatchLater(item){ if(isInWatchLater(item.id)){removeWatchLater(item.id);return false;}else{addWatchLater(item);return true;} }

function getNotifications(){try{return JSON.parse(localStorage.getItem(NOTIF_KEY)||'[]');}catch(e){return[];}}
function addNotification(item){
  let list=getNotifications();
  if(list.some(x=>String(x.id)===String(item.id))) return false;
  list.push({id:item.id,type:item.type||'movie',title:item.title||item.name||'',poster:item.poster||item.poster_path||'',release:item.release||item.release_date||item.first_air_date||''});

function isNotifying(id){return getNotifications().some(x=>String(x.id)===String(id));}
async function requestNotifPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission==='granted') return true;
  if(Notification.permission==='denied') return false;
  const p=await Notification.requestPermission();
  return p==='granted';
}

const MEM = {};
const ADULT_KEYWORDS = '156564,9951,282939,155477,6917';

async function api(path, params={}) {
  const url = new URL(BASE+path);
  url.searchParams.set('language','pt-BR');
  url.searchParams.set('include_adult','false');
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  if(path.includes('/discover') || path.includes('/trending') || path.includes('/popular') || path.includes('/top_rated') || path.includes('/upcoming') || path.includes('/airing')){
    const curKw = url.searchParams.get('without_keywords') || '';
    const merged = curKw ? curKw+','+ADULT_KEYWORDS : ADULT_KEYWORDS;
    url.searchParams.set('without_keywords', merged);
  }
  const key = url.toString();
  if (MEM[key]) return MEM[key];
  try {
    const r = await fetch(url, OPTS);
    const d = await r.json();
    if(d && d.results){
      d.results = d.results.filter(item => !item.adult);
      if(params.with_original_language === 'ja'){
        d.results = d.results.filter(item => item.original_language === 'ja' && (item.genre_ids||[]).includes(16));
      }
      if(params.with_genres && params.with_genres.includes('16') && params.with_genres.includes(',')){
        d.results = d.results.filter(item => (item.genre_ids||[]).includes(16));
      }
    }
    MEM[key] = d;
    return d;
  } catch(e) { return {}; }
}

setInterval(()=>{
  const keys = Object.keys(MEM);
  if(keys.length > 200){
    keys.slice(0, Math.floor(keys.length/2)).forEach(k=>delete MEM[k]);
  }
}, 300000);

let heroItems=[], heroIdx=0, heroTimer;
async function loadHero(){
  try{
    const HERO_KEY='pf_hero_cache', HERO_TTL=1800000;
    const cached=store.get(HERO_KEY);
    let results;
    if(cached.ts && Date.now()-cached.ts < HERO_TTL && cached.items?.length){
      results=cached.items;
    } else {
      const d=await api('/trending/all/week',{region:'BR'});
      results=(d.results||[]).filter(m=>m.backdrop_path && m.poster_path && !m.adult).slice(0,8);
      store.set(HERO_KEY,{ts:Date.now(),items:results});
    }
    heroItems=results;
    const hero=document.getElementById('hero');
    const dots=document.getElementById('hero-dots');
    hero.querySelectorAll('.hero-slide').forEach(s=>s.remove());
    dots.innerHTML='';
    heroItems.forEach((m,i)=>{
      const s=document.createElement('div');
      s.className='hero-slide'+(i===0?' active':'');
      s.style.backgroundImage=`url('${IMG}/w1280${m.backdrop_path}')`;
      hero.insertBefore(s,dots);
      const d2=document.createElement('div');
      d2.className='hero-dot'+(i===0?' active':'');
      d2.onclick=()=>setHero(i);
      dots.appendChild(d2);
    });
    renderHeroContent(0);
    heroTimer=setInterval(()=>setHero((heroIdx+1)%heroItems.length),45000);
  }catch(err){}
}
function setHero(i){
  heroIdx=i;
  document.querySelectorAll('.hero-slide').forEach((s,j)=>s.classList.toggle('active',j===i));
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
  renderHeroContent(i);
}
function renderHeroContent(i){
  const m=heroItems[i]; if(!m) return;
  const hero=document.getElementById('hero');
  let c=hero.querySelector('.hero-content');
  if(!c){ c=document.createElement('div'); c.className='hero-content'; hero.insertBefore(c,hero.querySelector('.hero-dots')); }
  const y=(m.release_date||m.first_air_date||'').split('-')[0];

    </div>

function makeCarousel(sec, items, type, hasMore){

const secPages={};
let _ioObserver = null;

function initSectionObserver(){
  if(_ioObserver) return;
  if(!('IntersectionObserver' in window)) return;
  _ioObserver = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const sec = entry.target._secData;
        if(sec && !entry.target._loaded){
          entry.target._loaded = true;
          loadSectionData(entry.target, sec);
        }
      }
    });
  }, {rootMargin:'200px 0px', threshold:0.01});
}

async function loadSectionData(wrap, sec){
  try{
    const [d1,d2]=await Promise.all([
      api(sec.endpoint,{...sec.params,page:1}),
      api(sec.endpoint,{...sec.params,page:2})
    ]);
    const items=[...(d1.results||[]),...(d2.results||[])].filter(m=>m.poster_path && !m.adult).slice(0,40);
    if(!items.length){ wrap.remove(); return; }
    const totalPages=Math.max(d1.total_pages||1,d2.total_pages||1);
    secPages[sec.id]={sec, page:2, totalPages:totalPages};
    const hasMore=totalPages>2;
    wrap.replaceWith(makeCarousel(sec,items,sec.type,hasMore));
  }catch(e){ wrap.remove(); }
}

async function loadSection(sec){
  const wrap=document.createElement('div'); wrap.className='section'; wrap.id='sec-'+sec.id;
  wrap._secData = sec;
  wrap._loaded = false;
  wrap.innerHTML=`
    <div class="section-header"><span class="section-title">${sec.title}</span></div>
    <div class="carousel-wrap"><div class="carousel" id="car-${sec.id}">${Array(6).fill('<div class="skel"></div>').join('')}</div></div>`;
  document.getElementById('sections-container').appendChild(wrap);
  const allSections = Array.from(document.querySelectorAll('.section'));
  const idx = allSections.indexOf(wrap);
  if(idx < 3){
    wrap._loaded = true;
    loadSectionData(wrap, sec);
  } else {
    initSectionObserver();
    if(_ioObserver) _ioObserver.observe(wrap);
  }
}

async function loadMore(secId){
  const state=secPages[secId]; if(!state) return;
  const btn=document.getElementById('vm-'+secId);
  if(btn){ btn.disabled=true; btn.textContent='Carregando...'; }
  try{
    const p1=state.page+1, p2=state.page+2;
    const [d1,d2]=await Promise.all([
      api(state.sec.endpoint,{...state.sec.params, page:p1}),
      api(state.sec.endpoint,{...state.sec.params, page:p2})
    ]);
    const items=[...(d1.results||[]),...(d2.results||[])].filter(m=>m.poster_path && !m.adult).slice(0,40);
    const totalPages=Math.max(d1.total_pages||1,d2.total_pages||1);
    const car=document.getElementById('car-'+secId);
    if(car){
      items.forEach(m=>{
        const itemType=m.media_type||state.sec.type||'movie';
        const name=m.title||m.name||'';
        const year=(m.release_date||m.first_air_date||'').split('-')[0];
        const rating=m.vote_average?m.vote_average.toFixed(1):'';
        const poster=m.poster_path?`${IMG}/w500${m.poster_path}`:'';
        const isFav=!!getFavs()[m.id];
        const contData=getContinue()[m.id];
        const card=document.createElement('div');
        card.className='card'; card.title=name;
        card.onclick=()=>openDetails(m.id,itemType);
        card.innerHTML=`
          ${poster?`<img src="${poster}" alt="${name}" class="card-thumb" loading="lazy" decoding="async" onerror="this.onerror=null;this.src=''+this.src.replace('w500','w300');this.onerror=function(){this.style.display='none';}">`:''}
          ${itemType==='tv'?'<div class="card-badge">SÉRIE</div>':''}
          ${contData?`<div class="card-continue" style="width:60%"></div>`:''}
          <div class="card-overlay">
            <div class="card-title">${name}</div>
            <div class="card-meta">${rating?'⭐ '+rating:''} ${year}</div>
            <div class="card-actions">
              <div class="card-btn" onclick="event.stopPropagation();openDetails(${m.id},'${itemType}')"><i class="fas fa-play"></i></div>
              <div class="card-btn fav ${isFav?'fav-on':''}" data-id="${m.id}"
                onclick="event.stopPropagation();toggleFav(${m.id},'${itemType}','${escapeHtmlAttr(name)}','${escapeHtmlAttr(poster)}')">
                <i class="fas fa-heart"></i>
              </div>
            </div>
          </div>`;
        car.appendChild(card);
      });
      car.scrollBy({left:car.scrollWidth,behavior:'smooth'});
    }
    state.page=p2;
    if(btn){
      if(p2 >= totalPages){ btn.style.display='none'; }
      else { btn.disabled=false; btn.textContent='Ver mais ↓'; }
    }
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent='Ver mais ↓'; }
  }
}

    sc.innerHTML=`<div class="section"><div class="empty-row" style="padding:60px">Nenhum conteúdo para continuar. 🎬</div></div>`;
    return;
  }
  const missingData = cont.filter(f => !f.poster || !f.name);
  if(missingData.length){
    await Promise.all(missingData.map(async f => {
      try{
        const d = await api(`/${f.type}/${f.id}`, {});
        const c = getContinue();
        if(!c[f.id]) return;
        let updated = false;
        if(d && d.poster_path && !f.poster){ f.poster = `${IMG}/w500${d.poster_path}`; c[f.id].poster = f.poster; updated = true; }
        if(d && (d.title || d.name) && !f.name){ f.name = d.title || d.name; c[f.id].name = f.name; updated = true; }
        if(updated) store.set('pf_cont',c);
      }catch(e){}
    }));
  }
  const sec=document.createElement('div');
  sec.className='section';
  sec.innerHTML=`<div class="section-header"><span class="section-title">▶️ Continuar Assistindo</span><span style="color:var(--gray);font-size:13px;">${cont.length} título${cont.length>1?'s':''}</span></div>`;
  const grid=document.createElement('div');
  grid.style.cssText='display:flex;flex-wrap:wrap;gap:14px;padding:4px 0;';
  cont.forEach(f=>{
    const poster = normalizePoster(f.poster);
    const card=document.createElement('div');
    card.style.cssText='position:relative;flex-shrink:0;width:var(--card-w);cursor:pointer;';
    card.onclick=()=>openDetails(f.id,f.type);
    card.innerHTML=`
      <div style="position:relative;border-radius:6px;overflow:hidden;aspect-ratio:2/3;background:#111;" class="${poster?'':'no-img'}">
        ${poster?`<img src="${poster}" alt="${f.name||''}" style="width:100%;height:100%;object-fit:cover;" loading="lazy" decoding="async" onerror="this.onerror=null;this.style.display='none';this.parentElement.classList.add('no-img');">`:''}
        <div style="position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(255,255,255,.1);">
          <div style="height:100%;width:60%;background:var(--red);"></div>
        </div>
        <button onclick="event.stopPropagation();removeContinue(${f.id});showContinue();"
          style="position:absolute;top:6px;right:6px;width:24px;height:24px;background:rgba(0,0,0,.8);border:1px solid #555;border-radius:50%;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:background .2s;"
          onmouseover="this.style.background='var(--red)'" onmouseout="this.style.background='rgba(0,0,0,.8)'"
          title="Remover da lista">✕</button>
      </div>
      <div style="margin-top:6px;font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${f.name||'Sem título'}</div>
      ${f.type==='tv'?`<div style="font-size:11px;color:var(--gray);margin-top:2px;">T${f.season||1} · Ep ${f.ep||1}</div>`:''}
    `;
    grid.appendChild(card);
  });
  sec.appendChild(grid);
  sc.appendChild(sec);
}

async function loadRecommendations(id, type) {

  carousel.innerHTML = '<div style="color:#555;padding:10px;">Buscando recomendações...</div>';

    carousel.innerHTML = '';

      card.className = 'card';

// ═══════════════════════════════════════════════════════
// 11. PLAYER E SERVIDORES — SEM SANDBOX
// ═══════════════════════════════════════════════════════
let curId, curType, curSeason=1, curEp=1, curSrvIdx=0, fallbackTimer;

function getUrl(i){ return SERVERS[i].fn ? SERVERS[i].fn(curId,curType,curType==='tv'?curSeason:null,curType==='tv'?curEp:null) : null; }

async function buildServerBtns(){
  const g = document.getElementById('server-grid');
  g.innerHTML = '';
  SERVERS.forEach((s, i) => {
    const b = document.createElement('button');
    b.id = `srv-btn-${i}`;
    b.className = 'srv-btn' + (i === curSrvIdx ? ' active' : '');
    b.textContent = s.label;
    b.onclick = () => loadServer(i);
    g.appendChild(b);
  });
  const di = SERVERS.findIndex(s => s.direct);
  if(di < 0) return;
  getDirectLink(curId, curType, curType==='tv'?curSeason:null, curType==='tv'?curEp:null)
    .then(url => {
      const btn = document.getElementById(`srv-btn-${di}`);
      if(!btn) return;
      if(url){ btn.textContent = SERVERS[di].label + ' ✓'; btn.title = 'Link direto disponível'; }
      else { btn.classList.add('srv-unavail'); btn.title = 'Sem link direto'; }
    }).catch(() => {});
}

function buildPlayerBox(url, srvLabel, autoplay){
  const box = document.getElementById('player-box');
  box.innerHTML = '';
  if(!autoplay){
    const btn = document.createElement('div');
    btn.id = 'fake-play-btn';
    const titleEl = document.getElementById('det-title');
    const titleText = titleEl ? titleEl.textContent : '';
    btn.innerHTML = `
      <div class="play-title">${titleText}</div>
      <div class="play-circle"><i class="fas fa-play"></i></div>
      <div class="play-label">${srvLabel} — Toque para assistir</div>
    `;
    btn.addEventListener('click', function(e){
      e.preventDefault();
      e.stopPropagation();
      btn.remove();
      injectIframe(box, url);
    }, {once: true});
    box.appendChild(btn);
  } else {
    injectIframe(box, url);
  }
}

function injectIframe(box, url){
  const loader = document.createElement('div');
  loader.className = 'player-loader'; loader.id = 'player-loader';
  loader.innerHTML = '<div class="spinner"></div><p>Carregando stream...</p>';
  box.appendChild(loader);

  const frame = document.createElement('iframe');
  frame.id = 'player-frame';
  frame.allowFullscreen = true;
  // IMPORTANTE: sem sandbox, com referrerpolicy para evitar detecção de iframe
  frame.setAttribute('allow','autoplay; fullscreen *; picture-in-picture *; encrypted-media');
  frame.setAttribute('referrerpolicy','no-referrer');
  frame.setAttribute('loading','eager');
  frame.style.cssText = 'width:100%;height:100%;border:none;display:block;position:absolute;inset:0;';
  frame.addEventListener('load', onFrameLoad);
  box.appendChild(frame);

  const isHLS = url && (url.includes('.m3u8') || url.includes('videohls'));
  const isBlogger = url && url.includes('blogger.com/video.g');

  if(isHLS){
    const safeUrl = JSON.stringify(url);
    frame.setAttribute('data-direct','1');
    frame.srcdoc = `<!DOCTYPE html><html><head><style>
      *{margin:0;padding:0;box-sizing:border-box;}
      html,body{width:100%;height:100%;background:#000;overflow:hidden;}
      video{width:100%;height:100%;display:block;object-fit:contain;}
    </style></head><body>
      <video id="v" controls autoplay playsinline></video>
      <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.13/dist/hls.min.js"><\/script>
      <script>
        const v=document.getElementById('v');
        const src=${safeUrl};
        if(Hls.isSupported()){
          const h=new Hls({enableWorker:false});
          h.loadSource(src); h.attachMedia(v);
          h.on(Hls.Events.MANIFEST_PARSED,()=>v.play().catch(()=>{}));
        } else if(v.canPlayType('application/vnd.apple.mpegurl')){
          v.src=src; v.play().catch(()=>{});
        } else {
          document.body.innerHTML='<p style="color:#fff;padding:20px">HLS não suportado.</p>';
        }
      <\/script>
    </body></html>`;
  } else if(isBlogger){
    frame.setAttribute('data-direct','1');
    frame.src = url;
  } else {
    frame.src = url;
  }

  clearTimeout(fallbackTimer);
  const timeout = (isHLS || isBlogger) ? 20000 : 12000;
  fallbackTimer = setTimeout(()=>{
    document.getElementById('fallback-msg').textContent = `⚠️ "${SERVERS[curSrvIdx].label}" pode estar com problemas. Tentar próximo?`;
    document.getElementById('fallback-bar').classList.add('show');
  }, timeout);
}

function showBlockedMessage(box, url){
  box.innerHTML =
    '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#111;">' +
    '<div style="text-align:center;padding:30px 20px;">' +
    '<div style="font-size:40px;margin-bottom:16px;">🔒</div>' +
    '<p style="color:#ccc;font-size:14px;margin-bottom:20px;line-height:1.5;">' +
    'Este servidor bloqueia reprodução em iframe.<br>Clique para assistir em nova aba.</p>' +
    '<a href="' + url + '" target="_blank" rel="noopener" ' +
    'style="background:#e50914;color:#fff;padding:12px 28px;border-radius:6px;' +
    'font-weight:700;font-size:14px;text-decoration:none;display:inline-block;">' +
    '▶ Abrir Player em Nova Aba</a>' +
    '<p style="color:#666;font-size:11px;margin-top:14px;">Ou escolha outro servidor abaixo</p>' +
    '</div></div>';
  clearTimeout(fallbackTimer);
  document.getElementById('fallback-bar').classList.remove('show');
}

async function loadServer(i){
  curSrvIdx=i; clearTimeout(fallbackTimer);
  document.getElementById('fallback-bar').classList.remove('show');
  document.querySelectorAll('.srv-btn').forEach((b,j)=>{ b.classList.toggle('active',j===i); b.classList.remove('trying'); });
  window._curId = curId; window._curType = curType; window._curSrv = i;

  if(SERVERS[i].direct){
    const url = await getDirectLink(curId, curType, curType==='tv'?curSeason:null, curType==='tv'?curEp:null);
    if(!url){
      toast('⭐ Sem link direto. A tentar próximo servidor...');
      setTimeout(()=>loadServer((i+1)%SERVERS.length), 1200);
      return;
    }
    if(url.includes('meusdoramas') || url.includes('serv01.')){
      const box = document.getElementById('player-box');
      box.innerHTML = '';
      showBlockedMessage(box, url);
      if(curType==='tv') saveContinue(curId,curType,'','',curSeason,curEp);
      return;
    }
    buildPlayerBox(url, SERVERS[i].label, true);
    if(curType==='tv') saveContinue(curId,curType,'','',curSeason,curEp);
    return;
  }

  const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
  const url = getUrl(i);
  if(!url){ toast('Servidor indisponível.'); setTimeout(()=>loadServer((i+1)%SERVERS.length),800); return; }
  buildPlayerBox(url, SERVERS[i].label, !isMobile);
  if(curType==='tv') saveContinue(curId,curType,'','',curSeason,curEp);
}

function nextServer(){ const next=(curSrvIdx+1)%SERVERS.length; toast(`Trocando para ${SERVERS[next].label}...`); loadServer(next); }

function updateEpNav(){
  const nav = document.getElementById('ep-nav-btns');
  const lbl = document.getElementById('ep-current-label');
  if(!nav) return;
  if(curType==='tv'){
    nav.style.display = 'flex';
    if(lbl) lbl.textContent = `T${curSeason} · E${curEp}`;
  } else {
    nav.style.display = 'none';
  }
}

function prevEpisode(){
  if(curType!=='tv') return;
  if(curEp > 1){
    curEp--;
    loadServer(curSrvIdx);
    updateEpNav();
    toast(`▶ Episódio anterior: T${curSeason} E${curEp}`);
    document.querySelectorAll('.episode-card').forEach(c=>c.classList.remove('active'));
    const cards = document.querySelectorAll('.episode-card');
    if(cards[curEp-1]) cards[curEp-1].classList.add('active');
    saveContinue(curId,curType,'','',curSeason,curEp);
  } else {
    toast('⛔ Primeiro episódio desta temporada');
  }
}

function nextEpisode(){
  if(curType!=='tv') return;
  curEp++;
  loadServer(curSrvIdx);
  updateEpNav();
  toast(`▶ Próximo episódio: T${curSeason} E${curEp}`);
  document.querySelectorAll('.episode-card').forEach(c=>c.classList.remove('active'));
  const cards = document.querySelectorAll('.episode-card');
  if(cards[curEp-1]) cards[curEp-1].classList.add('active');
  saveContinue(curId,curType,'','',curSeason,curEp);
}

function onFrameLoad(){
  const frame = document.getElementById('player-frame');
  if(!frame) return;
  const hasSrc = frame.src && frame.src !== window.location.href && frame.src !== 'about:blank';
  const hasSrcdoc = frame.hasAttribute('data-direct');
  if(!hasSrc && !hasSrcdoc) return;
  const loader = document.getElementById('player-loader');
  if(loader) loader.style.display = 'none';
  if(hasSrcdoc && !hasSrc) return;
  clearTimeout(fallbackTimer);
  document.getElementById('fallback-bar').classList.remove('show');
  const isBlogger = frame.src && frame.src.includes('blogger.com');
  fallbackTimer = setTimeout(()=>{
    document.getElementById('fallback-msg').textContent = '⚠️ Tela preta? Tente outro servidor.';
    document.getElementById('fallback-bar').classList.add('show');
  }, isBlogger ? 20000 : 8000);
}

async function loadSeasons(id, numSeasons){
  const sec=document.getElementById('seasons-section'); sec.style.display='block';
  const tabs=document.getElementById('season-tabs'); tabs.innerHTML='';
  for(let s=1;s<=Math.min(numSeasons,15);s++){
    const b=document.createElement('button'); b.className='season-tab'+(s===1?' active':''); b.textContent=`Temporada ${s}`;
    b.onclick=()=>{ document.querySelectorAll('.season-tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); curSeason=s; loadEpisodes(id,s); };
    tabs.appendChild(b);
  }
  loadEpisodes(id,1);
}

async function loadEpisodes(id,season){
  const grid=document.getElementById('episodes-grid');
  grid.innerHTML='<div style="color:#555;padding:10px;font-size:13px">Carregando episódios...</div>';
  try{
    const d=await api(`/tv/${id}/season/${season}`);
    grid.innerHTML='';
    const _savedEp = (season===curSeason) ? curEp : null;
    (d.episodes||[]).forEach(ep=>{
      const card=document.createElement('div');
      card.className='episode-card'+(ep.episode_number===curEp&&season===curSeason?' active':'');
      const still=ep.still_path?`${IMG}/w300${ep.still_path}`:'';
      card.innerHTML=`
        <div class="ep-thumb">${still?`<img src="${still}" alt="">`:''}<div class="play-over"><i class="fas fa-play" style="color:#fff;font-size:18px"></i></div></div>
        <div class="ep-info">
          <div class="ep-num">Ep. ${ep.episode_number} ${ep.runtime?'· '+ep.runtime+'min':''}</div>
          <div class="ep-title">${ep.name||'Episódio '+ep.episode_number}</div>
          <div class="ep-desc">${ep.overview||''}</div>
        </div>`;
      card.onclick=async ()=>{
        curSeason=season; curEp=ep.episode_number;
        document.querySelectorAll('.episode-card').forEach(c=>c.classList.remove('active'));
        card.classList.add('active'); await loadServer(curSrvIdx); await buildServerBtns();
        updateEpNav();
        toast(`▶ T${season} E${ep.episode_number}: ${ep.name}`);
        const _sc=getContinue(); if(_sc[curId]){ _sc[curId].season=curSeason; _sc[curId].ep=curEp; store.set('pf_cont',_sc); }
      };
      if(_savedEp && ep.episode_number === _savedEp){
        card.classList.add('active');
        setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'center'}),300);
      }
      grid.appendChild(card);
    });
  }catch(e){ grid.innerHTML='<div class="empty-row">Erro ao carregar episódios.</div>'; }
}

async function openDetails(id,type){
  window.location.hash=`#${type}/${id}`;
  document.getElementById('page-home').style.display='none';
  document.getElementById('page-details').style.display='block';
  document.getElementById('page-calendario').style.display='none';
  window.scrollTo(0,0);
  document.getElementById('player-box').innerHTML='';
  document.getElementById('seasons-section').style.display='none';
  document.getElementById('fallback-bar').classList.remove('show');
  clearTimeout(fallbackTimer);
  curId=id; curType=type; curSrvIdx=0;
  const _saved = getContinue()[id];
  curSeason = (_saved && type==='tv' && _saved.season) ? _saved.season : 1;
  curEp     = (_saved && type==='tv' && _saved.ep)     ? _saved.ep     : 1;

  try{
    const m=await api(`/${type}/${id}`,{append_to_response:'external_ids,videos,credits'});
    const name=m.title||m.name;
    const year=(m.release_date||m.first_air_date||'').split('-')[0];
    const rating=m.vote_average?m.vote_average.toFixed(1):'N/A';
    const runtime=m.runtime||(m.episode_run_time&&m.episode_run_time[0]);
    const genres=(m.genres||[]).map(g=>g.name);

    if(m.backdrop_path) document.getElementById('det-backdrop').style.backgroundImage=`url('${IMG}/w1280${m.backdrop_path}')`;
    document.getElementById('det-poster').src=m.poster_path?`${IMG}/w500${m.poster_path}`:'';
    document.getElementById('det-title').textContent=name;
    document.getElementById('det-tags').innerHTML=`
      <span class="det-tag green">⭐ ${rating}</span><span class="det-tag">${year}</span>
      ${runtime?`<span class="det-tag">${runtime} min</span>`:''}
      <span class="det-tag">${type==='tv'?'SÉRIE':'FILME'}</span>
      ${genres.slice(0,3).map(g=>`<span class="det-tag red">${g}</span>`).join('')}
    `;
    document.getElementById('det-synopsis').textContent=m.overview||'Sinopse não disponível.';

    const trailer=(m.videos?.results||[]).find(v=>v.type==='Trailer'&&v.site==='YouTube');
    window._currentItem = { id, type, name: m.title||m.name||'', poster: m.poster_path?IMG+'/w500'+m.poster_path:'', release: m.release_date||m.first_air_date||'', overview: m.overview||'', rating: m.vote_average||0 };
    document.getElementById('det-btns').innerHTML=`
      <button class="btn-watch" onclick="loadServer(0)"><i class="fas fa-play"></i> Assistir</button>
      ${trailer?`<button class="btn-more" onclick="openTrailer('${trailer.key}')"><i class="fab fa-youtube"></i> Trailer</button>`:''}
      <button class="btn-more" onclick="toggleFav(${id},'${type}','${escapeHtmlAttr(name)}','${escapeHtmlAttr(m.poster_path?IMG+'/w500'+m.poster_path:'')}')">
        <i class="fas fa-heart"></i> ${getFavs()[id]?'Remover':'Favoritar'}
      </button>
      <button class="btn-more" id="wl-btn-${id}" onclick="doToggleWatchLater(${id})">
        <i class="fas fa-bookmark"></i> ${isInWatchLater(id)?'Na Lista':'Minha Lista'}
      </button>
    `;

    await buildServerBtns(); await loadServer(0);
    if(type==='tv' && m.number_of_seasons){
      await loadSeasons(id, m.number_of_seasons);
      updateEpNav();
    }
    saveContinue(id,type,name,m.poster_path?`${IMG}/w500${m.poster_path}`:'',curSeason,curEp);
    await loadRecommendations(id, type);
  }catch(err){ document.getElementById('det-title').textContent='Erro ao carregar.'; }
}

function openTrailer(key){
  const box = document.getElementById('player-box');
  injectIframe(box, `https://www.youtube.com/embed/${key}?autoplay=1`);
}

function closeDetails() {
    localStorage.removeItem('pf_watching');
    window._curId = ''; window._curType = ''; window._curSrv = 0;
    document.getElementById('page-details').style.display='none';
    document.getElementById('page-home').style.display='block';
    window.location.hash='';
    const box = document.getElementById('player-box');
    if(box) box.innerHTML='';
    const frame = document.getElementById('player-frame');
    if(frame){ frame.src='about:blank'; frame.remove(); }
    clearTimeout(fallbackTimer);
}

function doToggleWatchLater(id){
  let itemData = window._currentItem;
  if(!itemData || String(itemData.id) !== String(id)){
    const fav = getFavs()[id];
    itemData = { id, type: curType||'movie', name: 'Título '+id, poster: '', release: '', overview: '', rating: 0 };
    if(fav){ itemData.name = fav.name; itemData.poster = fav.poster; itemData.type = fav.type; }
  }
  const item = { id: itemData.id, type: itemData.type, title: itemData.name, poster: normalizePoster(itemData.poster), release: itemData.release, overview: (itemData.overview||'').substring(0,500), rating: itemData.rating };
  const added = toggleWatchLater(item);
  document.querySelectorAll('[id^="wl-btn-"]').forEach(btn => {
    const btnId = btn.id.replace('wl-btn-','');
    if(String(btnId) === String(id)){
      btn.innerHTML = added ? '<i class="fas fa-bookmark"></i> Na Lista' : '<i class="fas fa-bookmark"></i> Minha Lista';
    }
  });
  toast(added ? '🔖 Adicionado à Minha Lista!' : '🗑️ Removido da Minha Lista');
  if(added){ addNotification(item); } else { removeNotification(id); }
}

function toggleSearch(){
  const b=document.getElementById('searchbar');
  b.classList.toggle('open');
  if(b.classList.contains('open')) document.getElementById('searchInput').focus();
}

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim(); if(!q) return;
  document.getElementById('searchbar').classList.remove('open');
  clearPage(true, null);
  try{
    const [mv,tv]=await Promise.all([ api('/search/movie',{query:q,region:'BR'}), api('/search/tv',{query:q,region:'BR'}) ]);
    const all=[...(mv.results||[]).map(m=>({...m,media_type:'movie'})), ...(tv.results||[]).map(m=>({...m,media_type:'tv'}))]
              .filter(m=>m.poster_path).sort((a,b)=>b.popularity-a.popularity);
    document.getElementById('sections-container').appendChild(makeCarousel({id:'search',title:`🔎 Resultados para "${q}"`,endpoint:'',params:{}},all,'movie'));
  }catch(e){}
}

window.onhashchange=()=>{

function fmtDate(str){
  if(!str) return '';
  const d = new Date(str+'T00:00:00');
  const dias = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  return `${dias[d.getDay()]}, ${d.getDate()} ${meses[d.getMonth()]}`;
}
function fmtFull(str){
  if(!str) return '';
  const d = new Date(str+'T00:00:00');
  const dias = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
  const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}
function dayKey(str){ return str ? str.split('T')[0] : ''; }
function isToday(str){ const d=new Date(str+'T00:00:00'); d.setHours(0,0,0,0); return d.getTime()===TODAY.getTime(); }
function isPast(str){ const d=new Date(str+'T00:00:00'); d.setHours(0,0,0,0); return d<TODAY; }
function isFuture(str){ const d=new Date(str+'T00:00:00'); d.setHours(0,0,0,0); return d>TODAY; }

function detectType(item){
  const raw = (item.type||item.category||item.media_type||item.genre||item.show_type||'').toLowerCase().trim();
  const orig = (item.original_language||item.language||'').toLowerCase();
  const country = (item.origin_country||item.country||'').toLowerCase();
  if(raw==='movie'||raw==='filme'||raw==='film') return 'filme';
  if(item.runtime && !item.episode_number && !item.season_number) return 'filme';
  if(item.is_anime||raw.includes('anime')) return 'anime';
  if((orig==='ja'||orig==='jp') && (raw==='tv'||raw==='serie'||raw==='series'||raw===''||raw.includes('anim'))) return 'anime';
  if(raw.includes('dorama')||raw.includes('k-drama')||raw.includes('kdrama')) return 'dorama';
  if((country.includes('kr')||country.includes('cn')||country.includes('tw')||country.includes('th')) && (raw==='tv'||raw==='serie'||raw==='')) return 'dorama';
  return 'serie';
}

function statusLabel(s){

}

async function fetchCalendar(){
  const today = new Date(); today.setHours(0,0,0,0);
  const pastDate = new Date(today); pastDate.setDate(today.getDate()-7);
  const futDate = new Date(today); futDate.setDate(today.getDate()+30);
  const fmt = d => d.toISOString().split('T')[0];

  const fetchTMDB = async (path, params={}) => {
    const u = new URL(CAL_BASE + path);
    u.searchParams.set('language','pt-BR');
    Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,v));
    const r = await fetch(u, CAL_OPTS);
    return r.json();
  };

  const pages = [1,2,3];
  const requests = [
    ...pages.map(p => fetchTMDB('/tv/on_the_air', {page:p, region:'BR'})),
    ...pages.map(p => fetchTMDB('/tv/airing_today', {page:p, region:'BR'})),
  ];
  const results = await Promise.allSettled(requests);
  const shows = new Map();
  results.forEach(r => {
    if(r.status==='fulfilled' && r.value.results){
      r.value.results.forEach(s => { if(!shows.has(s.id)) shows.set(s.id, s); });
    }
  });

  const items = [];
  const showList = [...shows.values()].slice(0, 60);

  await Promise.allSettled(showList.map(async show => {
    try {
      const det = await fetchTMDB(`/tv/${show.id}`, {append_to_response:'external_ids'});
      if(!det.last_episode_to_air && !det.next_episode_to_air) return;
      const poster = show.poster_path ? CAL_IMG + show.poster_path : '';
      const type = detectType({type: show.genre_ids?.includes(16) ? 'anime' : 'serie', original_language: show.original_language});
      if(det.last_episode_to_air){
        const ep = det.last_episode_to_air; const d = ep.air_date;
        if(d && d >= fmt(pastDate) && d <= fmt(futDate)){
          items.push({ title: show.name, episode_title: ep.name || '', episode_number: ep.episode_number, season_number: ep.season_number, air_date: d, poster_path: poster, status: d===fmt(today)?'Hoje':'Atualizado', type: type, tmdb_id: show.id });
        }
      }
      if(det.next_episode_to_air){
        const ep = det.next_episode_to_air; const d = ep.air_date;
        if(d && d >= fmt(today) && d <= fmt(futDate)){
          items.push({ title: show.name, episode_title: ep.name || '', episode_number: ep.episode_number, season_number: ep.season_number, air_date: d, poster_path: poster, status: 'Futuro', type: type, tmdb_id: show.id });
        }
      }
    } catch(e){}
  }));

  if(!items.length) throw new Error('Sem dados');
  return items;
}

function applyFilters(){
  filteredData = allData.filter(item=>{
    const type = detectType(item);
    const status = statusLabel(item.status);
    const date = item.air_date||'';
    const q = searchTerm;
    const titleMatch = (item.title||item.name||'').toLowerCase().includes(q);
    const epMatch = (item.episode_title||'').toLowerCase().includes(q);
    if(q && !titleMatch && !epMatch) return false;
    if(currentFilter==='todos')      return true;
    if(currentFilter==='hoje')       return date && isToday(date);
    if(currentFilter==='futuro')     return date && isFuture(date);
    if(currentFilter==='atualizado') return date && (isToday(date)||isPast(date));
    if(currentFilter==='serie')      return type==='serie';
    if(currentFilter==='anime')      return type==='anime';
    if(currentFilter==='dorama')     return type==='dorama';
    if(currentFilter==='filme')      return type==='filme';
    if(currentFilter==='lista')      return item._inWatchLater;
    return true;
  });
  renderAll();
}

const posterCache = {};

async function fetchPosterFromTMDB(tmdbId, type){
  const key = `${type}_${tmdbId}`;
  if(posterCache[key]) return posterCache[key];
  try{
    const mediaType = (type==='filme'||type==='movie') ? 'movie' : 'tv';
    const r = await fetch(`https://api.themoviedb.org/3/${mediaType}/${tmdbId}?language=pt-BR`, { headers:{ Authorization:`Bearer ${TMDB_TOKEN}` } });
    if(!r.ok) return null;
    const d = await r.json();
    const url = d.poster_path ? `${TMDB_IMG}/w500${d.poster_path}` : null;
    posterCache[key] = url;
    return url;
  }catch(e){ return null; }
}

function calMakeCard(item){

  else if(date&&isFuture(date)){ statusCls='futuro';  statusTxt='Em breve'; }
  else                         { statusCls='atualizado'; statusTxt='✓ Disponível'; }
  const listBadge = item._inWatchLater ? `<span class="ep-list-badge">🔖 LISTA</span>` : '';
  const poster = document.createElement('div');

  });
  if(!Object.keys(months).length){
    if(calView) calView.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:12px;color:var(--gray);"><i class="fas fa-calendar-times" style="font-size:48px;opacity:.3;"></i><p>Nenhum conteúdo encontrado</p></div>`;
    return;
  }
  const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dias=['D','S','T','Q','Q','S','S'];
  Object.keys(months).sort().forEach(mk=>{
    const {year,month,items}=months[mk];
    const wrap=document.createElement('div');
    wrap.className='cal-grid-wrap';
    const title=document.createElement('div');
    title.className='cal-grid-title';
    title.textContent=`${meses[month]} ${year}`;
    wrap.appendChild(title);
    const grid=document.createElement('div');
    grid.className='cal-grid';
    dias.forEach(d=>{const h=document.createElement('div');h.className='cal-head';h.textContent=d;grid.appendChild(h);});
    const firstDay=new Date(year,month,1).getDay();
    const daysInMonth=new Date(year,month+1,0).getDate();
    for(let i=0;i<firstDay;i++){ const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e); }
    for(let d=1;d<=daysInMonth;d++){
      const cell=document.createElement('div');
      const dk=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const cellDate=new Date(year,month,d); cellDate.setHours(0,0,0,0);
      const isT=cellDate.getTime()===TODAY.getTime();
      const isP=cellDate<TODAY;
      const isF=cellDate>TODAY;
      const hasContent=!!items[dk];
      cell.className=`cal-day${hasContent?' has-content':''}${isT?' is-today':''}${isP?' is-past':''}${isF?' is-future':''}`;
      cell.textContent=d;
      if(hasContent){
        const dot=document.createElement('div');dot.className='cal-dot';cell.appendChild(dot);
        cell.title=`${items[dk].length} lançamento(s)`;
        cell.onclick=()=>showDayDetail(dk,items[dk]);
      }
      grid.appendChild(cell);
    }
    wrap.appendChild(grid);
    if(calView) calView.appendChild(wrap);
  });
}

function showDayDetail(dateKey, items){
  const saved=filteredData;
  filteredData=items;
  currentView='scroll';
  const vtScroll = document.getElementById('vt-scroll');
  const vtCal = document.getElementById('vt-cal');
  if(vtScroll) vtScroll.classList.add('active');
  if(vtCal) vtCal.classList.remove('active');
  renderScroll();
  filteredData=saved;
  window.scrollTo({top:0,behavior:'smooth'});
  calToast(`📅 ${fmtDate(dateKey)} — ${items.length} lançamento(s)`);
}

function openModal(item){
  const overlay=document.getElementById('modal-overlay');
  const status=statusLabel(item.status);
  const type=detectType(item);
  const typeIcon=type==='anime'?'⛩️ Anime':type==='dorama'?'🎌 Dorama':'📺 Série';
  const statusText={hoje:'🔴 Hoje',atualizado:'✅ Atualizado',futuro:'🟢 Em breve',atrasado:'⚠️ Atrasado'};
  const bd=document.getElementById('modal-backdrop');
  bd.style.backgroundImage=item.backdrop_path?`url(${item.backdrop_path})`: item.poster_path?`url(${item.poster_path})`:'';
  const pi=document.getElementById('modal-poster-img');
  pi.src=item.poster_path||''; pi.onerror=()=>pi.style.display='none';
  document.getElementById('modal-title').textContent=item.title||'—';
  document.getElementById('modal-sub').textContent=`${item.season_number?'Temporada '+item.season_number+' · ':''}${item.episode_number?'Episódio '+item.episode_number:''}`;
  document.getElementById('modal-ep-title').textContent=item.episode_title||'';
  document.getElementById('modal-date').textContent=item.air_date?`📅 ${fmtFull(item.air_date)}`:'';
  const badges=document.getElementById('modal-badges');
  badges.innerHTML=`<span class="mbadge ${status}">${statusText[status]||item.status}</span><span class="mbadge type">${typeIcon}</span>`;
  const wlId = item.tmdb_id || item.id || (item.title+'_'+item.episode_number);
  const wlItem = { id: wlId, type: type === 'anime' ? 'tv' : type === 'dorama' ? 'tv' : 'tv', title: item.title || '', poster: item.poster_path || '', release: item.air_date || '', overview: item.episode_title || '', rating: '' };
  const wlBtn   = document.getElementById('modal-wl-btn');
  const wlLabel = document.getElementById('modal-wl-label');
  const inList  = isInWatchLater(wlId);
  if(wlLabel) wlLabel.textContent = inList ? 'Na Minha Lista ✓' : 'Assistir Mais Tarde';
  if(wlBtn){
    wlBtn.style.background   = inList ? 'rgba(229,9,20,.15)' : '#1a1a1a';
    wlBtn.style.borderColor  = inList ? 'var(--red)'         : '#333';
    wlBtn.style.color        = inList ? '#ff7070'            : '#ccc';
    wlBtn.onclick = () => {
      const added = toggleWatchLater(wlItem);
      if(wlLabel) wlLabel.textContent = added ? 'Na Minha Lista ✓' : 'Assistir Mais Tarde';
      wlBtn.style.background   = added ? 'rgba(229,9,20,.15)' : '#1a1a1a';
      wlBtn.style.borderColor  = added ? 'var(--red)'         : '#333';
      wlBtn.style.color        = added ? '#ff7070'            : '#ccc';
      if(added){ addNotification(wlItem); calToast('🔖 Adicionado à Minha Lista!'); }
      else      { removeNotification(wlId); calToast('🗑️ Removido da Minha Lista'); }
    };
  }
  overlay.classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e.target===document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}

function setView(v){
  currentView=v;
  const vtScroll = document.getElementById('vt-scroll');
  const vtCal = document.getElementById('vt-cal');
  if(vtScroll) vtScroll.classList.toggle('active',v==='scroll');
  if(vtCal) vtCal.classList.toggle('active',v==='cal');
  renderAll();
}

function calToggleSearch(){
  const s=document.getElementById('searchbar');
  s.classList.toggle('open');
  if(s.classList.contains('open')) document.getElementById('search-input').focus();
  else{ document.getElementById('search-input').value=''; searchTerm=''; applyFilters(); }
}

function setNavActive(btn){
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function showCalendario(e) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(e && e.currentTarget) e.currentTarget.classList.add('active');
  document.getElementById('page-home').style.display='none';
  document.getElementById('page-details').style.display='none';
  document.getElementById('page-calendario').style.display='block';
  window.location.hash='#calendario';
  document.getElementById('searchbar').classList.remove('open');
  if(!_calLoaded){ initCalendar(); _calLoaded=true; }
}
function closeCalendario() {
  document.getElementById('page-calendario').style.display='none';
  window.location.hash='';
}
