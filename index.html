<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Pureflix</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --red:#e50914; --red2:#b20710;
  --bg:#0a0a0a; --bg2:#141414; --bg3:#1a1a1a;
  --white:#fff; --gray:#aaa; --light:#e5e5e5;
  --green:#46d369; --gold:#f5c518;
  --card-w:180px; --card-h:270px;
  --header-h:64px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--white);font-family:'Barlow',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{height:4px;width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#333;border-radius:4px;}

/* ── HEADER ── */
#header{position:fixed;top:0;left:0;right:0;height:var(--header-h);display:flex;align-items:center;padding:0 4%;z-index:900;transition:background .4s;}
#header.solid{background:var(--bg2);box-shadow:0 2px 20px rgba(0,0,0,.6);}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--red);letter-spacing:3px;cursor:pointer;margin-right:30px;flex-shrink:0;}
.nav{display:flex;gap:6px;align-items:center;}
.nav-btn{background:none;border:none;color:var(--gray);font-family:'Barlow',sans-serif;font-size:13px;padding:6px 10px;cursor:pointer;border-radius:4px;transition:all .2s;white-space:nowrap;}
.nav-btn:hover,.nav-btn.active{color:var(--white);background:rgba(255,255,255,.08);}
.header-right{margin-left:auto;display:flex;align-items:center;gap:16px;}
.header-right button{background:none;border:none;color:var(--gray);font-size:16px;cursor:pointer;transition:color .2s;padding:4px;}
.header-right button:hover{color:var(--white);}
.avatar{width:30px;height:30px;background:var(--red);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;}

/* ── SEARCH ── */
#searchbar{position:fixed;top:var(--header-h);left:0;right:0;background:rgba(10,10,10,.97);padding:14px 4%;z-index:899;border-bottom:1px solid #222;display:none;}
#searchbar.open{display:flex;gap:10px;}
#searchbar input{flex:1;background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:10px 16px;color:#fff;font-size:15px;font-family:'Barlow',sans-serif;outline:none;}
#searchbar input:focus{border-color:#555;}
#searchbar button{background:var(--red);color:#fff;border:none;border-radius:6px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;}

/* ── HERO ── */
#hero{height:90vh;position:relative;overflow:hidden;}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity 1s;background:center/cover no-repeat;}
.hero-slide.active{opacity:1;}
.hero-slide::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,10,.4) 40%,transparent 70%), linear-gradient(to right,rgba(10,10,10,.85) 0%,transparent 55%);}
.hero-content{position:absolute;bottom:18%;left:4%;max-width:540px;z-index:10;}
.hero-tags{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.hero-tag{font-size:11px;font-weight:700;letter-spacing:1px;padding:3px 10px;border-radius:2px;text-transform:uppercase;}
.hero-tag.red{background:var(--red);}
.hero-tag.outline{border:1px solid rgba(255,255,255,.4);color:#ddd;}
.hero-title{font-family:'Barlow Condensed',sans-serif;font-size:62px;font-weight:900;line-height:.95;letter-spacing:1px;margin-bottom:12px;text-shadow:0 2px 20px rgba(0,0,0,.5);}
.hero-meta{font-size:13px;color:var(--gray);margin-bottom:12px;display:flex;gap:12px;align-items:center;}
.hero-meta .score{color:var(--green);font-weight:700;}
.hero-desc{font-size:15px;color:#ccc;line-height:1.6;max-height:72px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.hero-btns{display:flex;gap:12px;margin-top:20px;}
.btn-watch{background:var(--red);color:#fff;border:none;padding:11px 28px;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'Barlow',sans-serif;transition:background .2s;}
.btn-watch:hover{background:var(--red2);}
.btn-more{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.2);padding:11px 24px;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:'Barlow',sans-serif;backdrop-filter:blur(4px);transition:background .2s;}
.btn-more:hover{background:rgba(255,255,255,.25);}
.hero-dots{position:absolute;bottom:6%;left:4%;display:flex;gap:6px;z-index:10;}
.hero-dot{width:6px;height:6px;background:rgba(255,255,255,.3);border-radius:50%;cursor:pointer;transition:all .3s;}
.hero-dot.active{width:20px;border-radius:3px;background:var(--red);}

/* ── MAIN ── */
#page-home{padding-bottom:60px;}
.section{padding:0 4%;margin-top:40px;}
.section-header{display:flex;align-items:baseline;gap:14px;margin-bottom:16px;}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:.5px;}
.section-more{font-size:12px;color:var(--green);cursor:pointer;opacity:0;transition:opacity .2s;}
.section-header:hover .section-more{opacity:1;}

/* ── CAROUSEL ── */
.carousel-wrap{position:relative;}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;background:rgba(10,10,10,.85);border:1px solid #333;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;transition:all .2s;opacity:0;}
.carousel-wrap:hover .carousel-btn{opacity:1;}
.carousel-btn:hover{background:rgba(229,9,20,.8);border-color:var(--red);}
.carousel-btn.prev{left:-22px;}
.carousel-btn.next{right:-22px;}
.carousel{display:flex;gap:10px;overflow-x:auto;scroll-snap-type:x mandatory;scroll-behavior:smooth;padding-bottom:6px;}
.carousel::-webkit-scrollbar{height:0;}

/* ── CARDS ── */
.card{flex:0 0 var(--card-w);height:var(--card-h);background:var(--bg3);border-radius:6px;overflow:hidden;cursor:pointer;position:relative;scroll-snap-align:start;transition:transform .25s,box-shadow .25s;}
.card:hover{transform:scale(1.07);z-index:20;box-shadow:0 14px 40px rgba(0,0,0,.7);}
.card img{width:100%;height:100%;object-fit:cover;display:block;}
.card-overlay{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(0,0,0,.97));opacity:0;transition:opacity .25s;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;}
.card:hover .card-overlay{opacity:1;}
.card-title{font-size:12px;font-weight:700;line-height:1.3;margin-bottom:4px;}
.card-meta{font-size:11px;color:var(--green);font-weight:700;}
.card-actions{display:flex;gap:8px;margin-top:8px;}
.card-btn{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,255,255,.5);background:rgba(0,0,0,.6);color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.card-btn:hover{background:var(--red);border-color:var(--red);}
.card-btn.fav-on{background:var(--red);border-color:var(--red);}
.card-badge{position:absolute;top:8px;left:8px;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:2px;letter-spacing:.5px;text-transform:uppercase;}
.card-continue{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--red);}
.skel{background:linear-gradient(90deg,#1a1a1a 25%,#262626 50%,#1a1a1a 75%);background-size:400% 100%;animation:skel 1.4s infinite;border-radius:6px;flex:0 0 var(--card-w);height:var(--card-h);}
@keyframes skel{0%{background-position:400% 0}100%{background-position:-400% 0}}

/* ── DETAILS PAGE ── */
#page-details{position:fixed;inset:0;background:var(--bg);z-index:800;display:none;overflow-y:auto;padding-top:var(--header-h);}
.det-backdrop{width:100%;height:420px;position:relative;background:center/cover no-repeat;flex-shrink:0;}
.det-backdrop::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,var(--bg) 0%,rgba(10,10,10,.3) 55%,transparent 85%);}
.det-body{max-width:1100px;margin:0 auto;padding:0 4% 60px;display:flex;gap:36px;margin-top:-140px;position:relative;z-index:5;}
.det-poster{width:210px;flex-shrink:0;border-radius:8px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.7);}
.det-poster img{width:100%;display:block;}
.det-info{flex:1;min-width:0;}
.det-title{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;letter-spacing:1px;line-height:.95;margin-bottom:14px;}
.det-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.det-tag{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);padding:4px 12px;border-radius:3px;font-size:12px;color:#ccc;}
.det-tag.green{color:var(--green);border-color:rgba(70,211,105,.3);}
.det-tag.red{background:rgba(229,9,20,.15);border-color:rgba(229,9,20,.3);color:#ff7070;}
.det-synopsis{font-size:15px;line-height:1.7;color:#bbb;margin-bottom:24px;}
.det-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px;}

/* ── PLAYER ── */
.player-section{margin-bottom:20px;}
.player-label{font-size:13px;color:var(--gray);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.server-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.srv-btn{background:var(--bg3);border:1px solid #2a2a2a;color:#ccc;padding:7px 16px;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;font-family:'Barlow',sans-serif;}
.srv-btn:hover{border-color:#555;color:#fff;}
.srv-btn.active{background:var(--red);border-color:var(--red);color:#fff;}
.srv-btn.trying{border-color:orange;color:orange;animation:pulse .8s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.player-box{width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;overflow:hidden;position:relative;}
.player-box iframe{width:100%;height:100%;border:none;display:block;}
.player-loader{position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.spinner{width:48px;height:48px;border:3px solid #222;border-top-color:var(--red);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.player-loader p{font-size:13px;color:#555;}
.fallback-bar{margin-top:10px;display:none;background:rgba(255,165,0,.1);border:1px solid rgba(255,165,0,.3);border-radius:6px;padding:10px 16px;font-size:13px;color:orange;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.fallback-bar.show{display:flex;}
.fallback-bar button{background:orange;color:#000;border:none;border-radius:4px;padding:5px 14px;font-size:12px;font-weight:700;cursor:pointer;}

/* ── SEASONS ── */
.seasons-section{margin-top:24px;}
.seasons-label{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.season-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.season-tab{background:var(--bg3);border:1px solid #2a2a2a;color:#ccc;padding:6px 16px;border-radius:4px;font-size:13px;cursor:pointer;transition:all .2s;font-family:'Barlow',sans-serif;}
.season-tab:hover{border-color:#555;}
.season-tab.active{background:var(--red);border-color:var(--red);color:#fff;}
.episodes-grid{display:flex;flex-direction:column;gap:8px;max-height:340px;overflow-y:auto;padding-right:4px;}
.episode-card{display:flex;gap:14px;background:var(--bg3);border-radius:6px;padding:10px;cursor:pointer;border:1px solid transparent;transition:all .2s;}
.episode-card:hover,.episode-card.active{border-color:#333;background:#222;}
.episode-card.active{border-color:var(--red);}
.ep-thumb{width:120px;height:68px;background:#111;border-radius:4px;overflow:hidden;flex-shrink:0;position:relative;}
.ep-thumb img{width:100%;height:100%;object-fit:cover;}
.ep-thumb .play-over{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.episode-card:hover .play-over{opacity:1;}
.ep-info{flex:1;min-width:0;}
.ep-num{font-size:11px;color:var(--gray);margin-bottom:4px;}
.ep-title{font-size:14px;font-weight:600;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ep-desc{font-size:12px;color:#777;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ep-progress{height:2px;background:var(--red);margin-top:6px;border-radius:1px;}

/* ── FAVORITES / CONTINUE ── */
.empty-row{text-align:center;padding:30px;color:#444;font-size:14px;}

/* ── TOAST ── */
#toast{position:fixed;bottom:30px;right:30px;background:#222;border:1px solid #333;border-radius:8px;padding:12px 20px;font-size:14px;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}

/* ── CLOSE BTN ── */
.btn-close{position:fixed;top:16px;right:4%;width:38px;height:38px;background:rgba(0,0,0,.7);border:1px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;z-index:810;transition:background .2s;}
.btn-close:hover{background:var(--red);}

/* ── MOBILE ── */
@media(max-width:768px){
  :root{--card-w:130px;--card-h:195px;}
  .hero-title{font-size:38px;}
  .det-body{flex-direction:column;margin-top:-60px;}
  .det-poster{width:130px;margin:0 auto;}
  .det-title{font-size:34px;}
  .nav{display:none;}
  .carousel-btn{display:none;}
}
</style>
</head>
<body>

<div id="header">
  <div class="logo" onclick="goHome()">PUREFLIX</div>
  <div class="nav">
    <button class="nav-btn active" onclick="goHome()">Início</button>
    <button class="nav-btn" onclick="showSection('series')">Séries</button>
    <button class="nav-btn" onclick="showSection('anime')">Animes</button>
    <button class="nav-btn" onclick="showSection('brasil')">Brasil</button>
    <button class="nav-btn" onclick="showFav()">Favoritos</button>
    <button class="nav-btn" onclick="showContinue()">Continuar</button>
  </div>
  <div class="header-right">
    <button onclick="toggleSearch()" title="Buscar"><i class="fas fa-search"></i></button>
    <div class="avatar">P</div>
  </div>
</div>

<div id="searchbar">
  <input id="searchInput" type="text" placeholder="Buscar filmes, séries, animes..." onkeydown="if(event.key==='Enter')doSearch()">
  <button onclick="doSearch()"><i class="fas fa-search"></i> Buscar</button>
</div>

<!-- HOME -->
<div id="page-home">
  <div id="hero">
    <!-- slides injetados via JS -->
    <div class="hero-dots" id="hero-dots"></div>
  </div>
  <div id="sections-container"></div>
</div>

<!-- DETAILS -->
<div id="page-details">
  <div class="btn-close" onclick="goHome()"><i class="fas fa-times"></i></div>
  <div class="det-backdrop" id="det-backdrop"></div>
  <div class="det-body">
    <div class="det-poster"><img id="det-poster" src="" alt=""></div>
    <div class="det-info">
      <h1 class="det-title" id="det-title"></h1>
      <div class="det-tags" id="det-tags"></div>
      <p class="det-synopsis" id="det-synopsis"></p>
      <div class="det-btns" id="det-btns"></div>

      <!-- Player -->
      <div class="player-section">
        <p class="player-label"><i class="fas fa-server"></i> Servidor de streaming:</p>
        <div class="server-grid" id="server-grid"></div>
        <div class="fallback-bar" id="fallback-bar">
          <span id="fallback-msg">⚠️ Tela preta detectada. Trocando servidor...</span>
          <button onclick="nextServer()">Trocar agora</button>
        </div>
        <div class="player-box">
          <div class="player-loader" id="player-loader">
            <div class="spinner"></div>
            <p>Carregando stream...</p>
          </div>
          <iframe id="player-frame" allowfullscreen
            onload="onFrameLoad()"
            allow="autoplay; fullscreen; picture-in-picture"></iframe>
        </div>
      </div>

      <!-- Seasons/Episodes (TV only) -->
      <div class="seasons-section" id="seasons-section" style="display:none">
        <div class="seasons-label"><i class="fas fa-tv"></i> Temporadas e Episódios</div>
        <div class="season-tabs" id="season-tabs"></div>
        <div class="episodes-grid" id="episodes-grid"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI1OWZmMTlmMGM4MjJhYmRmYjBjM2I0MWJmZDZiOTJiMCIsIm5iZiI6MTc3OTcxNTY2Ni41NzEsInN1YiI6IjZhMTQ0ZTUyODM4ZGNiYzhmNDAyZDY5MCIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.pFS9ydcOA40ekPL09mC8DiNns6RK_j26KrRIGAt1HCg';
const BASE  = 'https://api.themoviedb.org/3';
const IMG   = 'https://image.tmdb.org/t/p';
const OPTS  = { headers:{ Authorization:`Bearer ${TOKEN}` } };

const SERVERS = [
  { label:'VidSrc',    fn:(id,t,s,e)=>`https://vidsrc.to/embed/${t}/${id}${s?'/'+s+'/'+e:''}` },
  { label:'VidSrc.me', fn:(id,t,s,e)=>`https://vidsrc.me/embed/${t}?tmdb=${id}${s?'&season='+s+'&episode='+e:''}` },
  { label:'WarezCDN ',fn:(id,t,s,e)=>`https://warezcdn.site/serie/{id}/{t}/{ep}&type=${t}${s?'&season='+s+'&episode='+e:''}` },
  { label:'VidSrc.cc',  fn:(id,t,s,e)=>`https://vidsrc.cc/v2/embed/tv/{id}/{t}/{ep}` },
];

// Seções do site
const SECTIONS_DEF = [
  { id:'trending',   title:'🔥 Bombando no Brasil',    endpoint:'/trending/all/week',      params:{ region:'BR' },                           type:'mixed' },
  { id:'lancamentos',title:'🎬 Lançamentos',           endpoint:'/movie/upcoming',          params:{ region:'BR' },                           type:'movie' },
  { id:'acao',       title:'💥 Ação',                  endpoint:'/discover/movie',          params:{ with_genres:28,  region:'BR', sort_by:'popularity.desc' }, type:'movie' },
  { id:'comedia',    title:'😂 Comédia',               endpoint:'/discover/movie',          params:{ with_genres:35,  region:'BR', sort_by:'popularity.desc' }, type:'movie' },
  { id:'terror',     title:'👻 Terror',                endpoint:'/discover/movie',          params:{ with_genres:27,  region:'BR', sort_by:'popularity.desc' }, type:'movie' },
  { id:'suspense',   title:'🔪 Suspense / Thriller',   endpoint:'/discover/movie',          params:{ with_genres:53,  region:'BR', sort_by:'popularity.desc' }, type:'movie' },
  { id:'animacao',   title:'🎭 Animação',              endpoint:'/discover/movie',          params:{ with_genres:16,  region:'BR', sort_by:'popularity.desc' }, type:'movie' },
  { id:'anime',      title:'⛩️ Animes',                endpoint:'/discover/tv',             params:{ with_genres:16,  with_origin_country:'JP', sort_by:'popularity.desc' }, type:'tv' },
  { id:'series',     title:'📺 Séries em Alta',        endpoint:'/tv/popular',              params:{ region:'BR' },                           type:'tv' },
  { id:'docs',       title:'🎓 Documentários',         endpoint:'/discover/movie',          params:{ with_genres:99,  region:'BR', sort_by:'popularity.desc' }, type:'movie' },
  { id:'brasil',     title:'🇧🇷 Produções Nacionais',  endpoint:'/discover/movie',          params:{ with_original_language:'pt', region:'BR', sort_by:'popularity.desc' }, type:'movie' },
  { id:'drama',      title:'🎭 Drama',                 endpoint:'/discover/movie',          params:{ with_genres:18,  region:'BR', sort_by:'popularity.desc' }, type:'movie' },
];

// ═══════════════════════════════════════════════════════
// CACHE
// ═══════════════════════════════════════════════════════
const MEM = {};
async function api(path, params={}) {
  const url = new URL(BASE+path);
  url.searchParams.set('language','pt-BR');
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const key = url.toString();
  if (MEM[key]) return MEM[key];
  const r = await fetch(url, OPTS);
  const d = await r.json();
  MEM[key] = d;
  return d;
}

// ═══════════════════════════════════════════════════════
// STORAGE (favoritos / continuar)
// ═══════════════════════════════════════════════════════
const store = {
  get:(k)=>{ try{ return JSON.parse(localStorage.getItem(k)||'{}') }catch{ return {} } },
  set:(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)) }catch{} },
};
function getFavs(){ return store.get('pf_favs'); }
function toggleFav(id,type,name,poster){
  const f=getFavs();
  if(f[id]){ delete f[id]; toast('Removido dos favoritos'); }
  else{ f[id]={id,type,name,poster}; toast('⭐ Adicionado aos favoritos!'); }
  store.set('pf_favs',f);
  document.querySelectorAll(`.card-btn.fav[data-id="${id}"]`).forEach(b=>{
    b.classList.toggle('fav-on',!!f[id]);
    b.title = f[id]?'Remover':'Favoritar';
  });
}
function getContinue(){ return store.get('pf_cont'); }
function saveContinue(id,type,name,poster,season,ep){
  const c=getContinue(); c[id]={id,type,name,poster,season,ep,ts:Date.now()};
  store.set('pf_cont',c);
}

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove('show'),2500);
}

// ═══════════════════════════════════════════════════════
// HERO DINÂMICO
// ═══════════════════════════════════════════════════════
let heroItems=[], heroIdx=0, heroTimer;
async function loadHero(){
  const d = await api('/trending/movie/week',{region:'BR'});
  heroItems = (d.results||[]).filter(m=>m.backdrop_path).slice(0,6);
  const hero=document.getElementById('hero');
  const dots=document.getElementById('hero-dots');
  hero.querySelectorAll('.hero-slide').forEach(s=>s.remove());
  dots.innerHTML='';
  heroItems.forEach((m,i)=>{
    const s=document.createElement('div');
    s.className='hero-slide'+(i===0?' active':'');
    s.style.backgroundImage=`url('${IMG}/w1280${m.backdrop_path}')`;
    hero.insertBefore(s,dots);
    const d2=document.createElement('div');
    d2.className='hero-dot'+(i===0?' active':'');
    d2.onclick=()=>setHero(i);
    dots.appendChild(d2);
  });
  renderHeroContent(0);
  heroTimer=setInterval(()=>setHero((heroIdx+1)%heroItems.length),7000);
}
function setHero(i){
  heroIdx=i;
  document.querySelectorAll('.hero-slide').forEach((s,j)=>s.classList.toggle('active',j===i));
  document.querySelectorAll('.hero-dot').forEach((d,j)=>d.classList.toggle('active',j===i));
  renderHeroContent(i);
}
function renderHeroContent(i){
  const m=heroItems[i]; if(!m) return;
  const hero=document.getElementById('hero');
  let c=hero.querySelector('.hero-content');
  if(!c){ c=document.createElement('div'); c.className='hero-content'; hero.insertBefore(c,hero.querySelector('.hero-dots')); }
  const y=(m.release_date||'').split('-')[0];
  const r=m.vote_average?m.vote_average.toFixed(1):'N/A';
  c.innerHTML=`
    <div class="hero-tags">
      <span class="hero-tag red">🔥 Em Alta</span>
      <span class="hero-tag outline">${y}</span>
      <span class="hero-tag outline">⭐ ${r}</span>
    </div>
    <h1 class="hero-title">${m.title||m.name}</h1>
    <div class="hero-meta"><span class="score">★ ${r}</span><span>${y}</span></div>
    <p class="hero-desc">${m.overview||''}</p>
    <div class="hero-btns">
      <button class="btn-watch" onclick="openDetails(${m.id},'movie')"><i class="fas fa-play"></i> Assistir</button>
      <button class="btn-more" onclick="openDetails(${m.id},'movie')"><i class="fas fa-info-circle"></i> Mais Info</button>
    </div>`;
}

// ═══════════════════════════════════════════════════════
// CARROSSEL
// ═══════════════════════════════════════════════════════
function makeCarousel(sec, items, type){
  const wrap=document.createElement('div'); wrap.className='section'; wrap.id='sec-'+sec.id;
  wrap.innerHTML=`
    <div class="section-header">
      <span class="section-title">${sec.title}</span>
      <span class="section-more">Ver tudo →</span>
    </div>
    <div class="carousel-wrap">
      <button class="carousel-btn prev" onclick="scrollCar('${sec.id}',-1)"><i class="fas fa-chevron-left"></i></button>
      <div class="carousel" id="car-${sec.id}"></div>
      <button class="carousel-btn next" onclick="scrollCar('${sec.id}',1)"><i class="fas fa-chevron-right"></i></button>
    </div>`;
  const car=wrap.querySelector('.carousel');
  items.forEach(m=>{
    const itemType = m.media_type||type||'movie';
    const name=m.title||m.name||'';
    const year=(m.release_date||m.first_air_date||'').split('-')[0];
    const rating=m.vote_average?m.vote_average.toFixed(1):'';
    const poster=m.poster_path?`${IMG}/w500${m.poster_path}`:'';
    const favs=getFavs();
    const isFav=!!favs[m.id];
    const cont=getContinue();
    const contData=cont[m.id];
    const pct=contData?60:0; // placeholder
    const card=document.createElement('div');
    card.className='card'; card.title=name;
    card.onclick=()=>openDetails(m.id,itemType);
    card.innerHTML=`
      ${poster?`<img src="${poster}" alt="${name}" loading="lazy" onerror="this.style.display='none'">`:''}
      ${itemType==='tv'?'<div class="card-badge">SÉRIE</div>':''}
      ${contData?`<div class="card-continue" style="width:${pct}%"></div>`:''}
      <div class="card-overlay">
        <div class="card-title">${name}</div>
        <div class="card-meta">${rating?'⭐ '+rating:''} ${year}</div>
        <div class="card-actions">
          <div class="card-btn" onclick="e=>{e.stopPropagation();openDetails(${m.id},'${itemType}')}" title="Assistir"><i class="fas fa-play"></i></div>
          <div class="card-btn fav ${isFav?'fav-on':''}" data-id="${m.id}" title="${isFav?'Remover':'Favoritar'}"
            onclick="event.stopPropagation();toggleFav(${m.id},'${itemType}','${name.replace(/'/g,"\\'")}','${poster}')">
            <i class="fas fa-heart"></i>
          </div>
        </div>
      </div>`;
    car.appendChild(card);
  });
  return wrap;
}

function scrollCar(id,dir){
  const car=document.getElementById('car-'+id);
  if(car) car.scrollBy({left:dir*600,behavior:'smooth'});
}

async function loadSection(sec){
  const wrap=document.createElement('div'); wrap.className='section'; wrap.id='sec-'+sec.id;
  wrap.innerHTML=`
    <div class="section-header"><span class="section-title">${sec.title}</span></div>
    <div class="carousel-wrap">
      <div class="carousel" id="car-${sec.id}">
        ${Array(8).fill('<div class="skel"></div>').join('')}
      </div>
    </div>`;
  document.getElementById('sections-container').appendChild(wrap);
  try{
    const d=await api(sec.endpoint,{...sec.params,page:1});
    const items=(d.results||[]).filter(m=>m.poster_path).slice(0,20);
    const el=makeCarousel(sec,items,sec.type);
    wrap.replaceWith(el);
  }catch(e){ wrap.remove(); }
}

// ═══════════════════════════════════════════════════════
// PLAYER
// ═══════════════════════════════════════════════════════
let curId, curType, curSeason=1, curEp=1, curSrvIdx=0, fallbackTimer;

function getUrl(i){ return SERVERS[i].fn(curId,curType,curType==='tv'?curSeason:null,curType==='tv'?curEp:null); }

function buildServerBtns(){
  const g=document.getElementById('server-grid'); g.innerHTML='';
  SERVERS.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='srv-btn'+(i===curSrvIdx?' active':'');
    b.textContent=s.label;
    b.onclick=()=>loadServer(i);
    g.appendChild(b);
  });
}

function loadServer(i){
  curSrvIdx=i;
  clearTimeout(fallbackTimer);
  document.getElementById('fallback-bar').classList.remove('show');
  document.querySelector('.player-loader').style.display='flex';
  document.querySelectorAll('.srv-btn').forEach((b,j)=>{
    b.classList.toggle('active',j===i);
    b.classList.remove('trying');
  });
  document.getElementById('player-frame').src=getUrl(i);
  // Anti-tela preta: se não carregar em 12s, oferece trocar
  fallbackTimer=setTimeout(()=>{
    document.getElementById('fallback-msg').textContent=
      `⚠️ "${SERVERS[i].label}" pode estar com problemas. Tentar próximo?`;
    document.getElementById('fallback-bar').classList.add('show');
  },12000);
  if(curType==='tv') saveContinue(curId,curType,'','',curSeason,curEp);
}

function nextServer(){
  const next=(curSrvIdx+1)%SERVERS.length;
  toast(`Trocando para ${SERVERS[next].label}...`);
  loadServer(next);
}
function onFrameLoad(){
  document.querySelector('.player-loader').style.display='none';
  clearTimeout(fallbackTimer);
  document.getElementById('fallback-bar').classList.remove('show');
  // Anti-tela preta: checar depois de 5s se frame ainda visível
  fallbackTimer=setTimeout(()=>{
    document.getElementById('fallback-msg').textContent='⚠️ Tela preta? Tente outro servidor.';
    document.getElementById('fallback-bar').classList.add('show');
  },8000);
}

// ═══════════════════════════════════════════════════════
// SEASONS / EPISODES
// ═══════════════════════════════════════════════════════
async function loadSeasons(id, numSeasons){
  const sec=document.getElementById('seasons-section');
  sec.style.display='block';
  const tabs=document.getElementById('season-tabs');
  tabs.innerHTML='';
  for(let s=1;s<=Math.min(numSeasons,15);s++){
    const b=document.createElement('button');
    b.className='season-tab'+(s===1?' active':'');
    b.textContent=`Temporada ${s}`;
    b.onclick=()=>{ document.querySelectorAll('.season-tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); curSeason=s; loadEpisodes(id,s); };
    tabs.appendChild(b);
  }
  loadEpisodes(id,1);
}

async function loadEpisodes(id,season){
  const grid=document.getElementById('episodes-grid');
  grid.innerHTML='<div style="color:#555;padding:10px;font-size:13px">Carregando episódios...</div>';
  try{
    const d=await api(`/tv/${id}/season/${season}`);
    const eps=d.episodes||[];
    grid.innerHTML='';
    eps.forEach(ep=>{
      const card=document.createElement('div');
      card.className='episode-card'+(ep.episode_number===curEp&&season===curSeason?' active':'');
      const still=ep.still_path?`${IMG}/w300${ep.still_path}`:'';
      card.innerHTML=`
        <div class="ep-thumb">
          ${still?`<img src="${still}" alt="">`:' '}
          <div class="play-over"><i class="fas fa-play" style="color:#fff;font-size:18px"></i></div>
        </div>
        <div class="ep-info">
          <div class="ep-num">Ep. ${ep.episode_number} ${ep.runtime?'· '+ep.runtime+'min':''}</div>
          <div class="ep-title">${ep.name||'Episódio '+ep.episode_number}</div>
          <div class="ep-desc">${ep.overview||''}</div>
        </div>`;
      card.onclick=()=>{
        curSeason=season; curEp=ep.episode_number;
        document.querySelectorAll('.episode-card').forEach(c=>c.classList.remove('active'));
        card.classList.add('active');
        loadServer(curSrvIdx);
        buildServerBtns();
        toast(`▶ T${season} E${ep.episode_number}: ${ep.name}`);
      };
      grid.appendChild(card);
    });
  }catch(e){ grid.innerHTML='<div class="empty-row">Erro ao carregar episódios.</div>'; }
}

// ═══════════════════════════════════════════════════════
// DETALHES
// ═══════════════════════════════════════════════════════
async function openDetails(id,type){
  window.location.hash=`#${type}/${id}`;
  document.getElementById('page-home').style.display='none';
  document.getElementById('page-details').style.display='block';
  window.scrollTo(0,0);
  document.querySelector('.player-loader').style.display='flex';
  document.getElementById('player-frame').src='';
  document.getElementById('seasons-section').style.display='none';
  document.getElementById('fallback-bar').classList.remove('show');
  clearTimeout(fallbackTimer);

  curId=id; curType=type; curSeason=1; curEp=1; curSrvIdx=0;

  // Dados básicos instantâneos + detalhes completos
  try{
    const m=await api(`/${type}/${id}`,{append_to_response:'external_ids,videos,credits'});
    const name=m.title||m.name;
    const year=(m.release_date||m.first_air_date||'').split('-')[0];
    const rating=m.vote_average?m.vote_average.toFixed(1):'N/A';
    const runtime=m.runtime||(m.episode_run_time&&m.episode_run_time[0]);
    const genres=(m.genres||[]).map(g=>g.name);
    const favs=getFavs();

    // Backdrop
    if(m.backdrop_path){
      document.getElementById('det-backdrop').style.backgroundImage=`url('${IMG}/w1280${m.backdrop_path}')`;
    }
    // Poster
    document.getElementById('det-poster').src=m.poster_path?`${IMG}/w500${m.poster_path}`:'';
    // Title
    document.getElementById('det-title').textContent=name;
    // Tags
    document.getElementById('det-tags').innerHTML=`
      <span class="det-tag green">⭐ ${rating}</span>
      <span class="det-tag">${year}</span>
      ${runtime?`<span class="det-tag">${runtime} min</span>`:''}
      <span class="det-tag">${type==='tv'?'SÉRIE':'FILME'}</span>
      ${genres.slice(0,3).map(g=>`<span class="det-tag red">${g}</span>`).join('')}
    `;
    // Synopsis
    document.getElementById('det-synopsis').textContent=m.overview||'Sinopse não disponível.';

    // Botões
    const trailer=(m.videos?.results||[]).find(v=>v.type==='Trailer'&&v.site==='YouTube');
    document.getElementById('det-btns').innerHTML=`
      <button class="btn-watch" onclick="loadServer(0)"><i class="fas fa-play"></i> Assistir</button>
      ${trailer?`<button class="btn-more" onclick="openTrailer('${trailer.key}')"><i class="fab fa-youtube"></i> Trailer</button>`:''}
      <button class="btn-more" onclick="toggleFav(${id},'${type}','${name.replace(/'/g,"\\'")}','${m.poster_path?IMG+'/w500'+m.poster_path:''}')">
        <i class="fas fa-heart"></i> ${favs[id]?'Remover':'Favoritar'}
      </button>
    `;

    // Player
    buildServerBtns();
    loadServer(0);

    // Seasons para TV
    if(type==='tv' && m.number_of_seasons){
      await loadSeasons(id, m.number_of_seasons);
    }

    saveContinue(id,type,name,m.poster_path?`${IMG}/w500${m.poster_path}`:'',curSeason,curEp);

  }catch(err){
    document.getElementById('det-title').textContent='Erro ao carregar.';
  }
}

function openTrailer(key){
  document.querySelector('.player-loader').style.display='none';
  document.getElementById('player-frame').src=`https://www.youtube.com/embed/${key}?autoplay=1`;
}

// ═══════════════════════════════════════════════════════
// BUSCA
// ═══════════════════════════════════════════════════════
function toggleSearch(){
  const b=document.getElementById('searchbar');
  b.classList.toggle('open');
  if(b.classList.contains('open')) document.getElementById('searchInput').focus();
}

async function doSearch(){
  const q=document.getElementById('searchInput').value.trim(); if(!q) return;
  document.getElementById('searchbar').classList.remove('open');
  goHome();
  document.getElementById('sections-container').innerHTML='';
  // Buscar filmes + séries
  try{
    const [mv,tv]=await Promise.all([
      api('/search/movie',{query:q,region:'BR'}),
      api('/search/tv',{query:q,region:'BR'}),
    ]);
    const all=[...(mv.results||[]).map(m=>({...m,media_type:'movie'})),
               ...(tv.results||[]).map(m=>({...m,media_type:'tv'}))]
              .filter(m=>m.poster_path)
              .sort((a,b)=>b.popularity-a.popularity);
    const fake={id:'search',title:`🔎 "${q}"`,endpoint:'',params:{}};
    const sec=makeCarousel(fake,all,'movie');
    document.getElementById('sections-container').appendChild(sec);
  }catch(e){}
}

// ═══════════════════════════════════════════════════════
// FAVORITOS / CONTINUAR
// ═══════════════════════════════════════════════════════
function showFav(){
  goHome();
  document.getElementById('sections-container').innerHTML='';
  const favs=Object.values(getFavs());
  if(!favs.length){
    document.getElementById('sections-container').innerHTML=`<div class="section"><div class="empty-row" style="padding:60px">Você ainda não tem favoritos. ❤️</div></div>`;
    return;
  }
  const items=favs.map(f=>({id:f.id,title:f.name,poster_path:null,_poster:f.poster,media_type:f.type}));
  const sec=makeCarousel({id:'fav',title:'❤️ Meus Favoritos'},items.map(i=>({...i,poster_path:i._poster?.replace(`${IMG}/w500`,'')||null})),'movie');
  document.getElementById('sections-container').appendChild(sec);
}

function showContinue(){
  goHome();
  document.getElementById('sections-container').innerHTML='';
  const cont=Object.values(getContinue()).sort((a,b)=>b.ts-a.ts);
  if(!cont.length){
    document.getElementById('sections-container').innerHTML=`<div class="section"><div class="empty-row" style="padding:60px">Nenhum conteúdo para continuar. 🎬</div></div>`;
    return;
  }
  const items=cont.map(f=>({id:f.id,title:f.name,poster_path:f.poster?.replace(`${IMG}/w500`,'')||null,media_type:f.type}));
  const sec=makeCarousel({id:'cont',title:'▶️ Continuar Assistindo'},items,'movie');
  document.getElementById('sections-container').appendChild(sec);
}

function showSection(id){
  const sec=SECTIONS_DEF.find(s=>s.id===id);
  if(!sec) return;
  goHome();
  document.getElementById('sections-container').innerHTML='';
  loadSection(sec);
}

// ═══════════════════════════════════════════════════════
// NAVEGAÇÃO
// ═══════════════════════════════════════════════════════
function goHome(){
  clearTimeout(fallbackTimer);
  document.getElementById('player-frame').src='';
  document.getElementById('page-home').style.display='block';
  document.getElementById('page-details').style.display='none';
  window.location.hash='';
}

window.onhashchange=()=>{
  const h=window.location.hash;
  const m=h.match(/^#(movie|tv)\/(\d+)/);
  if(m) openDetails(parseInt(m[2]),m[1]);
  else{ document.getElementById('page-home').style.display='block'; document.getElementById('page-details').style.display='none'; }
};

window.onscroll=()=>{
  document.getElementById('header').classList.toggle('solid',window.scrollY>50);
};

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
(async()=>{
  loadHero();
  const cont=document.getElementById('sections-container');
  // Carrega seções progressivamente
  for(const sec of SECTIONS_DEF){
    loadSection(sec);
    await new Promise(r=>setTimeout(r,120)); // stagger para não travar a UI
  }
  // Rota inicial
  window.onhashchange();
})();
</script>
