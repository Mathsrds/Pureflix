<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pureflix - Coletor TMDb</title>
  <style>
    body { font-family: Inter, system-ui, Arial; margin: 16px; background:#0f1724; color:#e6eef8; }
    header { display:flex; gap:12px; align-items:center; margin-bottom:12px; }
    input, button, select { padding:8px 10px; border-radius:6px; border:1px solid #2b3440; background:#0b1220; color:#e6eef8; }
    button { cursor:pointer; background:#2563eb; border:none; }
    .controls { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .progress { margin-top:12px; height:12px; background:#0b1220; border-radius:6px; overflow:hidden; border:1px solid #1f2937; }
    .progress > i { display:block; height:100%; background:linear-gradient(90deg,#06b6d4,#7c3aed); width:0%; transition:width .3s ease; }
    .status { margin-top:8px; font-size:14px; color:#9fb0d6; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); gap:12px; margin-top:16px; }
    .card { background:#071028; border-radius:8px; padding:8px; text-align:center; border:1px solid #122033; }
    .poster { width:100%; height:210px; object-fit:cover; border-radius:6px; background:#071028; }
    footer { margin-top:18px; color:#9fb0d6; font-size:13px; }
    small { color:#7f9bbf; }
    .danger { background:#ef4444; }
  </style>
</head>
<body>
  <header>
    <h2>Pureflix - Coletor TMDb</h2>
    <small>Fatie por ano, pagine até 500 páginas por fatia, deduplique e salve em cache</small>
  </header>

  <section class="controls">
    <label>
      <div>API Key TMDb</div>
      <input id="apiKey" placeholder="Insira sua API Key" style="min-width:300px" />
    </label>

    <label>
      <div>Ano inicial</div>
      <input id="yearFrom" type="number" value="2024" style="width:100px" />
    </label>

    <label>
      <div>Ano final</div>
      <input id="yearTo" type="number" value="2022" style="width:100px" />
    </label>

    <label>
      <div>Max páginas por fatia</div>
      <select id="maxPages">
        <option value="50">50</option>
        <option value="100">100</option>
        <option value="250">250</option>
        <option value="500" selected>500</option>
      </select>
    </label>

    <button id="startBtn">Iniciar coleta</button>
    <button id="clearCache" class="danger">Limpar cache</button>
  </section>

  <div class="progress" aria-hidden>
    <i id="progressBar"></i>
  </div>
  <div class="status" id="status">Pronto.</div>

  <div id="summary" style="margin-top:8px"></div>

  <div class="grid" id="grid"></div>

  <footer>
    <div><strong>Observações:</strong> cada fatia respeita limite de 500 páginas; o script aplica atraso e backoff para reduzir risco de bloqueio.</div>
  </footer>

<script>
/* ---------- Config e utilitários ---------- */
const IMAGE_BASE = 'https://image.tmdb.org/t/p/w342';
const dbName = 'pureflix_db';
const storeName = 'movies';

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ---------- IndexedDB simples ---------- */
function openDB(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(dbName, 1);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(storeName)) {
        const os = db.createObjectStore(storeName, { keyPath: 'id' });
        os.createIndex('title', 'title', { unique:false });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}
async function saveMovies(movies){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    for (const m of movies) store.put(m);
    tx.oncomplete = () => resolve();
    tx.onerror = e => reject(e.target.error);
  });
}
async function getAllMovies(){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readonly');
    const store = tx.objectStore(storeName);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = e => reject(e.target.error);
  });
}
async function clearDB(){
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(storeName, 'readwrite');
    const store = tx.objectStore(storeName);
    const req = store.clear();
    req.onsuccess = () => resolve();
    req.onerror = e => reject(e.target.error);
  });
}

/* ---------- Fetch com backoff e tratamento ---------- */
async function fetchJson(url, retries = 3, backoff = 800){
  try {
    const res = await fetch(url);
    if (!res.ok) {
      // 429 ou 5xx -> retry
      if ((res.status === 429 || res.status >= 500) && retries > 0) {
        await sleep(backoff);
        return fetchJson(url, retries - 1, backoff * 1.8);
      }
      throw new Error(`HTTP ${res.status}`);
    }
    return await res.json();
  } catch (err) {
    if (retries > 0) {
      await sleep(backoff);
      return fetchJson(url, retries - 1, backoff * 1.8);
    }
    throw err;
  }
}

/* ---------- Lógica de paginação por fatia (ano) ---------- */
async function fetchDiscoverPage(apiKey, params, page){
  const url = `https://api.themoviedb.org/3/discover/movie?api_key=${apiKey}&page=${page}&${params}`;
  return fetchJson(url);
}

async function fetchYear(apiKey, year, maxPagesPerSlice, onProgress){
  const params = `primary_release_date.gte=${year}-01-01&primary_release_date.lte=${year}-12-31&sort_by=popularity.desc`;
  let page = 1;
  let totalPages = 1;
  const collected = [];
  while (page <= totalPages && page <= maxPagesPerSlice) {
    const data = await fetchDiscoverPage(apiKey, params, page);
    if (!data || !data.results) break;
    collected.push(...data.results);
    totalPages = data.total_pages || 1;
    if (onProgress) onProgress({ year, page, totalPages, fetched: collected.length });
    page++;
    // pequeno delay para reduzir chance de rate limit
    await sleep(250);
  }
  return collected;
}

/* ---------- UI e fluxo principal ---------- */
const startBtn = document.getElementById('startBtn');
const apiKeyInput = document.getElementById('apiKey');
const yearFromInput = document.getElementById('yearFrom');
const yearToInput = document.getElementById('yearTo');
const maxPagesSelect = document.getElementById('maxPages');
const progressBar = document.getElementById('progressBar');
const statusEl = document.getElementById('status');
const grid = document.getElementById('grid');
const summary = document.getElementById('summary');
const clearCacheBtn = document.getElementById('clearCache');

function setProgress(pct){ progressBar.style.width = pct + '%'; }

function renderMovies(movies){
  grid.innerHTML = '';
  for (const m of movies) {
    const div = document.createElement('div');
    div.className = 'card';
    const img = document.createElement('img');
    img.className = 'poster';
    img.alt = m.title || m.name || 'Poster';
    img.src = m.poster_path ? (IMAGE_BASE + m.poster_path) : '';
    const title = document.createElement('div');
    title.style.marginTop = '8px';
    title.style.fontSize = '13px';
    title.textContent = m.title || m.name || '—';
    div.appendChild(img);
    div.appendChild(title);
    grid.appendChild(div);
  }
}

startBtn.addEventListener('click', async () => {
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) { statusEl.textContent = 'Insira sua API Key do TMDb.'; return; }

  const yearFrom = parseInt(yearFromInput.value,10);
  const yearTo = parseInt(yearToInput.value,10);
  if (isNaN(yearFrom) || isNaN(yearTo) || yearFrom < 1870 || yearTo < 1870) {
    statusEl.textContent = 'Informe anos válidos.';
    return;
  }
  const start = Math.min(yearFrom, yearTo);
  const end = Math.max(yearFrom, yearTo);
  const years = [];
  for (let y = start; y <= end; y++) years.push(y);

  const maxPagesPerSlice = parseInt(maxPagesSelect.value, 10);
  statusEl.textContent = `Iniciando coleta para ${years.length} fatias (${start}–${end})...`;
  setProgress(0);
  summary.textContent = '';

  const allCollected = [];
  let processed = 0;
  for (const y of years) {
    statusEl.textContent = `Buscando ano ${y} (${processed}/${years.length})...`;
    try {
      const slice = await fetchYear(apiKey, y, maxPagesPerSlice, ({year,page,totalPages,fetched})=>{
        statusEl.textContent = `Ano ${year}: página ${page}/${Math.min(totalPages, maxPagesPerSlice)} — itens coletados: ${fetched}`;
      });
      allCollected.push(...slice);
    } catch (err) {
      console.error('Erro na fatia', y, err);
      statusEl.textContent = `Erro ao buscar ano ${y}: ${err.message}`;
      // continue para próximas fatias
    }
    processed++;
    setProgress(Math.round((processed / years.length) * 100));
    // pequeno intervalo entre fatias
    await sleep(600);
  }

  // deduplicar por id
  const map = new Map();
  for (const m of allCollected) {
    if (!m || !m.id) continue;
    // normalize minimal fields to save
    map.set(m.id, {
      id: m.id,
      title: m.title || m.name || '',
      overview: m.overview || '',
      poster_path: m.poster_path || null,
      release_date: m.release_date || null,
      popularity: m.popularity || 0,
      vote_average: m.vote_average || 0,
      tmdb_raw: m // opcional: remova se quiser economizar espaço
    });
  }
  const unique = Array.from(map.values());
  statusEl.textContent = `Coleta finalizada. Salvando ${unique.length} filmes no cache...`;
  await saveMovies(unique);
  statusEl.textContent = `Salvo. Filmes únicos: ${unique.length}. Carregando para exibição...`;
  const stored = await getAllMovies();
  renderMovies(stored.slice(0, 200)); // mostra até 200 por performance
  summary.textContent = `Total no cache: ${stored.length}. Mostrando ${Math.min(stored.length,200)}.`;
  setProgress(100);
});

clearCacheBtn.addEventListener('click', async () => {
  await clearDB();
  grid.innerHTML = '';
  summary.textContent = '';
  statusEl.textContent = 'Cache limpo.';
  setProgress(0);
});

/* Ao carregar a página, tenta mostrar o que já existe no cache */
(async ()=>{
  try {
    const stored = await getAllMovies();
    if (stored && stored.length) {
      renderMovies(stored.slice(0,200));
      summary.textContent = `Total no cache: ${stored.length}. Mostrando ${Math.min(stored.length,200)}.`;
    }
  } catch (err) {
    // DB pode não existir ainda
  }
})();
</script>
</body>
</html>
