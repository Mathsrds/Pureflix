<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pureflix Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111;
  color:white;
  font-family:Roboto,sans-serif;
  overflow-x:hidden;
}

/* NAVBAR */

.navbar{
  position:fixed;
  top:0;
  width:100%;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
  z-index:9999;
  background:linear-gradient(to bottom,rgba(0,0,0,.95),transparent);
}

.logo{
  font-family:'Bebas Neue',sans-serif;
  color:#e50914;
  font-size:42px;
  letter-spacing:2px;
}

nav{
  display:flex;
  gap:20px;
}

nav a{
  color:white;
  text-decoration:none;
  font-size:15px;
}

/* HERO */

.hero{
  height:85vh;
  background-size:cover;
  background-position:center;
  display:flex;
  align-items:center;
  padding:0 60px;
  position:relative;
  transition:background-image .5s ease;
}

.hero-overlay{
  position:absolute;
  inset:0;
  background:
    linear-gradient(to top,#111 0%,transparent 60%);
}

.hero-content{
  position:relative;
  z-index:2;
  max-width:600px;
}

.badge{
  display:inline-block;
  background:#e50914;
  padding:6px 12px;
  border-radius:4px;
  font-size:13px;
  margin-bottom:14px;
}

.hero h1{
  font-size:72px;
  margin-bottom:20px;
}

.hero p{
  color:#ddd;
  line-height:1.6;
}

.hero-buttons{
  margin-top:24px;
  display:flex;
  gap:12px;
}

.hero-buttons button{
  border:none;
  padding:14px 26px;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
}

.play-btn{
  background:white;
  color:black;
}

.info-btn{
  background:rgba(255,255,255,.2);
  color:white;
}

/* CONTENT */

main{
  padding:20px 40px 60px;
}

.row{
  margin-bottom:42px;
}

.row-title{
  font-size:24px;
  margin-bottom:15px;
}

.cards{
  display:flex;
  gap:14px;
  overflow-x:auto;
  scroll-behavior:smooth;
  padding-bottom:10px;
}

.cards::-webkit-scrollbar{
  display:none;
}

.card{
  position:relative;
  min-width:180px;
  transition:.3s;
  cursor:pointer;
}

.card:hover{
  transform:scale(1.08);
  z-index:3;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card-title{
  margin-top:8px;
  font-size:14px;
}

.card-badge{
  position:absolute;
  top:8px;
  left:8px;
  background:#e50914;
  color:white;
  padding:4px 8px;
  border-radius:4px;
  font-size:11px;
  font-weight:bold;
  z-index:5;
}

/* PLAYER */

.player-modal{
  position:fixed;
  inset:0;
  background:black;
  z-index:99999;
}

.hidden{
  display:none;
}

.player-modal iframe{
  width:100%;
  height:100%;
  border:none;
}

.close-player{
  position:absolute;
  top:20px;
  right:20px;
  width:40px;
  height:40px;
  border:none;
  border-radius:50%;
  background:red;
  color:white;
  z-index:10;
  cursor:pointer;
}

/* SKELETON */

.skel{
  min-width:180px;
  height:270px;
  border-radius:10px;

  background:
    linear-gradient(
      90deg,
      #1c1c1c 25%,
      #2c2c2c 50%,
      #1c1c1c 75%
    );

  background-size:200% 100%;

  animation:shimmer 1.2s infinite;
}

@keyframes shimmer{

  from{
    background-position:200% 0;
  }

  to{
    background-position:-200% 0;
  }
}

/* MOBILE */

@media(max-width:768px){

  nav{
    display:none;
  }

  .hero{
    padding:0 20px;
  }

  .hero h1{
    font-size:42px;
  }

  .card{
    min-width:140px;
  }

  main{
    padding:20px;
  }
}

</style>
</head>
<body>

<header class="navbar">

  <div class="logo">PUREFLIX</div>

  <nav>
    <a href="#">Início</a>
    <a href="#">Filmes</a>
    <a href="#">Séries</a>
    <a href="#">Animes</a>
  </nav>

</header>

<section class="hero" id="hero">

  <div class="hero-overlay"></div>

  <div class="hero-content">

    <span class="badge">EM ALTA</span>

    <h1 id="hero-title">Carregando...</h1>

    <p id="hero-description"></p>

    <div class="hero-buttons">
      <button class="play-btn">▶ Assistir</button>
      <button class="info-btn">ℹ Informações</button>
    </div>

  </div>

</section>

<main id="sections-container"></main>

<!-- PLAYER -->

<div id="playerModal" class="player-modal hidden">

  <button
    class="close-player"
    onclick="closePlayer()">
    ✕
  </button>

  <iframe
    id="player-frame"
    allow="autoplay; fullscreen"
    allowfullscreen>
  </iframe>

</div>

<script>

/* ========================================= */
/* CONFIG */
/* ========================================= */

const BRIDGE_URL =
'https://pureflix2-production.up.railway.app';

/* ========================================= */
/* SERVERS */
/* ========================================= */

const SERVERS = [

  {
    label:'MyEmbed',
    fn:(id,t,s,e)=>{

      if(t === 'tv'){

        return `https://myembed.biz/serie/${id}/${s||1}/${e||1}`;
      }

      return `https://myembed.biz/filme/${id}`;
    }
  },

  {
    label:'VidSrc',
    fn:(id,t,s,e)=>
      `https://vidsrc.to/embed/${t}/${id}${s?'/'+s+'/'+e:''}`
  },

  {
    label:'VidSrc.me',
    fn:(id,t,s,e)=>
      `https://vidsrc.me/embed/${t}?tmdb=${id}${s?'&season='+s+'&episode='+e:''}`
  }

];

let curSrvIdx = 0;

/* ========================================= */
/* CATEGORIES */
/* ========================================= */

const SECTIONS_DEF = [

  {
    title:'🔥 Em Alta',
    endpoint:'/trending/all/week',
    type:'movie'
  },

  {
    title:'🎬 Filmes Populares',
    endpoint:'/movie/popular',
    type:'movie'
  },

  {
    title:'⭐ Top Filmes',
    endpoint:'/movie/top_rated',
    type:'movie'
  },

  {
    title:'📺 Séries',
    endpoint:'/tv/popular',
    type:'tv'
  },

  {
    title:'🎌 Animes',
    endpoint:'/discover/tv?with_genres=16&with_origin_country=JP&sort_by=popularity.desc',
    type:'tv'
  },

  {
    title:'📼 Animes Clássicos',
    endpoint:'/discover/tv?with_genres=16&with_origin_country=JP&first_air_date.lte=2010-01-01',
    type:'tv'
  },

  {
    title:'🇰🇷 Doramas',
    endpoint:'/discover/tv?with_origin_country=KR',
    type:'tv'
  },

  {
    title:'🎥 Filmes Dublados',
    endpoint:'/discover/movie?watch_region=BR&sort_by=popularity.desc',
    type:'movie'
  }

];

/* ========================================= */
/* API */
/* ========================================= */

async function api(endpoint){

  const cache =
    localStorage.getItem(endpoint);

  if(cache){

    return JSON.parse(cache);
  }

  const res = await fetch(

    `${BRIDGE_URL}/tmdb${endpoint}${
      endpoint.includes('?') ? '&' : '?'
    }language=pt-BR&region=BR`

  );

  const data = await res.json();

  try{

    localStorage.setItem(
      endpoint,
      JSON.stringify(data)
    );

  }catch(e){}

  return data;
}

/* ========================================= */
/* HERO */
/* ========================================= */

async function loadHero(){

  try{

    const data =
      await api('/trending/all/week');

    const valid =
      data.results.filter(
        i => i.backdrop_path || i.poster_path
      );

    const random =
      valid[
        Math.floor(Math.random() * valid.length)
      ];

    const hero =
      document.getElementById('hero');

    hero.style.backgroundImage =
      `url(https://image.tmdb.org/t/p/original${
        random.backdrop_path || random.poster_path
      })`;

    document.getElementById('hero-title').innerText =
      random.title || random.name;

    document.getElementById('hero-description').innerText =
      random.overview || '';

  }catch(err){

    console.log(err);
  }
}

/* ========================================= */
/* CONTINUE */
/* ========================================= */

function getContinue(){

  return JSON.parse(
    localStorage.getItem('continueWatching') || '{}'
  );
}

function saveContinue(item){

  const list = getContinue();

  list[item.id] = {
    ...item,
    ts:Date.now()
  };

  localStorage.setItem(
    'continueWatching',
    JSON.stringify(list)
  );
}

/* ========================================= */
/* FAVORITES */
/* ========================================= */

function getFavs(){

  return JSON.parse(
    localStorage.getItem('favorites') || '{}'
  );
}

/* ========================================= */
/* CAROUSEL */
/* ========================================= */

function makeCarousel(section,items,type){

  const sec =
    document.createElement('section');

  sec.className = 'row';

  sec.innerHTML = `

    <h2 class="row-title">
      ${section.title}
    </h2>

    <div class="cards">

      ${items.map(item=>{

        const genres =
          item.genre_ids || [];

        return `

          <div
            class="card"

            data-item='${encodeURIComponent(
              JSON.stringify(item)
            )}'

            onclick='openPlayer(this,"${type}")'>

            ${genres.includes(16)
              ? '<div class="card-badge">ANIME</div>'
              : ''
            }

            <img
              loading="lazy"

              onerror="this.src='https://placehold.co/500x750/111/FFF?text=SEM+IMAGEM'"

              src="https://image.tmdb.org/t/p/w500${item.poster_path}">

            <div class="card-title">
              ${item.title || item.name}
            </div>

          </div>

        `;
      }).join('')}

    </div>

  `;

  return sec;
}

/* ========================================= */
/* LOAD ROWS */
/* ========================================= */

async function loadRows(){

  const container =
    document.getElementById('sections-container');

  for(const section of SECTIONS_DEF){

    const skel =
      document.createElement('div');

    skel.className = 'cards';

    skel.innerHTML =
      Array(10)
        .fill('<div class="skel"></div>')
        .join('');

    container.appendChild(skel);

    try{

      const data =
        await api(section.endpoint);

      skel.remove();

      const row =
        makeCarousel(
          section,
          data.results || [],
          section.type
        );

      container.appendChild(row);

    }catch(err){

      console.log(err);

      skel.remove();
    }
  }
}

/* ========================================= */
/* PLAYER */
/* ========================================= */

function loadServer(idx,id,type,season,episode){

  curSrvIdx = idx;

  const frame =
    document.getElementById('player-frame');

  frame.src =
    SERVERS[idx]
      .fn(id,type,season,episode);
}

function openPlayer(el,type){

  const item =
    JSON.parse(
      decodeURIComponent(
        el.dataset.item
      )
    );

  const modal =
    document.getElementById('playerModal');

  modal.classList.remove('hidden');

  const mediaType =
    type ||
    item.media_type ||
    (item.first_air_date ? 'tv' : 'movie');

  loadServer(
    0,
    item.id,
    mediaType,
    1,
    1
  );

  saveContinue(item);

  setTimeout(()=>{

    const frame =
      document.getElementById('player-frame');

    try{

      if(!frame.contentWindow){

        if(curSrvIdx < SERVERS.length - 1){

          curSrvIdx++;

          loadServer(
            curSrvIdx,
            item.id,
            mediaType,
            1,
            1
          );
        }
      }

    }catch(e){}

  },7000);
}

function closePlayer(){

  const modal =
    document.getElementById('playerModal');

  const frame =
    document.getElementById('player-frame');

  frame.src = '';

  modal.classList.add('hidden');
}

/* ========================================= */
/* DEBUG */
/* ========================================= */

window.addEventListener('error',(e)=>{

  console.log('ERRO:',e);

});

/* ========================================= */
/* INIT */
/* ========================================= */

loadHero();
loadRows();

</script>

</body>
</html>
